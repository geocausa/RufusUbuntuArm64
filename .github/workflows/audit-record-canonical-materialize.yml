name: Audit canonical record result materializer

on:
  push:
    branches:
      - audit/record-canonical-result

permissions:
  contents: write

jobs:
  materialize:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: true
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.26.5'
      - name: Apply and commit reviewed canonical result edit
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('internal/qualification/record.go')
          text = path.read_text(encoding='utf-8')
          if 'StoredRecord{Record: normalized,' in text:
              raise SystemExit(0)
          old = '''func WriteRecord(root string, record CreationRecord) (StoredRecord, error) {
\tdata, digest, err := MarshalRecord(record)
\tif err != nil {
\t\treturn StoredRecord{}, err
\t}
'''
          new = '''func WriteRecord(root string, record CreationRecord) (StoredRecord, error) {
\tnormalized, err := NormalizeRecord(record)
\tif err != nil {
\t\treturn StoredRecord{}, err
\t}
\tdata, digest, err := MarshalRecord(normalized)
\tif err != nil {
\t\treturn StoredRecord{}, err
\t}
'''
          count = text.count(old)
          if count != 1:
              raise SystemExit(f'expected one WriteRecord prologue, found {count}')
          text = text.replace(old, new, 1)
          old_return = 'return StoredRecord{Record: record, SHA256: digest, Path: filepath.ToSlash(filepath.Join(metadataDirName, RecordFileName))}, nil'
          new_return = 'return StoredRecord{Record: normalized, SHA256: digest, Path: filepath.ToSlash(filepath.Join(metadataDirName, RecordFileName))}, nil'
          count = text.count(old_return)
          if count != 1:
              raise SystemExit(f'expected one WriteRecord return, found {count}')
          path.write_text(text.replace(old_return, new_return, 1), encoding='utf-8')
          PY
          gofmt -w internal/qualification/record.go
          go test ./internal/qualification
          if git diff --quiet -- internal/qualification/record.go; then
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add internal/qualification/record.go
          git commit -m 'Return the canonical creation record that was published'
          git push origin HEAD:audit/record-canonical-result
