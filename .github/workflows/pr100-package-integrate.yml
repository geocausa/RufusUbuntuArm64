name: Integrate device qualification package

on:
  push:
    branches:
      - feature/device-qualification-executor

permissions:
  contents: write

jobs:
  integrate:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: feature/device-qualification-executor
          fetch-depth: 0
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff
        with:
          go-version: '1.22.x'
      - name: Patch package and test contracts
        shell: bash
        run: |
          set -u
          log="${RUNNER_TEMP}/pr100-package.log"
          status=0
          {
            set -euxo pipefail
            python3 <<'PY'
          from pathlib import Path

          build = Path('scripts/build-deb.sh')
          text = build.read_text(encoding='utf-8')
          old = '''CGO_ENABLED=0 GOOS=linux GOARCH=arm64 \\
            go build -buildvcs=false -trimpath -ldflags="-buildid= -s -w -X main.version=${VERSION}" \\
            -o "${PACKAGE_DIR}/usr/lib/rufusarm64/rufusarm64-persistence-helper" \\
            "${ROOT_DIR}/cmd/rufus-persistence-helper"
          '''
          new = old + '''CGO_ENABLED=0 GOOS=linux GOARCH=arm64 \\
            go build -buildvcs=false -trimpath -ldflags="-buildid= -s -w -X main.version=${VERSION}" \\
            -o "${PACKAGE_DIR}/usr/lib/rufusarm64/rufusarm64-device-qualify" \\
            "${ROOT_DIR}/cmd/rufus-device-qualify"
          '''
          if 'cmd/rufus-device-qualify' not in text:
              if text.count(old) != 1:
                  raise SystemExit(f'build helper site count = {text.count(old)}, want 1')
              text = text.replace(old, new, 1)
          old = '''ln -s ../lib/rufusarm64/rufusarm64-helper \\
            "${PACKAGE_DIR}/usr/bin/rufusarm64-cli"
          '''
          new = old + '''ln -s ../lib/rufusarm64/rufusarm64-device-qualify \\
            "${PACKAGE_DIR}/usr/bin/rufusarm64-device-qualify"
          '''
          if 'usr/bin/rufusarm64-device-qualify' not in text:
              if text.count(old) != 1:
                  raise SystemExit(f'public symlink site count = {text.count(old)}, want 1')
              text = text.replace(old, new, 1)
          old = 'for page in rufusarm64 rufusarm64-cli rufusarm64-persistence; do'
          new = 'for page in rufusarm64 rufusarm64-cli rufusarm64-persistence rufusarm64-device-qualify; do'
          if old in text:
              text = text.replace(old, new, 1)
          elif new not in text:
              raise SystemExit('man-page loop not found')
          build.write_text(text, encoding='utf-8')

          tests = Path('scripts/test.sh')
          text = tests.read_text(encoding='utf-8')
          old = '''native_helper="${native_dir}/rufusarm64-helper"
          native_persistence_helper="${native_dir}/rufusarm64-persistence-helper"
          go build -trimpath -ldflags="-s -w -X main.version=${VERSION}" -o "${native_helper}" ./cmd/rufus-linux
          go build -trimpath -ldflags="-s -w -X main.version=${VERSION}" -o "${native_persistence_helper}" ./cmd/rufus-persistence-helper
          [[ "$("${native_helper}" version)" == "${VERSION}" ]]
          '''
          new = '''native_helper="${native_dir}/rufusarm64-helper"
          native_persistence_helper="${native_dir}/rufusarm64-persistence-helper"
          native_device_qualify="${native_dir}/rufusarm64-device-qualify"
          go build -trimpath -ldflags="-s -w -X main.version=${VERSION}" -o "${native_helper}" ./cmd/rufus-linux
          go build -trimpath -ldflags="-s -w -X main.version=${VERSION}" -o "${native_persistence_helper}" ./cmd/rufus-persistence-helper
          go build -trimpath -ldflags="-s -w -X main.version=${VERSION}" -o "${native_device_qualify}" ./cmd/rufus-device-qualify
          [[ "$("${native_helper}" version)" == "${VERSION}" ]]
          [[ "$("${native_device_qualify}" version)" == "${VERSION}" ]]
          '''
          if 'native_device_qualify=' not in text:
              if text.count(old) != 1:
                  raise SystemExit(f'native build site count = {text.count(old)}, want 1')
              text = text.replace(old, new, 1)
          old = '''CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -trimpath -ldflags="-s -w -X main.version=${VERSION}" -o "${native_dir}/persistence-helper-arm64" ./cmd/rufus-persistence-helper
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -ldflags="-s -w -X main.version=${VERSION}" -o "${native_dir}/persistence-helper-amd64" ./cmd/rufus-persistence-helper
          '''
          new = old + '''CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -trimpath -ldflags="-s -w -X main.version=${VERSION}" -o "${native_dir}/device-qualify-arm64" ./cmd/rufus-device-qualify
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -ldflags="-s -w -X main.version=${VERSION}" -o "${native_dir}/device-qualify-amd64" ./cmd/rufus-device-qualify
          '''
          if 'device-qualify-arm64' not in text:
              if text.count(old) != 1:
                  raise SystemExit(f'cross build site count = {text.count(old)}, want 1')
              text = text.replace(old, new, 1)
          old = '''readelf -h "${native_dir}/persistence-helper-arm64" | grep -q 'Machine:.*AArch64'
          readelf -h "${native_dir}/persistence-helper-amd64" | grep -q 'Machine:.*Advanced Micro Devices X86-64'
          '''
          new = old + '''readelf -h "${native_dir}/device-qualify-arm64" | grep -q 'Machine:.*AArch64'
          readelf -h "${native_dir}/device-qualify-amd64" | grep -q 'Machine:.*Advanced Micro Devices X86-64'
          '''
          if "device-qualify-arm64\" | grep" not in text:
              if text.count(old) != 1:
                  raise SystemExit(f'cross readelf site count = {text.count(old)}, want 1')
              text = text.replace(old, new, 1)
          old = '''helper="${extract_dir}/usr/lib/rufusarm64/rufusarm64-helper"
          persistence_helper="${extract_dir}/usr/lib/rufusarm64/rufusarm64-persistence-helper"
          installed_gui="${extract_dir}/usr/lib/rufusarm64/rufusarm64.py"
          [[ -x "${helper}" ]]
          [[ -x "${persistence_helper}" ]]
          '''
          new = '''helper="${extract_dir}/usr/lib/rufusarm64/rufusarm64-helper"
          persistence_helper="${extract_dir}/usr/lib/rufusarm64/rufusarm64-persistence-helper"
          device_qualify="${extract_dir}/usr/lib/rufusarm64/rufusarm64-device-qualify"
          installed_gui="${extract_dir}/usr/lib/rufusarm64/rufusarm64.py"
          [[ -x "${helper}" ]]
          [[ -x "${persistence_helper}" ]]
          [[ -x "${device_qualify}" ]]
          [[ "$("${device_qualify}" version)" == "${VERSION}" ]]
          '''
          if 'device_qualify="${extract_dir}' not in text:
              if text.count(old) != 1:
                  raise SystemExit(f'extracted binary site count = {text.count(old)}, want 1')
              text = text.replace(old, new, 1)
          old = 'for page in rufusarm64 rufusarm64-cli rufusarm64-persistence; do'
          new = 'for page in rufusarm64 rufusarm64-cli rufusarm64-persistence rufusarm64-device-qualify; do'
          if old in text:
              text = text.replace(old, new, 1)
          elif new not in text:
              raise SystemExit('package man loop not found')
          old = '''file "${persistence_helper}" | grep -q 'ARM aarch64'
          file "${persistence_helper}" | grep -q 'statically linked'
          readelf -h "${helper}" | grep -q 'Machine:.*AArch64'
          readelf -h "${persistence_helper}" | grep -q 'Machine:.*AArch64'
          if readelf -l "${helper}" | grep -q 'Requesting program interpreter'; then echo 'main helper must be static' >&2; exit 1; fi
          if readelf -l "${persistence_helper}" | grep -q 'Requesting program interpreter'; then echo 'persistence helper must be static' >&2; exit 1; fi
          '''
          new = '''file "${persistence_helper}" | grep -q 'ARM aarch64'
          file "${persistence_helper}" | grep -q 'statically linked'
          file "${device_qualify}" | grep -q 'ARM aarch64'
          file "${device_qualify}" | grep -q 'statically linked'
          readelf -h "${helper}" | grep -q 'Machine:.*AArch64'
          readelf -h "${persistence_helper}" | grep -q 'Machine:.*AArch64'
          readelf -h "${device_qualify}" | grep -q 'Machine:.*AArch64'
          if readelf -l "${helper}" | grep -q 'Requesting program interpreter'; then echo 'main helper must be static' >&2; exit 1; fi
          if readelf -l "${persistence_helper}" | grep -q 'Requesting program interpreter'; then echo 'persistence helper must be static' >&2; exit 1; fi
          if readelf -l "${device_qualify}" | grep -q 'Requesting program interpreter'; then echo 'device qualification utility must be static' >&2; exit 1; fi
          '''
          if "device qualification utility must be static" not in text:
              if text.count(old) != 1:
                  raise SystemExit(f'package architecture site count = {text.count(old)}, want 1')
              text = text.replace(old, new, 1)
          old = '[[ "$(readlink "${extract_dir}/usr/bin/rufusarm64-cli")" == "../lib/rufusarm64/rufusarm64-helper" ]]'
          new = old + '\n[[ "$(readlink "${extract_dir}/usr/bin/rufusarm64-device-qualify")" == "../lib/rufusarm64/rufusarm64-device-qualify" ]]'
          if 'readlink "${extract_dir}/usr/bin/rufusarm64-device-qualify"' not in text:
              if text.count(old) != 1:
                  raise SystemExit(f'package symlink site count = {text.count(old)}, want 1')
              text = text.replace(old, new, 1)
          tests.write_text(text, encoding='utf-8')
          PY
            gofmt -w cmd/rufus-device-qualify internal/devicequal
            bash -n scripts/build-deb.sh scripts/test.sh
            go test ./cmd/rufus-device-qualify ./internal/devicequal
          } >"${log}" 2>&1 || status=$?

          git config user.name 'RufusArm64 CI'
          git config user.email 'actions@users.noreply.github.com'
          if [[ "${status}" -eq 0 ]]; then
            git add scripts/build-deb.sh scripts/test.sh cmd/rufus-device-qualify internal/devicequal
            git commit -m 'devicequal: package and smoke-test qualification utility'
          else
            cp "${log}" pr100-package-failure.log
            git add pr100-package-failure.log
            git commit -m 'ci: record device qualification package failure'
          fi
          git push origin HEAD:feature/device-qualification-executor
          exit "${status}"
