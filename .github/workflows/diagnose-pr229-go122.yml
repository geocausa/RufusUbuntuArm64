name: Diagnose PR229 Go 1.22

on:
  push:
    branches:
      - ops/refresh-prerelease-pr225
    paths:
      - .github/workflows/diagnose-pr229-go122.yml

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: 662b781f53cce3c5e46880232ae1054bebe11cd2
          persist-credentials: false
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff
        with:
          go-version: '1.22.x'
      - name: Capture complete test output
        shell: bash
        run: |
          set +e
          go test ./... > go-test.log 2>&1
          status=$?
          printf '\nexit_status=%s\n' "$status" >> go-test.log
          exit 0
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: pr229-go122-log
          path: go-test.log
          if-no-files-found: error
