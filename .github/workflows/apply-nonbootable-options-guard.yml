name: Apply non-bootable backend option guard

on:
  push:
    branches: [feature/nonbootable-executor]
    paths:
      - .github/workflows/apply-nonbootable-options-guard.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: feature/nonbootable-executor
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.22.x'
      - name: Require bound identity and final callback
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path("internal/nonbootable/backend_linux.go")
          text = path.read_text(encoding="utf-8")
          old = '''func ExecuteDevice(ctx context.Context, plan Plan, options DeviceOptions) (Report, error) {
          \tbackend := &linuxBackend{options: options}
          '''
          new = '''func ExecuteDevice(ctx context.Context, plan Plan, options DeviceOptions) (Report, error) {
          \tif options.ExpectedDeviceID == 0 {
          \t\treturn Report{}, errors.New("formatter backend requires a bound kernel device identity")
          \t}
          \tif options.BeforeDestructive == nil {
          \t\treturn Report{}, errors.New("formatter backend requires a final pre-destructive safety callback")
          \t}
          \tbackend := &linuxBackend{options: options}
          '''
          if text.count(old) != 1:
              raise SystemExit("ExecuteDevice marker is not unique")
          path.write_text(text.replace(old, new, 1), encoding="utf-8")
          PY
          gofmt -w internal/nonbootable/backend_linux.go
          go test ./internal/nonbootable ./cmd/rufus-nonbootable-format
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add internal/nonbootable/backend_linux.go
          git commit -m "Stage 2: require final formatter backend revalidation"
          git push origin HEAD:feature/nonbootable-executor
