name: Repair FreeDOS progress workflow block robustly

on:
  push:
    branches:
      - fix/freedos-progress
    paths:
      - .github/workflows/repair-freedos-progress-v2c.yml

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - name: Repair Popen replacement block
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          path = Path('.github/workflows/apply-freedos-progress-v2.yml')
          text = path.read_text(encoding='utf-8')
          start = text.find('"""                text=True,')
          if start < 0:
              raise SystemExit('could not locate first Popen literal')
          next_file = text.find('"gui/rufusarm64_freedos_dialog.py"', start)
          if next_file < 0:
              raise SystemExit('could not locate next dialog replacement')
          next_replace = text.rfind('replace_once(', start, next_file)
          if next_replace < 0:
              raise SystemExit('could not locate next replacement boundary')
          replacement = '''"                text=True,\\n                start_new_session=True,\\n",
              "                text=True,\\n                bufsize=1,\\n                start_new_session=True,\\n",
          )
          '''
          path.write_text(text[:start] + replacement + text[next_replace:], encoding='utf-8')
          PY
      - name: Commit repair
        run: |
          set -euo pipefail
          for path in \
            .github/workflows/repair-freedos-progress-v2.yml \
            .github/workflows/repair-freedos-progress-v2b.yml \
            .github/workflows/repair-freedos-progress-v2c.yml \
            diagnostics/freedos-progress-v2.log \
            diagnostics/freedos-repair-tail.log; do
            if [ -e "$path" ]; then git rm "$path"; fi
          done
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/workflows/apply-freedos-progress-v2.yml
          git commit -m "Repair FreeDOS progress workflow Popen replacement"
          git push origin HEAD:fix/freedos-progress
