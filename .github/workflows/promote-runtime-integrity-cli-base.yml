name: Promote runtime integrity CLI

on:
  pull_request:
    branches: [develop/0.11.0]
    paths:
      - .github/runtime-integrity-cli-trigger

permissions:
  contents: write

jobs:
  promote:
    if: github.event.pull_request.head.ref == 'feature/0.11-runtime-integrity-cli'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff
        with:
          go-version: '1.22.x'
      - name: Apply runtime integrity CLI
        run: python3 tools/apply_runtime_integrity_cli.py
      - name: Check formatting
        run: test -z "$(gofmt -l cmd/rufus-linux)"
      - name: Run focused command and integrity race tests
        run: go test -race ./cmd/rufus-linux ./internal/runtimeintegrity
      - name: Vet command and integrity packages
        run: go vet ./cmd/rufus-linux ./internal/runtimeintegrity
      - name: Run complete Go suite
        run: go test ./...
      - name: Validate documentation and workflow syntax
        run: |
          python3 -m py_compile gui/*.py
          python3 -m json.tool docs/upstream-rufus-parity.json >/dev/null
          bash -n scripts/*.sh
      - name: Confirm unprivileged command boundary
        run: |
          go test ./cmd/rufus-linux -run 'TestRuntimeIntegrityCLIManifestAndVerify|TestRuntimeIntegrityCLIRejectsInvalidArguments' -count=5
          ! grep -nE 'pkexec|RequireRoot|ResolveDevice' cmd/rufus-linux/main.go | grep -E 'runUEFIIntegrity|runtimeIntegrity' || true
      - name: Commit validated production changes
        run: |
          rm -f tools/apply_runtime_integrity_cli.py .github/runtime-integrity-cli-trigger
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add cmd/rufus-linux/main.go cmd/rufus-linux/main_test.go docs/rufusarm64-cli.1 README.md .github/workflows/ci.yml
          git add -u tools/apply_runtime_integrity_cli.py .github/runtime-integrity-cli-trigger
          git commit -m '0.11: expose runtime integrity manifest CLI'
          git push origin HEAD:feature/0.11-runtime-integrity-cli
