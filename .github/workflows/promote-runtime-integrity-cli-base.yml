name: Promote runtime integrity CLI

on:
  pull_request:
    branches: [develop/0.11.0]
    paths:
      - .github/runtime-integrity-cli-trigger

permissions:
  contents: write

jobs:
  promote:
    if: github.event.pull_request.head.ref == 'feature/0.11-runtime-integrity-cli'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff
        with:
          go-version: '1.22.x'
      - name: Apply runtime integrity CLI
        run: python3 tools/apply_runtime_integrity_cli.py
      - name: Update existing dispatcher expectation
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('cmd/rufus-linux/main_test.go')
          text = path.read_text(encoding='utf-8')
          old = 'err.Error() != "uefi requires validate"'
          new = 'err.Error() != "uefi requires validate or integrity"'
          if text.count(old) != 1:
              raise SystemExit(f'dispatcher expectation matched {text.count(old)} times')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY
      - name: Check formatting
        run: test -z "$(gofmt -l cmd/rufus-linux)"
      - name: Run focused command and integrity race tests
        run: |
          set -o pipefail
          go test -race -v ./cmd/rufus-linux ./internal/runtimeintegrity 2>&1 | tee runtime-integrity-cli-tests.log
      - name: Upload focused test diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: runtime-integrity-cli-tests
          path: runtime-integrity-cli-tests.log
      - name: Vet command and integrity packages
        run: go vet ./cmd/rufus-linux ./internal/runtimeintegrity
      - name: Run complete Go suite
        run: go test ./...
      - name: Validate documentation and workflow syntax
        run: |
          python3 -m py_compile gui/*.py
          python3 -m json.tool docs/upstream-rufus-parity.json >/dev/null
          bash -n scripts/*.sh
      - name: Confirm unprivileged command boundary
        run: |
          go test ./cmd/rufus-linux -run 'TestRuntimeIntegrityCLIManifestAndVerify|TestRuntimeIntegrityCLIRejectsInvalidArguments' -count=5
          ! grep -nE 'pkexec|RequireRoot|ResolveDevice' cmd/rufus-linux/main.go | grep -E 'runUEFIIntegrity|runtimeIntegrity' || true
      - name: Create validated production commit
        run: |
          rm -f tools/apply_runtime_integrity_cli.py .github/runtime-integrity-cli-trigger
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add cmd/rufus-linux/main.go cmd/rufus-linux/main_test.go docs/rufusarm64-cli.1 README.md .github/workflows/ci.yml
          git add -u tools/apply_runtime_integrity_cli.py .github/runtime-integrity-cli-trigger
          git commit -m '0.11: expose runtime integrity manifest CLI'
          git rev-parse HEAD | tee validated-runtime-integrity-cli-commit.txt
          git push origin HEAD:feature/0.11-runtime-integrity-cli
      - name: Upload validated commit identity
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: validated-runtime-integrity-cli-commit
          path: validated-runtime-integrity-cli-commit.txt
          if-no-files-found: warn
