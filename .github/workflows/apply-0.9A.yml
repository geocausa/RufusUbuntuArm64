name: Apply 0.9A quality foundation

on:
  push:
    branches:
      - develop/0.9.0-quality-foundation
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.event_name == 'push' || github.head_ref == 'develop/0.9.0-quality-foundation'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: develop/0.9.0-quality-foundation
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23.x'

      - name: Detect staged patch
        id: staged
        shell: bash
        run: |
          if test -f .changes/0.9A-quality.patch; then
            echo 'present=true' >> "$GITHUB_OUTPUT"
          else
            echo 'present=false' >> "$GITHUB_OUTPUT"
          fi

      - name: Apply and validate quality improvements
        if: steps.staged.outputs.present == 'true'
        shell: bash
        run: |
          set -euo pipefail
          git apply --check .changes/0.9A-quality.patch
          git apply .changes/0.9A-quality.patch
          rm .changes/0.9A-quality.patch
          rmdir .changes
          python3 -m py_compile gui/rufusarm64.py gui/rufusarm64_logic.py gui/test_logic.py
          python3 -m unittest discover -s gui -p 'test*.py'
          go test ./...

      - name: Commit validated implementation
        if: steps.staged.outputs.present == 'true'
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add --all
          git commit -m 'Add rich progress and exportable diagnostics'
          git push origin HEAD:develop/0.9.0-quality-foundation
