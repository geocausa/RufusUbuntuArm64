name: Harden unified persistence UI

on:
  pull_request:
    branches: [main]
    paths:
      - scripts/harden-unified-persistence-ui.py
      - .github/workflows/harden-unified-persistence-ui.yml

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'feature/unified-persistence-ui'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: feature/unified-persistence-ui
          fetch-depth: 0
      - name: Apply and validate state hardening
        id: validate
        shell: bash
        run: |
          set +e
          {
            python3 scripts/harden-unified-persistence-ui.py &&
            PYTHONPATH=gui python3 -m unittest discover -s gui -p 'test_*.py' &&
            python3 -m py_compile gui/*.py &&
            git diff --check
          } > unified-ui-hardening-diagnostics.txt 2>&1
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          cat unified-ui-hardening-diagnostics.txt
          exit 0
      - name: Upload focused diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: unified-ui-hardening-diagnostics
          path: unified-ui-hardening-diagnostics.txt
          if-no-files-found: error
      - name: Require focused validation
        if: steps.validate.outputs.status != '0'
        run: exit 1
      - name: Remove staging files
        if: steps.validate.outputs.status == '0'
        run: |
          rm scripts/harden-unified-persistence-ui.py .github/workflows/harden-unified-persistence-ui.yml unified-ui-hardening-diagnostics.txt
      - name: Commit validated hardening
        if: steps.validate.outputs.status == '0'
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m 'gui: harden unified persistence state transitions'
          git push origin HEAD:feature/unified-persistence-ui
