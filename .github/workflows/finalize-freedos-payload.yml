name: Finalize and clean FreeDOS payload checkpoint

on:
  push:
    branches: [feature/freedos-payload-provenance]
    paths:
      - .github/workflows/finalize-freedos-payload.yml

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: feature/freedos-payload-provenance
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v6
        with:
          go-version: '1.22.12'
      - name: Apply permanent integration, clean research files, and verify
        shell: bash
        run: |
          set -euxo pipefail
          python3 .github/scripts/finalize_freedos_payload.py
          rm -f \
            .github/workflows/map-freedos-payload.yml \
            .github/workflows/apply-freedos-payload.yml \
            .github/workflows/verify-freedos-payload.yml \
            .github/workflows/extract-freecom-license.yml \
            .github/workflows/finalize-freedos-payload.yml \
            .github/scripts/finalize_freedos_payload.py \
            docs/freedos-payload-map.txt \
            docs/freedos-finalizer-diagnostic.txt
          gofmt -w internal/freedos
          test -z "$(gofmt -l internal/freedos)"
          go test -race ./internal/freedos
          go test -shuffle=on -count=3 ./internal/freedos
          go install honnef.co/go/tools/cmd/staticcheck@2025.1.1
          staticcheck ./internal/freedos
          python3 scripts/extract-freedos-payload.py --check
          python3 -m py_compile scripts/extract-freedos-payload.py
          bash -n scripts/test.sh
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m 'FreeDOS: finalize official payload provenance checkpoint'
          git push origin HEAD:feature/freedos-payload-provenance
