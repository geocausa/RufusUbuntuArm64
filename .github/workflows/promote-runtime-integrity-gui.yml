name: Promote runtime integrity GTK

on:
  pull_request:
    branches: [develop/0.11.0]
    paths:
      - .github/runtime-integrity-gui-trigger

permissions:
  contents: write

jobs:
  promote:
    if: github.event.pull_request.head.ref == 'feature/0.11-runtime-integrity-gui'
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
      - name: Apply guarded GTK integration
        run: python3 tools/apply_runtime_integrity_gui.py
      - name: Compile and test Python UI logic
        run: |
          python3 -m py_compile gui/*.py tools/apply_runtime_integrity_gui.py
          PYTHONPATH=gui python3 -m unittest discover -s gui -p 'test_*.py' -v
      - name: Confirm guarded option boundary
        run: |
          grep -Fq 'Validate media at UEFI boot' gui/rufusarm64_persistence.py
          grep -Fq 'Unsigned development loader — Secure Boot compatibility is not established' gui/rufusarm64_persistence.py
          grep -Fq -- '--runtime-uefi-validation' gui/rufusarm64_persistence_logic.py
          ! grep -R -nE 'runtime_uefi_loader_(path|sha256)|Choose an EFI' gui
          test "$(grep -o -- '--runtime-uefi-validation' gui/rufusarm64_persistence_logic.py | wc -l)" -eq 1
      - name: Run complete Go suite
        run: go test ./...
      - name: Create validated production commit
        run: |
          rm -f tools/apply_runtime_integrity_gui.py .github/runtime-integrity-gui-trigger
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add gui/rufusarm64_persistence.py gui/rufusarm64_persistence_logic.py gui/test_persistence_runtime_integrity.py
          git add -u tools/apply_runtime_integrity_gui.py .github/runtime-integrity-gui-trigger
          git commit -m '0.11: expose guarded runtime UEFI validation in persistent media GTK'
          git push origin HEAD:feature/0.11-runtime-integrity-gui
