name: Audit creation record transaction materializer

on:
  push:
    branches:
      - audit/creation-record-transaction

permissions:
  contents: write

jobs:
  materialize:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: true
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.26.5'
      - name: Apply and commit reviewed record transaction edit
        run: |
          # This workflow exists only on the isolated audit branch and removes itself before review.
          python3 - <<'PY'
          from pathlib import Path

          path = Path('internal/qualification/record.go')
          text = path.read_text(encoding='utf-8')
          if 'writeRecordPair(recordPath, data, digest)' in text:
              raise SystemExit(0)
          old = '''\trecordPath := filepath.Join(metadata, RecordFileName)
\tif err := writeAtomicNoFollow(recordPath, data, 0o600); err != nil {
\t\treturn StoredRecord{}, err
\t}
\tchecksum := []byte(fmt.Sprintf("%s  %s\\n", digest, RecordFileName))
\tif err := writeAtomicNoFollow(recordPath+".sha256", checksum, 0o600); err != nil {
\t\treturn StoredRecord{}, err
\t}
'''
          new = '''\trecordPath := filepath.Join(metadata, RecordFileName)
\tif err := writeRecordPair(recordPath, data, digest); err != nil {
\t\treturn StoredRecord{}, err
\t}
'''
          count = text.count(old)
          if count != 1:
              raise SystemExit(f'expected exactly one record publication block, found {count}')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY
          gofmt -w internal/qualification/record.go
          go test ./internal/qualification
          if git diff --quiet -- internal/qualification/record.go; then
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add internal/qualification/record.go
          git commit -m 'Publish creation record and checksum as a recoverable pair'
          git push origin HEAD:audit/creation-record-transaction
