name: Apply FreeDOS progress workflow repair cleanly

on:
  push:
    branches:
      - fix/freedos-progress
    paths:
      - .github/workflows/repair-freedos-progress-v2d.yml

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - name: Repair and commit
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          path = Path('.github/workflows/apply-freedos-progress-v2.yml')
          text = path.read_text(encoding='utf-8')
          start = text.find('"""                text=True,')
          if start < 0:
              raise SystemExit('could not locate first Popen literal')
          next_file = text.find('"gui/rufusarm64_freedos_dialog.py"', start)
          next_replace = text.rfind('replace_once(', start, next_file)
          if next_file < 0 or next_replace < 0:
              raise SystemExit(f'could not locate replacement boundary: file={next_file} replace={next_replace}')
          replacement = '''"                text=True,\\n                start_new_session=True,\\n",
              "                text=True,\\n                bufsize=1,\\n                start_new_session=True,\\n",
          )
          '''
          path.write_text(text[:start] + replacement + text[next_replace:], encoding='utf-8')
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/workflows/apply-freedos-progress-v2.yml
          git rm .github/workflows/repair-freedos-progress-v2d.yml
          git commit -m "Repair FreeDOS progress workflow replacement"
          git push origin HEAD:fix/freedos-progress
