name: Apply 0.10C signed acquisition channel

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Reconstruct and verify reviewed patch
        shell: bash
        run: |
          set -euo pipefail
          cat .github/transfer/0.10c.patch.part00 \
              .github/transfer/0.10c.patch.part01 \
              .github/transfer/0.10c.patch.part02 \
              .github/transfer/0.10c.patch.part03 \
              .github/transfer/0.10c.patch.part04 > /tmp/0.10c.patch.xz.b64
          test "$(wc -c < /tmp/0.10c.patch.xz.b64)" -eq 35224
          base64 --decode /tmp/0.10c.patch.xz.b64 > /tmp/0.10c.patch.xz
          echo '715cd8cb7a0a926e9e4fc9625c51cf11f5f87d52d86792f657e5c47cddbd2bbe  /tmp/0.10c.patch.xz' | sha256sum --check --strict
          xz --decompress --stdout /tmp/0.10c.patch.xz > /tmp/0.10c.patch
          echo 'eb014a1ae23b03638593e7034c1dbc8e2047bea88d4839c040030fd86c078721  /tmp/0.10c.patch' | sha256sum --check --strict
          git apply --check /tmp/0.10c.patch
          git apply /tmp/0.10c.patch
      - name: Validate trust, GUI, and packaging metadata
        shell: bash
        run: |
          set -euo pipefail
          test -z "$(gofmt -l cmd internal)"
          go test ./...
          go test -race ./...
          go test -shuffle=on -count=3 ./...
          go vet ./...
          python3 -m py_compile gui/rufusarm64.py gui/rufusarm64_logic.py gui/test_logic.py
          PYTHONPATH=gui python3 -m unittest discover -s gui -p 'test*.py'
          bash -n scripts/build-deb.sh scripts/test.sh
          python3 - <<'PY'
          import json
          from pathlib import Path

          config_path = Path('packaging/acquisition/channel.json')
          config = json.loads(config_path.read_text(encoding='utf-8'))
          expected = {
              'schema': 1,
              'enabled': False,
              'bootstrap_root': '',
              'root_url': '',
              'catalog_url': '',
              'allowed_hosts': [],
          }
          if config != expected:
              raise SystemExit(f'packaged channel must remain explicitly disabled: {config!r}')
          text = config_path.read_text(encoding='utf-8').lower()
          forbidden = ('private key', 'private_key', 'begin openssh private', 'begin private key')
          if any(item in text for item in forbidden):
              raise SystemExit('private-key material marker found in package trust configuration')
          required = Path('docs/acquisition-channel.md')
          if not required.is_file() or required.stat().st_size < 1000:
              raise SystemExit('acquisition trust and recovery guide is missing or incomplete')
          PY
          grep -q 'acquire channel' cmd/rufus-linux/main.go
          grep -q 'Advanced recovery' gui/rufusarm64.py
          ! grep -R -E -- '(BEGIN (OPENSSH |RSA |EC )?PRIVATE KEY|private[_ -]?key[[:space:]]*[:=][[:space:]]*[^"[:space:]]+)' \
              internal/acquisition packaging/acquisition docs/acquisition-channel.md
      - name: Commit validated 0.10C source
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add \
            CHANGELOG.md README.md ROADMAP.md SECURITY.md \
            cmd/rufus-linux/main.go cmd/rufus-linux/main_test.go \
            docs/acquisition-channel.md docs/gui-acquisition-persistence.md docs/rufusarm64-cli.1 \
            gui/rufusarm64.py gui/rufusarm64_logic.py gui/test_logic.py \
            internal/acquisition/channel.go internal/acquisition/channel_test.go \
            internal/acquisition/trust.go internal/acquisition/trust_test.go \
            packaging/acquisition/channel.json scripts/build-deb.sh scripts/test.sh
          test "$(git diff --cached --name-only | wc -l)" -eq 19
          git diff --cached --check
          git commit -m '0.10C: built-in signed acquisition channel'
          git push origin HEAD:develop/0.10.0-built-in-signed-catalog
