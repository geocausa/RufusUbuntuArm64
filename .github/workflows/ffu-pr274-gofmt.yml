name: FFU PR 274 gofmt

on:
  push:
    branches:
      - fix/ffu-payload-table-ranges

permissions:
  contents: write

concurrency:
  group: ffu-pr274-gofmt
  cancel-in-progress: false

jobs:
  format:
    if: github.repository == 'geocausa/RufusUbuntuArm64'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: true
          ref: fix/ffu-payload-table-ranges
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.26.5'
      - name: Format only the corrected FFU inspector
        run: |
          set -euo pipefail
          gofmt -w internal/ffu/inspect.go
          changed="$(git diff --name-only)"
          if [[ -z "${changed}" ]]; then
            echo 'FFU inspector already formatted.'
            exit 0
          fi
          [[ "${changed}" == 'internal/ffu/inspect.go' ]] || {
            echo "Unexpected formatter changes:" >&2
            printf '%s\n' "${changed}" >&2
            exit 1
          }
          git diff --check
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add internal/ffu/inspect.go
          git commit -m 'ffu: apply canonical gofmt to payload ranges'
          git push origin HEAD:fix/ffu-payload-table-ranges
