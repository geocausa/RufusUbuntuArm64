name: Apply graphical checksum tranche

on:
  pull_request:
    branches: [main]
    paths:
      - scripts/apply-checksum-gui.py
      - .github/workflows/apply-checksum-gui.yml

permissions:
  contents: write

concurrency:
  group: apply-checksum-gui
  cancel-in-progress: false

jobs:
  apply:
    if: github.head_ref == 'feature/checksum-gui'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: feature/checksum-gui
          fetch-depth: 0
          persist-credentials: true
      - name: Apply and validate the unprivileged GTK tranche
        run: |
          set -euo pipefail
          python3 -m py_compile scripts/apply-checksum-gui.py
          python3 scripts/apply-checksum-gui.py
          python3 -m py_compile \
            gui/rufusarm64.py gui/rufusarm64_logic.py gui/rufusarm64_checksums.py \
            gui/rufusarm64_persistence.py gui/rufusarm64_persistence_logic.py
          PYTHONPATH=gui python3 -m unittest discover -s gui -p 'test_*.py'
          bash -n scripts/build-deb.sh scripts/test.sh
          ! grep -q 'pkexec' gui/rufusarm64_checksums.py
          grep -Fq 'hash", "--all", "--json"' gui/rufusarm64_logic.py
          rm scripts/apply-checksum-gui.py .github/workflows/apply-checksum-gui.yml
          git diff --check
      - name: Commit the validated product diff
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m 'Checksum parity: add unprivileged GTK checksum dialog'
          git push origin HEAD:feature/checksum-gui
