name: Apply FreeDOS full-device progress v2

on:
  push:
    branches:
      - fix/freedos-progress
    paths:
      - .github/workflows/apply-freedos-progress-v2.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Add phase and byte progress
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          def replace_once(path, old, new):
              file = Path(path)
              text = file.read_text(encoding="utf-8")
              count = text.count(old)
