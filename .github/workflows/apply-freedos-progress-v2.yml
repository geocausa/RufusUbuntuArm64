          \t}
          \tif emitter.deviceSize > ^uint64(0)/2 {
          \t\treturn errors.New("FreeDOS progress byte accounting overflow")
          \t}
          \toverallTotal := emitter.deviceSize * 2
          \tvar overallDone uint64
          \tswitch progress.Phase {
