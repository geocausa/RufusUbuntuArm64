          \t\toverallDone = 0
          \tcase freedos.ExecutionPhaseWrite:
          \t\toverallDone = progress.Processed
          \tcase freedos.ExecutionPhaseFlush:
          \t\toverallDone = emitter.deviceSize
          \tcase freedos.ExecutionPhaseReadback:
          \t\toverallDone = emitter.deviceSize + progress.Processed
          \tcase freedos.ExecutionPhaseFinish, freedos.ExecutionPhaseComplete:
          \t\toverallDone = overallTotal
          \tdefault:
          \t\treturn fmt.Errorf("unsupported FreeDOS progress phase %q", progress.Phase)
