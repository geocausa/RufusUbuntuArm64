name: Diagnose partition formatter parent-open conflict

on:
  push:
    branches:
      - diagnostic/partition-parent-open-ebusy
  pull_request:
    branches:
      - audit/pre-0.11-hardening

permissions:
  contents: read

jobs:
  reproduce:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Reproduce parent-disk open versus child formatter
        id: diagnose
        continue-on-error: true
        run: |
          set -uo pipefail
          log="${RUNNER_TEMP}/partition-parent-open.log"
          exec > >(tee "${log}") 2>&1
          echo "diagnostic log: ${log}"
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends dosfstools util-linux
          image="${RUNNER_TEMP}/partition-parent-open.img"
          truncate -s 512M "${image}"
          loop="$(sudo losetup --find --show --partscan "${image}")"
          echo "loop=${loop}"
          cleanup() {
            sudo losetup --detach "${loop}" || true
          }
          trap cleanup EXIT
          printf 'label: gpt\n,128M,U\n,128M,L\n' | sudo sfdisk "${loop}"
          sudo blockdev --rereadpt "${loop}" || sudo partx -u "${loop}"
          sudo udevadm settle || true
          partition="${loop}p1"
          for _ in $(seq 1 40); do
            [[ -b "${partition}" ]] && break
            sleep 0.25
          done
          ls -l "${loop}"* || true
          if [[ ! -b "${partition}" ]]; then
            echo "partition node did not appear: ${partition}"
            exit 2
          fi

          sudo bash -uxo pipefail -c '
            loop="$1"
            partition="$2"
            exec 9<>"${loop}"
            flock -n 9
            exec 3<>"${partition}"
            output="$(mkfs.vfat -F 32 /proc/self/fd/3 2>&1)"
            first_status=$?
            printf "FIRST_STATUS=%s\n%s\n" "${first_status}" "${output}"
            exec 9>&-
            output="$(mkfs.vfat -F 32 /proc/self/fd/3 2>&1)"
            second_status=$?
            printf "SECOND_STATUS=%s\n%s\n" "${second_status}" "${output}"
            if [[ ${second_status} -eq 0 ]]; then
              fsck.vfat -n /proc/self/fd/3
            fi
            exit 0
          ' bash "${loop}" "${partition}"
      - name: Upload diagnostic log
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: partition-parent-open-${{ github.run_id }}
          path: ${{ runner.temp }}/partition-parent-open.log
          if-no-files-found: error
