name: Export 0.10B source

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Create exact source archive
        run: |
          tar --exclude=.git -czf /tmp/rufusubuntuarm64-0.10b-source.tar.gz .
          sha256sum /tmp/rufusubuntuarm64-0.10b-source.tar.gz > /tmp/rufusubuntuarm64-0.10b-source.tar.gz.sha256
      - uses: actions/upload-artifact@v4
        with:
          name: rufusubuntuarm64-0.10b-source
          path: |
            /tmp/rufusubuntuarm64-0.10b-source.tar.gz
            /tmp/rufusubuntuarm64-0.10b-source.tar.gz.sha256
          if-no-files-found: error
