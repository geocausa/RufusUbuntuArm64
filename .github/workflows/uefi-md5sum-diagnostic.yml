name: Diagnose ARM64 uefi-md5sum build

on:
  pull_request:
    branches: [develop/0.11.0]
    paths:
      - .github/uefi-md5sum-diagnostic-trigger

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential git gzip nasm python3 python3-setuptools uuid-dev \
            gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu shellcheck sbsigntool
      - name: Run build with preserved output
        run: |
          set -o pipefail
          bash -x scripts/build-uefi-md5sum-arm64.sh dist/diagnostic 2>&1 | tee uefi-md5sum-build.log
      - name: Upload diagnostic log
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: uefi-md5sum-build-diagnostic
          path: uefi-md5sum-build.log
          if-no-files-found: error
