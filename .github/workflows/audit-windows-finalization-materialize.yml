name: Audit Windows finalization materializer

on:
  push:
    branches:
      - audit/windows-finalization

permissions:
  contents: write

jobs:
  materialize:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: true
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.26.5'
      - name: Apply and commit reviewed Windows finalization edits
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('internal/windowsmedia/windowsmedia.go')
          text = path.read_text(encoding='utf-8')
          if 'finishWindowsMediaFile(returnErr, isoFile' in text:
              raise SystemExit(0)

          replacements = [
              (
                  '\tdefer isoFile.Close()\n\tstableISOPath :=',
                  '\tdefer func() {\n\t\treturnErr = finishWindowsMediaFile(returnErr, isoFile, false, "selected Windows ISO")\n\t}()\n\tstableISOPath :='
              ),
              (
                  '\tdefer lock.Close()\n\tif err := safety.VerifyOpenDevice(lock, opts.ExpectedDeviceID, opts.TargetSize); err != nil {',
                  '\tlockHeld := false\n\tdefer func() {\n\t\treturnErr = finishWindowsMediaFile(returnErr, lock, lockHeld, "Windows media target")\n\t}()\n\tif err := safety.VerifyOpenDevice(lock, opts.ExpectedDeviceID, opts.TargetSize); err != nil {'
              ),
              (
                  '\tdefer syscall.Flock(int(lock.Fd()), syscall.LOCK_UN) // best effort\n',
                  '\tlockHeld = true\n'
              ),
          ]

          for old, new in replacements:
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'expected exactly one match, found {count}: {old[:100]!r}')
              text = text.replace(old, new, 1)

          path.write_text(text, encoding='utf-8')
          PY
          gofmt -w internal/windowsmedia/windowsmedia.go
          go test ./internal/windowsmedia
          if git diff --quiet -- internal/windowsmedia/windowsmedia.go; then
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add internal/windowsmedia/windowsmedia.go
          git commit -m 'Propagate Windows media finalization failures'
          git push origin HEAD:audit/windows-finalization
