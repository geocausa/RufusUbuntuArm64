name: Format FreeDOS command

on:
  push:
    branches:
      - feature/freedos-command
    paths:
      - .github/workflows/format-freedos-command.yml

permissions:
  contents: write

jobs:
  format:
    if: github.event.head_commit.message == 'CI: format FreeDOS command'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: feature/freedos-command
          persist-credentials: true
          fetch-depth: 0
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.26.5'
      - name: Format and verify
        run: |
          gofmt -w cmd/rufus-freedos-format/main.go cmd/rufus-freedos-format/main_test.go
          go test ./cmd/rufus-freedos-format ./internal/freedos
          rm .github/workflows/format-freedos-command.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add cmd/rufus-freedos-format/main.go cmd/rufus-freedos-format/main_test.go .github/workflows/format-freedos-command.yml
          git commit -m 'FreeDOS: format packaged command'
          git push origin HEAD:feature/freedos-command
