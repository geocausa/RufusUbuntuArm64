name: Apply PR 96 CLI and GTK integration

on:
  pull_request:
    branches:
      - feature/unified-persistence-ui

permissions:
  contents: write

jobs:
  integrate:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: feature/windows-option-eligibility
          fetch-depth: 0
      - name: Apply reviewed CLI and GTK patch
        shell: bash
        run: |
          exec > >(tee integration.log) 2>&1
          set -euxo pipefail
          printf '%s' '' | base64 -d | gzip -d > /tmp/pr96-ui.patch
          patch -p1 < /tmp/pr96-ui.patch
          gofmt -w cmd/rufus-linux/main.go internal/windowsconfig/capabilities.go internal/windowsmedia/analysis.go
          python3 -m py_compile gui/rufusarm64.py gui/test_source_structure.py
          python3 gui/test_source_structure.py
          go test ./internal/windowsconfig ./internal/windowsmedia ./cmd/rufus-linux
          git config user.name "RufusArm64 CI"
          git config user.email "actions@users.noreply.github.com"
          git add cmd/rufus-linux/main.go gui/rufusarm64.py gui/test_source_structure.py internal/windowsconfig/capabilities.go internal/windowsmedia/analysis.go
          git commit -m "windows: expose media capabilities to CLI and GTK"
          git push origin HEAD:feature/windows-option-eligibility
      - name: Upload integration diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: pr96-ui-integration-${{ github.sha }}
          if-no-files-found: warn
          retention-days: 1
          path: integration.log
