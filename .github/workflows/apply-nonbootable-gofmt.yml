name: Apply non-bootable gofmt

on:
  push:
    branches: [feature/nonbootable-executor]
    paths:
      - .github/workflows/apply-nonbootable-gofmt.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: feature/nonbootable-executor
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.22.x'
      - name: Format and verify exact files
        run: |
          set -eux
          gofmt -w cmd/rufus-nonbootable-format/main.go internal/nonbootable/backend_contract_test.go
          test -z "$(gofmt -l cmd/rufus-nonbootable-format/main.go internal/nonbootable/backend_contract_test.go)"
          go test ./internal/nonbootable ./cmd/rufus-nonbootable-format
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add cmd/rufus-nonbootable-format/main.go internal/nonbootable/backend_contract_test.go
          git commit -m "Stage 2: format non-bootable formatter sources"
          git push origin HEAD:feature/nonbootable-executor
