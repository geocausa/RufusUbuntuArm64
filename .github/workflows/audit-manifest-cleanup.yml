name: Audit manifest cleanup

on:
  pull_request:
    branches:
      - feature/persistence-wizard

permissions:
  contents: write

concurrency:
  group: audit-manifest-cleanup
  cancel-in-progress: false

jobs:
  repair-materialized-namespace:
    if: github.repository == 'geocausa/RufusUbuntuArm64' && github.event.pull_request.head.ref == 'audit/pre-0.11-hardening'
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: audit/pre-0.11-hardening
      - name: Register FAT32 names only for materialized entries
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('internal/linuxmedia/manifest.go')
          text = path.read_text(encoding='utf-8')

          old = '''\tif builder.opts.RequireFAT32 {
          \t\tif err := validateFATPath(logicalPath); err != nil {
          \t\t\treturn err
          \t\t}
          \t\tportablePath := filepath.ToSlash(logicalPath)
          \t\tfolded := strings.ToLower(portablePath)
          \t\tif previous, ok := builder.seen[folded]; ok && previous != portablePath {
          \t\t\treturn fmt.Errorf("FAT32 case-insensitive path collision between %q and %q", previous, portablePath)
          \t\t}
          \t\tbuilder.seen[folded] = portablePath
          \t}
          '''
          new = '''\tif builder.opts.RequireFAT32 {
          \t\tif err := validateFATPath(logicalPath); err != nil {
          \t\t\treturn err
          \t\t}
          \t}
          '''
          if old not in text:
              raise SystemExit('pre-materialization FAT32 registration block not found')
          text = text.replace(old, new, 1)

          old = '''\tentry := Entry{Path: filepath.ToSlash(logicalPath), Mode: uint32(info.Mode().Perm())}
          \tswitch {
          \tcase info.IsDir():
          '''
          new = '''\tentry := Entry{Path: filepath.ToSlash(logicalPath), Mode: uint32(info.Mode().Perm())}
          \tif info.Mode()&os.ModeSymlink == 0 {
          \t\tif err := builder.registerFATPath(logicalPath); err != nil {
          \t\t\treturn err
          \t\t}
          \t}
          \tswitch {
          \tcase info.IsDir():
          '''
          if old not in text:
              raise SystemExit('entry switch insertion point not found')
          text = text.replace(old, new, 1)

          old = '''\t\tif rootAlias {
          \t\t\t// Official Ubuntu media can contain a root-level convenience alias such
          '''
          new = '''\t\tif rootAlias {
          \t\t\t// Official Ubuntu media can contain a root-level convenience alias such
          '''
          if old not in text:
              raise SystemExit('root alias block not found')

          marker = '''\t\t\tbuilder.manifest.OmittedRootAliases++
          \t\t\treturn nil
          \t\t}
          \t\tentry.Mode = uint32(resolvedInfo.Mode().Perm())
          '''
          replacement = '''\t\t\tbuilder.manifest.OmittedRootAliases++
          \t\t\treturn nil
          \t\t}
          \t\tif err := builder.registerFATPath(logicalPath); err != nil {
          \t\t\treturn err
          \t\t}
          \t\tentry.Mode = uint32(resolvedInfo.Mode().Perm())
          '''
          if marker not in text:
              raise SystemExit('post-alias registration point not found')
          text = text.replace(marker, replacement, 1)

          marker = '''func (builder *manifestBuilder) descendDirectory(sourceDirectory, logicalDirectory string, ancestors map[string]struct{}, symbolic bool) error {
          '''
          helper = '''func (builder *manifestBuilder) registerFATPath(logicalPath string) error {
          \tif !builder.opts.RequireFAT32 {
          \t\treturn nil
          \t}
          \tportablePath := filepath.ToSlash(logicalPath)
          \tfolded := strings.ToLower(portablePath)
          \tif previous, ok := builder.seen[folded]; ok && previous != portablePath {
          \t\treturn fmt.Errorf("FAT32 case-insensitive path collision between %q and %q", previous, portablePath)
          \t}
          \tbuilder.seen[folded] = portablePath
          \treturn nil
          }

          func (builder *manifestBuilder) descendDirectory(sourceDirectory, logicalDirectory string, ancestors map[string]struct{}, symbolic bool) error {
          '''
          if marker not in text:
              raise SystemExit('helper insertion point not found')
          text = text.replace(marker, helper, 1)
          path.write_text(text, encoding='utf-8')
          PY
          gofmt -w internal/linuxmedia/manifest.go internal/linuxmedia/manifest_root_alias_test.go
          go test ./internal/linuxmedia
      - name: Commit the focused repair
        run: |
          if git diff --quiet -- internal/linuxmedia/manifest.go internal/linuxmedia/manifest_root_alias_test.go; then
            exit 0
          fi
          git config user.name 'RufusArm64 audit'
          git config user.email 'actions@users.noreply.github.com'
          git add internal/linuxmedia/manifest.go internal/linuxmedia/manifest_root_alias_test.go
          git commit -m 'audit: register only materialized FAT32 paths'
          git push origin HEAD:audit/pre-0.11-hardening
