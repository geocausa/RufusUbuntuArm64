name: Audit source export

on:
  push:
    branches:
      - audit/pre-0.11-hardening

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Archive exact working tree
        run: |
          tar --exclude=.git --exclude=dist -czf "${RUNNER_TEMP}/rufusarm64-audit-source.tar.gz" .
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: rufusarm64-audit-source-${{ github.sha }}
          path: ${{ runner.temp }}/rufusarm64-audit-source.tar.gz
          if-no-files-found: error
