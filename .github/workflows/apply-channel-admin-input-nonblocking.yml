name: Apply channel-admin nonblocking input wiring

on:
  push:
    branches:
      - audit/channel-admin-input-nonblocking

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: audit/channel-admin-input-nonblocking
          fetch-depth: 0
      - name: Wire nonblocking operator input opens
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('cmd/rufus-channel-admin/main.go')
          text = path.read_text()
          old = 'os.O_RDONLY|syscall.O_CLOEXEC|syscall.O_NOFOLLOW'
          new = 'os.O_RDONLY|syscall.O_CLOEXEC|syscall.O_NOFOLLOW|syscall.O_NONBLOCK'
          if text.count(old) != 1:
              raise SystemExit(f'expected one operator input open, found {text.count(old)}')
          path.write_text(text.replace(old, new, 1))
          PY
          gofmt -w cmd/rufus-channel-admin/main.go cmd/rufus-channel-admin/read_operator_linux_test.go
          go test ./cmd/rufus-channel-admin
          git rm .github/workflows/apply-channel-admin-input-nonblocking.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add cmd/rufus-channel-admin
          git commit -m "Wire nonblocking channel-admin input reads"
          git push origin HEAD:audit/channel-admin-input-nonblocking
