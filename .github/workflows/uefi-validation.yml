name: UEFI validation

on:
  push:
    paths:
      - 'internal/secureboot/**'
      - 'docs/upstream-rufus-parity.json'
      - '.github/workflows/uefi-validation.yml'
  pull_request:
    paths:
      - 'internal/secureboot/**'
      - 'docs/upstream-rufus-parity.json'
      - '.github/workflows/uefi-validation.yml'

permissions:
  contents: read

jobs:
  validate:
    name: UEFI parser and policy
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23.x'
      - name: Check Go formatting
        run: |
          unformatted="$(gofmt -l internal/secureboot/uefi.go internal/secureboot/uefi_test.go)"
          if [[ -n "${unformatted}" ]]; then
            echo "${unformatted}"
            gofmt -d internal/secureboot/uefi.go internal/secureboot/uefi_test.go
            exit 1
          fi
      - name: Run focused UEFI validation tests
        run: go test -race -count=1 ./internal/secureboot -run 'TestValidateUEFI'
      - name: Vet Secure Boot package
        run: go vet ./internal/secureboot
      - name: Validate parity inventory JSON
        run: python3 -m json.tool docs/upstream-rufus-parity.json >/dev/null
