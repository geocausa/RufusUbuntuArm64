name: UEFI validation

on:
  push:
    paths:
      - 'internal/secureboot/**'
      - 'docs/upstream-rufus-parity.json'
      - '.github/workflows/uefi-validation.yml'
  pull_request:
    paths:
      - 'internal/secureboot/**'
      - 'docs/upstream-rufus-parity.json'
      - '.github/workflows/uefi-validation.yml'

permissions:
  contents: read

jobs:
  validate:
    name: UEFI parser and policy
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23.x'
      - name: Format UEFI validator sources
        run: gofmt -w internal/secureboot/uefi.go internal/secureboot/uefi_test.go
      - name: Check Go formatting
        run: git diff --exit-code -- internal/secureboot/uefi.go internal/secureboot/uefi_test.go
      - name: Upload formatted sources on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: formatted-uefi-sources
          path: |
            internal/secureboot/uefi.go
            internal/secureboot/uefi_test.go
          if-no-files-found: error
      - name: Run focused UEFI validation tests
        run: go test -race -count=1 ./internal/secureboot -run 'TestValidateUEFI'
      - name: Vet Secure Boot package
        run: go vet ./internal/secureboot
      - name: Validate parity inventory JSON
        run: python3 -m json.tool docs/upstream-rufus-parity.json >/dev/null
