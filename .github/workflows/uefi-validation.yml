name: UEFI validation

on:
  push:
    paths:
      - 'internal/secureboot/**'
      - 'docs/upstream-rufus-parity.json'
      - '.github/workflows/uefi-validation.yml'
  pull_request:
    paths:
      - 'internal/secureboot/**'
      - 'docs/upstream-rufus-parity.json'
      - '.github/workflows/uefi-validation.yml'

permissions:
  contents: read

concurrency:
  group: uefi-validation-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: UEFI parser and policy
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.22.x'
      - name: Check Go formatting
        run: |
          unformatted="$(gofmt -l internal/secureboot/uefi.go internal/secureboot/uefi_test.go)"
          if [ -n "${unformatted}" ]; then
            printf 'UEFI validator files require gofmt:\n%s\n' "${unformatted}"
            exit 1
          fi
      - name: Run focused UEFI validation tests
        run: go test -race -count=1 ./internal/secureboot -run 'TestValidateUEFI'
      - name: Vet Secure Boot package
        run: go vet ./internal/secureboot
      - name: Validate parity inventory JSON
        run: python3 -m json.tool docs/upstream-rufus-parity.json >/dev/null
