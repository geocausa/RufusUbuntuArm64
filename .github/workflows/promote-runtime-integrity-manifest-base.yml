name: Promote runtime integrity manifest foundation

on:
  pull_request:
    branches: [develop/0.11.0]
    paths:
      - .github/runtime-integrity-trigger

permissions:
  contents: write

jobs:
  promote:
    if: github.event.pull_request.head.ref == 'feature/0.11-runtime-integrity-manifest'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff
        with:
          go-version: '1.22.x'
      - name: Normalize compressed staging payloads
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('tools/apply_runtime_integrity_manifest.py')
          text = path.read_text(encoding='utf-8')
          old = 'base64.b64decode(encoded)'
          new = "base64.b64decode(encoded + '=' * (-len(encoded) % 4))"
          if text.count(old) != 1:
              raise SystemExit(f'padding correction matched {text.count(old)} times')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY
      - name: Apply runtime integrity foundation
        run: |
          set -o pipefail
          python3 tools/apply_runtime_integrity_manifest.py 2>&1 | tee runtime-integrity-apply.log
      - name: Upload staging diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: runtime-integrity-staging
          path: runtime-integrity-apply.log
      - name: Check formatting
        run: test -z "$(gofmt -l internal/runtimeintegrity)"
      - name: Run focused race tests
        run: go test -race ./internal/runtimeintegrity
      - name: Vet runtime integrity package
        run: go vet ./internal/runtimeintegrity
      - name: Run complete Go suite
        run: go test ./...
      - name: Compile Python and validate parity inventory
        run: |
          python3 -m py_compile gui/*.py
          python3 -m json.tool docs/upstream-rufus-parity.json >/dev/null
      - name: Confirm manifest interoperability contract
        run: |
          go test ./internal/runtimeintegrity -run 'TestManifestMarshalParseRoundTrip|TestGenerateAndVerifyDeterministically' -count=5
          grep -F '# md5sum_totalbytes = 0x' internal/runtimeintegrity/manifest.go >/dev/null
      - name: Commit validated production changes
        run: |
          rm -f tools/apply_runtime_integrity_manifest.py .github/runtime-integrity-trigger .github/workflows/promote-runtime-integrity-manifest.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add internal/runtimeintegrity README.md docs/upstream-rufus-parity.json docs/uefi-runtime-integrity.md
          git add -u tools/apply_runtime_integrity_manifest.py .github/runtime-integrity-trigger .github/workflows/promote-runtime-integrity-manifest.yml
          git commit -m '0.11: add runtime media integrity manifest foundation'
          git push origin HEAD:feature/0.11-runtime-integrity-manifest
