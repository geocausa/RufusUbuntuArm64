name: Build bundled ARM64 WIM engine

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-wimlib:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Confirm native architecture
        run: |
          test "$(uname -m)" = aarch64
          uname -a

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential autoconf automake libtool pkg-config git ca-certificates \
            libxml2-dev zlib1g-dev liblzma-dev libbz2-dev liblz4-dev libzstd-dev

      - name: Fetch pinned wimlib source
        run: |
          git clone --depth 1 --branch v1.14.5 https://github.com/ebiggers/wimlib.git wimlib-src
          git -C wimlib-src rev-parse HEAD | tee wimlib-commit.txt

      - name: Configure and build AArch64 engine
        id: build
        working-directory: wimlib-src
        run: |
          set -o pipefail
          ./bootstrap 2>&1 | tee ../bootstrap.log
          ./configure \
            --without-fuse \
            --without-ntfs-3g \
            --disable-shared \
            --enable-static 2>&1 | tee ../configure.log
          make -j"$(nproc)" 2>&1 | tee ../make.log
          test -x wimlib-imagex
          strip wimlib-imagex

      - name: Collect binary, licences and logs
        if: always()
        run: |
          mkdir -p artifact/source artifact/logs
          cp -f bootstrap.log configure.log make.log artifact/logs/ 2>/dev/null || true
          cp -f wimlib-commit.txt artifact/source/UPSTREAM_COMMIT 2>/dev/null || true
          printf '%s\n' 'https://github.com/ebiggers/wimlib/tree/v1.14.5' > artifact/source/UPSTREAM_SOURCE
          cp -f wimlib-src/COPYING artifact/COPYING 2>/dev/null || true
          cp -f wimlib-src/COPYING.GPLv3 artifact/COPYING.GPLv3 2>/dev/null || true
          cp -f wimlib-src/COPYING.LGPL artifact/COPYING.LGPL 2>/dev/null || true
          if [ -x wimlib-src/wimlib-imagex ]; then
            cp wimlib-src/wimlib-imagex artifact/wimlib-imagex
            file artifact/wimlib-imagex | tee artifact/file.txt
            readelf -h artifact/wimlib-imagex > artifact/readelf-header.txt
            readelf -d artifact/wimlib-imagex > artifact/readelf-dynamic.txt || true
            sha256sum artifact/wimlib-imagex | tee artifact/wimlib-imagex.sha256
          fi

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: wimlib-imagex-arm64-v1.14.5
          path: artifact/
          if-no-files-found: error
