name: Fix device qualification package smoke

on:
  push:
    branches:
      - feature/device-qualification-executor

permissions:
  contents: write

concurrency:
  group: fix-device-qualification-package-smoke
  cancel-in-progress: false

jobs:
  fix:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: feature/device-qualification-executor
          fetch-depth: 0
      - name: Remove cross-architecture execution
        shell: bash
        run: |
          set -euo pipefail
          python3 <<'PY'
          from pathlib import Path
          path = Path("scripts/test.sh")
          text = path.read_text(encoding="utf-8")
          old = '[[ "$("${device_qualify}" version)" == "${VERSION}" ]]\n'
          if text.count(old) != 1:
              raise SystemExit(f"package execution assertion count = {text.count(old)}, want 1")
          path.write_text(text.replace(old, "", 1), encoding="utf-8")
          PY
          bash -n scripts/test.sh
          grep -Fq 'test "$("${package_root}/usr/lib/rufusarm64/rufusarm64-device-qualify" version)" = "${VERSION}"' .github/workflows/ci.yml
          git config user.name 'RufusArm64 CI'
          git config user.email 'actions@users.noreply.github.com'
          git rm .github/workflows/fix-device-qualify-package-smoke.yml docs/.pr100-package-smoke-trigger
          git add scripts/test.sh
          git commit -m 'tests: execute packaged qualifier only on ARM64'
          git push origin HEAD:feature/device-qualification-executor
