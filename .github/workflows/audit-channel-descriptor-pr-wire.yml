name: Wire acquisition descriptor reader in PR

on:
  pull_request:
    branches:
      - stage2/0.13.0

permissions:
  contents: write

jobs:
  wire:
    if: github.head_ref == 'audit/channel-descriptor-read' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: audit/channel-descriptor-read
          fetch-depth: 0
      - name: Wire and test descriptor-safe reads
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('internal/acquisition/channel.go')
          text = path.read_text()
          start = text.index('func readRegularLimited(path string, limit int) ([]byte, error) {')
          end = text.index('\nfunc writeAtomicPrivate(', start)
          replacement = 'func readRegularLimited(path string, limit int) ([]byte, error) {\n\treturn readRegularLimitedWithOpen(path, limit, openChannelMetadataNoFollow)\n}\n'
          path.write_text(text[:start] + replacement + text[end+1:])
          PY
          gofmt -w internal/acquisition/channel.go internal/acquisition/read_regular_linux.go internal/acquisition/read_regular_linux_test.go
          go test ./internal/acquisition
          rm -f .github/workflows/audit-channel-descriptor-wire.yml
          rm -f .github/workflows/audit-channel-descriptor-pr-wire.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Audit: harden acquisition metadata opens"
          git push origin HEAD:audit/channel-descriptor-read
