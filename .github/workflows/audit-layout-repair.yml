name: Audit layout repair

on:
  pull_request:
    branches:
      - feature/persistence-wizard

permissions:
  contents: write

concurrency:
  group: audit-layout-repair
  cancel-in-progress: false

jobs:
  repair-signed-offset-bounds:
    if: github.repository == 'geocausa/RufusUbuntuArm64' && github.event.pull_request.head.ref == 'audit/pre-0.11-hardening'
    runs-on: ubuntu-24.04
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: audit/pre-0.11-hardening
      - name: Patch exact layout boundaries
        run: |
          python3 - <<'PY'
          from pathlib import Path

          def replace(path, old, new):
              text = path.read_text(encoding='utf-8')
              if old not in text:
                  raise SystemExit(f'{path}: expected source block not found')
              path.write_text(text.replace(old, new, 1), encoding='utf-8')

          linux = Path('internal/linuxmedia/layout.go')
          replace(linux, '"io"\n\t"unicode/utf16"', '"io"\n\t"math"\n\t"unicode/utf16"')
          replace(
              linux,
              '''\tif !detection.Ready() {
          \t\treturn PersistentLayout{}, errors.New("media does not have a complete supported persistence contract")
          \t}
          \tif targetSize < minimumLayoutDiskSize {''',
              '''\tif !detection.Ready() {
          \t\treturn PersistentLayout{}, errors.New("media does not have a complete supported persistence contract")
          \t}
          \tif targetSize > uint64(math.MaxInt64) {
          \t\treturn PersistentLayout{}, errors.New("target exceeds the supported signed file-offset range")
          \t}
          \tif targetSize < minimumLayoutDiskSize {''',
          )
          replace(
              linux,
              '''\tif layout.SectorSize < 512 || layout.SectorSize > fat32ClusterBytes || layout.SectorSize&(layout.SectorSize-1) != 0 ||
          \t\tlayout.TargetSize < minimumLayoutDiskSize || layout.TargetSize%layout.SectorSize != 0 {''',
              '''\tif layout.TargetSize > uint64(math.MaxInt64) {
          \t\treturn errors.New("persistent layout exceeds the supported signed file-offset range")
          \t}
          \tif layout.SectorSize < 512 || layout.SectorSize > fat32ClusterBytes || layout.SectorSize&(layout.SectorSize-1) != 0 ||
          \t\tlayout.TargetSize < minimumLayoutDiskSize || layout.TargetSize%layout.SectorSize != 0 {''',
          )
          replace(
              linux,
              '''func writeLayoutAt(target io.WriterAt, data []byte, offset uint64) error {
          \tfor len(data) > 0 {''',
              '''func writeLayoutAt(target io.WriterAt, data []byte, offset uint64) error {
          \tif offset > uint64(math.MaxInt64) || uint64(len(data)) > uint64(math.MaxInt64)-offset {
          \t\treturn errors.New("GPT metadata write exceeds the supported signed file-offset range")
          \t}
          \tfor len(data) > 0 {''',
          )

          windows = Path('internal/windowsmedia/gpt.go')
          replace(windows, '"hash/crc32"\n\t"os"', '"hash/crc32"\n\t"io"\n\t"math"\n\t"os"')
          replace(
              windows,
              '''\tif target == nil {
          \t\treturn diskLayout{}, errors.New("nil GPT target")
          \t}
          \tif targetSize < minimumGPTDiskBytes {''',
              '''\tif target == nil {
          \t\treturn diskLayout{}, errors.New("nil GPT target")
          \t}
          \tif targetSize > uint64(math.MaxInt64) {
          \t\treturn diskLayout{}, errors.New("target exceeds the supported signed file-offset range")
          \t}
          \tif targetSize < minimumGPTDiskBytes {''',
          )
          replace(
              windows,
              '''\tfor _, write := range writes {
          \t\tif _, err := target.WriteAt(write.data, int64(write.offset)); err != nil {
          \t\t\treturn diskLayout{}, fmt.Errorf("write %s: %w", write.name, err)
          \t\t}
          \t}
          \tif err := target.Sync(); err != nil {''',
              '''\tfor _, write := range writes {
          \t\tif _, err := writeGPTMetadataAt(target, write.data, write.offset); err != nil {
          \t\t\treturn diskLayout{}, fmt.Errorf("write %s: %w", write.name, err)
          \t\t}
          \t}
          \tif err := target.Sync(); err != nil {''',
          )
          replace(
              windows,
              '''func alignUp(value, alignment uint64) uint64 {''',
              '''type gptMetadataWriter interface {
          \tWriteAt([]byte, int64) (int, error)
          }

          func writeGPTMetadataAt(target gptMetadataWriter, data []byte, offset uint64) (int, error) {
          \tif offset > uint64(math.MaxInt64) || uint64(len(data)) > uint64(math.MaxInt64)-offset {
          \t\treturn 0, errors.New("GPT metadata write exceeds the supported signed file-offset range")
          \t}
          \twritten, err := target.WriteAt(data, int64(offset))
          \tif err != nil {
          \t\treturn written, err
          \t}
          \tif written != len(data) {
          \t\treturn written, io.ErrShortWrite
          \t}
          \treturn written, nil
          }

          func alignUp(value, alignment uint64) uint64 {''',
          )
          PY
          gofmt -w internal/linuxmedia/layout.go internal/linuxmedia/layout_offset_test.go \
            internal/windowsmedia/gpt.go internal/windowsmedia/gpt_offset_test.go
          go test ./internal/linuxmedia ./internal/windowsmedia
      - name: Commit the focused repair
        run: |
          if git diff --quiet -- internal/linuxmedia internal/windowsmedia; then
            exit 0
          fi
          git config user.name 'RufusArm64 audit'
          git config user.email 'actions@users.noreply.github.com'
          git add internal/linuxmedia internal/windowsmedia
          git commit -m 'audit: bound GPT writes to signed offsets'
          git push origin HEAD:audit/pre-0.11-hardening
