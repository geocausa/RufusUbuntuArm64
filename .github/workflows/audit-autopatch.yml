name: Audit autopatch

on:
  push:
    branches:
      - audit/pre-0.11-hardening

permissions:
  contents: write

concurrency:
  group: audit-autopatch-${{ github.ref }}
  cancel-in-progress: false

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out the exact audit branch
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: audit/pre-0.11-hardening
          fetch-depth: 0
      - name: Apply fail-closed reviewed replacements
        run: |
          python3 scripts/pre011_autopatch.py
          python3 scripts/repair_pre011_build.py
      - name: Commit the audited cross-file patch
        run: |
          if git diff --quiet; then
            echo "No cross-file patch changes were needed."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add cmd/rufus-linux/main.go \
                  gui/rufusarm64.py \
                  gui/rufusarm64_logic.py \
                  gui/rufusarm64_persistence.py \
                  internal/windowsmedia/windowsmedia.go \
                  scripts/build-deb.sh
          git commit -m "audit: apply cross-file privilege and GUI hardening"
          git push origin HEAD:audit/pre-0.11-hardening
