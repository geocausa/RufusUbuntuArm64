name: Format FreeDOS media verifier

on:
  push:
    branches: [feature/freedos-media-verifier]
    paths:
      - .github/workflows/format-freedos-media.yml

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: feature/freedos-media-verifier
          fetch-depth: 0
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v6
        with:
          go-version: '1.22.x'
      - name: Format, verify, remove this one-shot workflow, and push
        shell: bash
        run: |
          set -euxo pipefail
          gofmt -w internal/freedos/media.go
          test -z "$(gofmt -l internal/freedos)"
          go test -count=1 ./internal/freedos
          rm -f .github/workflows/format-freedos-media.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m 'FreeDOS: format and verify media contract'
          git push origin HEAD:feature/freedos-media-verifier
