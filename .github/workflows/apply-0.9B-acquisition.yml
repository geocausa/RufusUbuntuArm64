name: Apply 0.9B acquisition hardening

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'develop/0.9.0-acquisition-foundation'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: develop/0.9.0-acquisition-foundation
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23.x'

      - name: Detect staged hardening patch
        id: staged
        shell: bash
        run: |
          if test -f .changes/0.9B-hardening.patch.xz.b64; then
            echo 'present=true' >> "$GITHUB_OUTPUT"
          else
            echo 'present=false' >> "$GITHUB_OUTPUT"
          fi

      - name: Decode and verify hardening patch
        if: steps.staged.outputs.present == 'true'
        shell: bash
        run: |
          set -euo pipefail
          base64 --decode .changes/0.9B-hardening.patch.xz.b64 > /tmp/0.9B-hardening.patch.xz
          echo 'c24baaddb96db1382e76f5c1b1480bdea0be7ba5b3301f729c723e0738bd8892  /tmp/0.9B-hardening.patch.xz' | sha256sum --check --strict
          xz --decompress --stdout /tmp/0.9B-hardening.patch.xz > /tmp/0.9B-hardening.patch
          echo '6b676d0d68652a6e2a0e6c8cf87c37d32539322ea8167dafc86735781d5ca0dd  /tmp/0.9B-hardening.patch' | sha256sum --check --strict
          git apply --check /tmp/0.9B-hardening.patch
          git apply /tmp/0.9B-hardening.patch
          rm -rf .changes

      - name: Validate hardened acquisition implementation
        if: steps.staged.outputs.present == 'true'
        shell: bash
        run: |
          set -euo pipefail
          test -z "$(gofmt -l cmd internal)"
          go test ./...
          go test -race ./internal/acquisition ./cmd/rufus-linux
          go test -shuffle=on -count=5 ./internal/acquisition ./cmd/rufus-linux
          go vet ./...
          python3 -m py_compile gui/rufusarm64.py gui/rufusarm64_logic.py gui/test_logic.py

      - name: Commit validated acquisition hardening
        if: steps.staged.outputs.present == 'true'
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add --all
          git commit -m 'Harden signed catalog parsing and downloads'
          git push origin HEAD:develop/0.9.0-acquisition-foundation
