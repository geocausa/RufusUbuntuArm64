name: Diagnose canonical tag publication

on:
  push:
    branches:
      - diagnostic/0.11-tag-publication
    paths:
      - .diagnose-tag-publication-trigger

permissions:
  actions: read
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Verify missing-tag-safe exact lookup
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="v0.11.0"
          existing="$(
            gh api "/repos/${GITHUB_REPOSITORY}/git/matching-refs/tags/${tag}" \
              --jq ".[] | select(.ref == \"refs/tags/${tag}\") | .object.sha"
          )"
          test -z "${existing}"
          echo "Exact missing-tag lookup returned an empty result."
