name: Diagnose canonical tag publication

on:
  push:
    branches:
      - diagnostic/0.11-tag-publication
    paths:
      - .diagnose-tag-publication-trigger

permissions:
  actions: write
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Dispatch the installed published-release verifier
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          for attempt in 1 2 3 4 5 6; do
            if gh workflow run release-published.yml \
              --repo "${GITHUB_REPOSITORY}" \
              --ref main \
              -f tag=v0.11.0; then
              exit 0
            fi
            if [[ "${attempt}" -eq 6 ]]; then
              echo "Could not dispatch release-published.yml after ${attempt} attempts" >&2
              exit 1
            fi
            sleep 2
          done
