name: Diagnose canonical tag publication

on:
  push:
    branches:
      - diagnostic/0.11-tag-publication
    paths:
      - .diagnose-tag-publication-trigger

permissions:
  actions: read
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: feature/release-published-contract
          persist-credentials: false
      - name: Validate the live release with the proposed contract
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          release_json="${RUNNER_TEMP}/release.json"
          asset_dir="${RUNNER_TEMP}/published-assets"
          mkdir -p "${asset_dir}"
          gh release view v0.11.0 \
            --repo "${GITHUB_REPOSITORY}" \
            --json tagName,targetCommitish,isDraft,isPrerelease,publishedAt,url,assets \
            > "${release_json}"
          gh release download v0.11.0 \
            --repo "${GITHUB_REPOSITORY}" \
            --dir "${asset_dir}"
          python3 scripts/check-published-release.py "${release_json}" "${asset_dir}"
