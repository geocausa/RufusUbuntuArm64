name: Diagnose canonical tag publication

on:
  push:
    branches:
      - diagnostic/0.11-tag-publication
    paths:
      - .diagnose-tag-publication-trigger

permissions:
  actions: read
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Verify published 0.11.0 assets and package checksum
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release view v0.11.0 \
            --repo "${GITHUB_REPOSITORY}" \
            --json tagName,targetCommitish,isDraft,isPrerelease,publishedAt,url,assets \
            --jq '{tagName,targetCommitish,isDraft,isPrerelease,publishedAt,url,assets:[.assets[]|{name,size,state,digest,url}]}'
          release_dir="$(mktemp -d)"
          trap 'rm -rf "${release_dir}"' EXIT
          gh release download v0.11.0 \
            --repo "${GITHUB_REPOSITORY}" \
            --pattern 'rufusarm64_0.11.0_arm64.deb' \
            --pattern 'rufusarm64_0.11.0_arm64.deb.sha256' \
            --dir "${release_dir}"
          cd "${release_dir}"
          cat rufusarm64_0.11.0_arm64.deb.sha256
          sha256sum --check --strict rufusarm64_0.11.0_arm64.deb.sha256
          stat --format='Downloaded package size: %s bytes' rufusarm64_0.11.0_arm64.deb
