name: Audit GPT hardening

on:
  pull_request:
    branches:
      - feature/persistence-wizard

permissions:
  contents: write

concurrency:
  group: audit-gpt-hardening
  cancel-in-progress: false

jobs:
  harden:
    if: github.repository == 'geocausa/RufusUbuntuArm64' && github.event.pull_request.head.ref == 'audit/pre-0.11-hardening'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: audit/pre-0.11-hardening
      - name: Apply exact GPT writer changes
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('internal/windowsmedia/gpt.go')
          text = path.read_text(encoding='utf-8')

          def replace(old, new):
              global text
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'expected one occurrence, found {count}: {old[:80]!r}')
              text = text.replace(old, new, 1)

          replace(
              '''type diskLayout struct {
          \tData partitionLayout
          \tBoot *partitionLayout
          }
          ''',
              '''type diskLayout struct {
          \tData partitionLayout
          \tBoot *partitionLayout
          }

          type gptTarget interface {
          \tio.ReaderAt
          \tio.WriterAt
          \tSync() error
          }
          ''',
          )
          replace(
              'func writeGPT(target *os.File, targetSize, sectorSize uint64, label string, uefiNTFS bool, bootImageSize uint64) (diskLayout, error) {',
              'func writeGPT(target gptTarget, targetSize, sectorSize uint64, label string, uefiNTFS bool, bootImageSize uint64) (diskLayout, error) {',
          )
          replace(
              '''\twrites := []struct {
          \t\toffset uint64
          \t\tdata   []byte
          \t\tname   string
          \t}{
          \t\t{backupEntriesLBA * sectorSize, entries, "backup GPT entries"},
          \t\t{backupHeaderLBA * sectorSize, backupHeader, "backup GPT header"},
          \t\t{primaryEntriesLBA * sectorSize, entries, "primary GPT entries"},
          \t\t{sectorSize, primaryHeader, "primary GPT header"},
          \t\t{0, protectiveMBR, "protective MBR"},
          \t}
          \tfor _, write := range writes {
          \t\tif _, err := writeGPTMetadataAt(target, write.data, write.offset); err != nil {
          \t\t\treturn diskLayout{}, fmt.Errorf("write %s: %w", write.name, err)
          \t\t}
          \t}
          \tif err := target.Sync(); err != nil {
          \t\treturn diskLayout{}, fmt.Errorf("sync GPT metadata: %w", err)
          \t}
          \treturn layout, nil
          ''',
              '''\tbackupRegions := []gptMetadataRegion{
          \t\t{offset: backupEntriesLBA * sectorSize, data: entries, name: "backup GPT entries"},
          \t\t{offset: backupHeaderLBA * sectorSize, data: backupHeader, name: "backup GPT header"},
          \t}
          \tprimaryRegions := []gptMetadataRegion{
          \t\t{offset: primaryEntriesLBA * sectorSize, data: entries, name: "primary GPT entries"},
          \t\t{offset: sectorSize, data: primaryHeader, name: "primary GPT header"},
          \t\t{offset: 0, data: protectiveMBR, name: "protective MBR"},
          \t}
          \tfor _, region := range backupRegions {
          \t\tif _, err := writeGPTMetadataAt(target, region.data, region.offset); err != nil {
          \t\t\treturn diskLayout{}, fmt.Errorf("write %s: %w", region.name, err)
          \t\t}
          \t}
          \tif err := target.Sync(); err != nil {
          \t\treturn diskLayout{}, fmt.Errorf("make backup GPT durable: %w", err)
          \t}
          \tfor _, region := range primaryRegions {
          \t\tif _, err := writeGPTMetadataAt(target, region.data, region.offset); err != nil {
          \t\t\treturn diskLayout{}, fmt.Errorf("write %s: %w", region.name, err)
          \t\t}
          \t}
          \tif err := target.Sync(); err != nil {
          \t\treturn diskLayout{}, fmt.Errorf("make primary GPT durable: %w", err)
          \t}
          \tregions := append(append([]gptMetadataRegion(nil), backupRegions...), primaryRegions...)
          \tif err := verifyGPTMetadata(target, regions); err != nil {
          \t\treturn diskLayout{}, fmt.Errorf("verify GPT metadata: %w", err)
          \t}
          \treturn layout, nil
          ''',
          )
          path.write_text(text, encoding='utf-8')
          PY
          gofmt -w internal/windowsmedia/gpt.go internal/windowsmedia/gpt_readback.go internal/windowsmedia/gpt_durability_test.go
          go test ./internal/windowsmedia
      - name: Commit GPT hardening
        run: |
          git config user.name 'RufusArm64 audit'
          git config user.email 'actions@users.noreply.github.com'
          git add internal/windowsmedia/gpt.go internal/windowsmedia/gpt_readback.go internal/windowsmedia/gpt_durability_test.go
          git commit -m 'audit: make Windows GPT backup-first and verified'
          git push origin HEAD:audit/pre-0.11-hardening
