name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23.x'
      - name: Derive version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
      - name: Test
        run: |
          test -z "$(gofmt -l cmd internal)"
          go test -race ./...
          go vet ./...
          python3 -m py_compile gui/rufusarm64.py
      - name: Build ARM64 Debian package
        run: VERSION="$VERSION" ./scripts/build-deb.sh
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/rufusarm64_${{ env.VERSION }}_arm64.deb
            dist/rufusarm64_${{ env.VERSION }}_arm64.deb.sha256
