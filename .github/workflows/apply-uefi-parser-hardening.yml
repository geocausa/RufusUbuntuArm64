name: Apply UEFI parser hardening

on:
  push:
    branches:
      - feature/0.11-uefi-parser-hardening
    paths:
      - '.github/patches/uefi-parser-hardening.patch'
      - '.github/workflows/apply-uefi-parser-hardening.yml'

permissions:
  contents: write

concurrency:
  group: apply-uefi-parser-hardening
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: feature/0.11-uefi-parser-hardening
          fetch-depth: 0
          persist-credentials: true
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.22.x'
      - name: Verify and apply reviewed patch
        run: |
          set -euo pipefail
          git apply --check .github/patches/uefi-parser-hardening.patch
          git apply .github/patches/uefi-parser-hardening.patch
          gofmt -w internal/secureboot/uefi.go internal/secureboot/uefi_test.go
          git diff --check
      - name: Run focused and complete Go tests
        run: |
          set -euo pipefail
          go test -race -count=1 ./internal/secureboot -run 'TestValidateUEFI'
          go test ./...
      - name: Commit validated production changes
        run: |
          set -euo pipefail
          git add internal/secureboot/uefi.go internal/secureboot/uefi_test.go
          git diff --cached --check
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m '0.11: tighten UEFI parser bounds and SBAT ambiguity checks'
          git push origin 'HEAD:feature/0.11-uefi-parser-hardening'
