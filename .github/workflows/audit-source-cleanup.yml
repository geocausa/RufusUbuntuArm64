name: Audit source cleanup

on:
  pull_request:
    branches:
      - feature/persistence-wizard

permissions:
  contents: write

concurrency:
  group: audit-source-cleanup
  cancel-in-progress: false

jobs:
  remove-exact-duplicates:
    if: github.repository == 'geocausa/RufusUbuntuArm64' && github.event.pull_request.head.ref == 'audit/pre-0.11-hardening'
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: audit/pre-0.11-hardening
      - name: Remove later duplicate definitions in the same scope
        run: |
          python3 - <<'PY'
          import ast
          from pathlib import Path

          path = Path('gui/rufusarm64.py')
          source = path.read_text(encoding='utf-8')
          lines = source.splitlines(keepends=True)
          tree = ast.parse(source, filename=str(path))
          removals = []

          def inspect_scope(nodes):
              seen = set()
              for node in nodes:
                  if isinstance(node, (ast.FunctionDef, ast.AsyncFunctionDef, ast.ClassDef)):
                      kind = 'class' if isinstance(node, ast.ClassDef) else 'function'
                      key = (kind, node.name)
                      if key in seen:
                          start = node.lineno - 1
                          end = node.end_lineno
                          while end < len(lines) and not lines[end].strip():
                              end += 1
                          removals.append((start, end, f'{kind} {node.name}'))
                      else:
                          seen.add(key)
                  if isinstance(node, ast.ClassDef):
                      inspect_scope(node.body)

          inspect_scope(tree.body)
          if not removals:
              raise SystemExit(0)
          for start, end, label in sorted(removals, reverse=True):
              print(f'removing duplicate {label} at lines {start + 1}-{end}')
              del lines[start:end]
          path.write_text(''.join(lines), encoding='utf-8')
          PY
          python3 gui/test_source_structure.py
          python3 -m py_compile gui/rufusarm64.py
      - name: Commit the structural cleanup when needed
        run: |
          if git diff --quiet -- gui/rufusarm64.py; then
            exit 0
          fi
          git config user.name 'RufusArm64 audit'
          git config user.email 'actions@users.noreply.github.com'
          git add gui/rufusarm64.py
          git commit -m 'audit: remove duplicated Python definitions'
          git push origin HEAD:audit/pre-0.11-hardening
