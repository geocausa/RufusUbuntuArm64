name: Apply FFU trust-bundle publication

on:
  pull_request:
    branches:
      - stage3/0.14.0
    paths:
      - .github/workflows/apply-ffu-trust-publication.yml
      - .github/patches/ffu-trust-publication.*.b64

permissions:
  contents: write

jobs:
  apply-tested-patch:
    if: github.event.pull_request.head.ref == 'feature/ffu-trust-bundle-publication'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: feature/ffu-trust-bundle-publication
          fetch-depth: 0
          persist-credentials: true
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff
        with:
          go-version: '1.22.x'
          cache: false
      - name: Apply exact reviewed patch and verify
        shell: bash
        run: |
          set -euo pipefail
          log="$RUNNER_TEMP/ffu-publication-executor.log"
          {
            echo '=== reconstruct reviewed patch ==='
            cat .github/patches/ffu-trust-publication.*.b64 > "$RUNNER_TEMP/ffu-trust-publication.patch.gz.b64"
            printf '%s  %s\n' \
              e35e13f6b343ea712f11ed7d1e6793b30a98f16b5a14585169f36b5eaec6c60b \
              "$RUNNER_TEMP/ffu-trust-publication.patch.gz.b64" \
              | sha256sum --check --strict
            base64 --decode "$RUNNER_TEMP/ffu-trust-publication.patch.gz.b64" \
              | gzip --decompress --stdout \
              > "$RUNNER_TEMP/ffu-trust-publication.patch"
            printf '%s  %s\n' \
              ae58d3129f96dace9d9782af5f2c884aa4b6be64b2fe8a2ff06235af1baee31c \
              "$RUNNER_TEMP/ffu-trust-publication.patch" \
              | sha256sum --check --strict

            echo '=== apply reviewed patch ==='
            git apply --check "$RUNNER_TEMP/ffu-trust-publication.patch"
            git apply "$RUNNER_TEMP/ffu-trust-publication.patch"
            gofmt -w internal/ffu/trust_store*.go

            echo '=== package tests ==='
            go test -count=1 ./internal/ffu
            echo '=== vet ==='
            go vet ./internal/ffu
            echo '=== race tests ==='
            go test -race -count=1 ./internal/ffu
            echo '=== fuzz smoke ==='
            go test -run='^$' -fuzz='FuzzDecodeCanonicalTrustStoreJSONDoesNotPanic' -fuzztime=5s ./internal/ffu
            echo '=== ARM64 cross-build ==='
            GOOS=linux GOARCH=arm64 go test -c ./internal/ffu -o "$RUNNER_TEMP/ffu-publication-arm64.test"

            echo '=== remove temporary machinery ==='
            rm -f \
              .github/workflows/snapshot-ffu-publication.yml \
              .github/workflows/apply-ffu-trust-publication.yml \
              .github/patches/ffu-trust-publication.*.b64
            git diff --check
            python3 - <<'PY'
            import subprocess

            allowed = {
                '.github/patches/ffu-trust-publication.00a.b64',
                '.github/patches/ffu-trust-publication.00b.b64',
                '.github/patches/ffu-trust-publication.01.b64',
                '.github/workflows/apply-ffu-trust-publication.yml',
                '.github/workflows/snapshot-ffu-publication.yml',
                'docs/ffu-trust-bundle-publication.md',
                'internal/ffu/trust_store_linux.go',
                'internal/ffu/trust_store_linux_test.go',
                'internal/ffu/trust_store_rename_linux.go',
                'internal/ffu/trust_store_rename_linux_amd64.go',
                'internal/ffu/trust_store_rename_linux_arm64.go',
            }
            paths = {line[3:] for line in subprocess.check_output(
                ['git', 'status', '--short'], text=True
            ).splitlines()}
            unexpected = sorted(paths - allowed)
            if unexpected:
                raise SystemExit('unexpected changed paths: ' + ', '.join(unexpected))
            required = {
                'docs/ffu-trust-bundle-publication.md',
                'internal/ffu/trust_store_linux.go',
                'internal/ffu/trust_store_linux_test.go',
                'internal/ffu/trust_store_rename_linux.go',
                'internal/ffu/trust_store_rename_linux_amd64.go',
                'internal/ffu/trust_store_rename_linux_arm64.go',
            }
            missing = sorted(required - paths)
            if missing:
                raise SystemExit('missing product paths: ' + ', '.join(missing))
            PY
          } 2>&1 | tee "$log"
      - name: Upload executor log
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: ffu-publication-executor-log
          path: ${{ runner.temp }}/ffu-publication-executor.log
          if-no-files-found: warn
          retention-days: 1
      - name: Commit clean product change
        shell: bash
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m 'FFU: publish authenticated trust-bundle generations safely'
          git push origin HEAD:feature/ffu-trust-bundle-publication
