name: Apply PR 96 version source repair

on:
  pull_request:
    branches:
      - feature/unified-persistence-ui

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: feature/windows-option-eligibility
          fetch-depth: 0
      - name: Restore exact shell quoting
        shell: bash
        run: |
          set -euxo pipefail
          python3 <<'PY'
          from pathlib import Path

          build = Path('scripts/build-deb.sh')
          lines = build.read_text().splitlines()
          start = next(i for i, line in enumerate(lines) if line.startswith('PROJECT_VERSION='))
          end = next(i for i, line in enumerate(lines[start:], start) if line == 'ARCH="arm64"')
          replacement = [
              r'''PROJECT_VERSION="$(tr -d '\r\n' < "${ROOT_DIR}/VERSION")"''',
              r'''VERSION="${VERSION:-${PROJECT_VERSION}}"''',
              r'''RUFUS_ALLOW_NONRELEASE_VERSION="${RUFUS_ALLOW_NONRELEASE_VERSION:-0}"''',
              r'''if [[ "${VERSION}" != "${PROJECT_VERSION}" && "${RUFUS_ALLOW_NONRELEASE_VERSION}" != "1" ]]; then''',
              r'''  echo "Non-release version ${VERSION} requires RUFUS_ALLOW_NONRELEASE_VERSION=1" >&2''',
              r'''  exit 1''',
              r'''fi''',
              r'''if ! dpkg --validate-version "${VERSION}" >/dev/null 2>&1; then''',
              r'''  echo "Invalid Debian package version: ${VERSION}" >&2''',
              r'''  exit 1''',
              r'''fi''',
          ]
          lines[start:end] = replacement
          build.write_text('\n'.join(lines) + '\n')

          tests = Path('scripts/test.sh')
          lines = tests.read_text().splitlines()
          start = next(i for i, line in enumerate(lines) if line.startswith('PROJECT_VERSION='))
          end = next(i for i, line in enumerate(lines[start:], start) if line == 'python3 scripts/check-version-sync.py')
          replacement = [
              r'''PROJECT_VERSION="$(tr -d '\r\n' < VERSION)"''',
              r'''VERSION="${VERSION:-${PROJECT_VERSION}}"''',
              r'''RUFUS_ALLOW_NONRELEASE_VERSION="${RUFUS_ALLOW_NONRELEASE_VERSION:-0}"''',
              r'''if [[ "${VERSION}" != "${PROJECT_VERSION}" && "${RUFUS_ALLOW_NONRELEASE_VERSION}" != "1" ]]; then''',
              r'''  echo "Non-release version ${VERSION} requires RUFUS_ALLOW_NONRELEASE_VERSION=1" >&2''',
              r'''  exit 1''',
              r'''fi''',
              r'''if ! dpkg --validate-version "${VERSION}" >/dev/null 2>&1; then''',
              r'''  echo "Invalid Debian package version: ${VERSION}" >&2''',
              r'''  exit 1''',
              r'''fi''',
              r'''export VERSION RUFUS_ALLOW_NONRELEASE_VERSION''',
              r'''PACKAGE="dist/rufusarm64_${VERSION}_arm64.deb"''',
              '',
              r'''grep -Fq "RufusArm64 ${PROJECT_VERSION}" docs/rufusarm64-cli.1''',
              r'''grep -Fq "## ${PROJECT_VERSION} —" CHANGELOG.md''',
              r'''grep -Fq "release version=\"${PROJECT_VERSION}\"" packaging/io.github.geocausa.RufusArm64.metainfo.xml''',
              r'''grep -Fq "rufusarm64_${PROJECT_VERSION}_arm64.deb" README.md''',
          ]
          lines[start:end] = replacement
          tests.write_text('\n'.join(lines) + '\n')
          PY
          bash -n scripts/build-deb.sh scripts/test.sh scripts/reproducible-package.sh
          project_version="$(tr -d '\r\n' < VERSION)"
          test "${project_version}" = '0.11.0'
          VERSION='0.11.0+pr96.repair' RUFUS_ALLOW_NONRELEASE_VERSION=1 bash -c '
            set -euo pipefail
            project_version="$(tr -d "\r\n" < VERSION)"
            dpkg --validate-version "$VERSION"
            grep -Fq "RufusArm64 ${project_version}" docs/rufusarm64-cli.1
            grep -Fq "## ${project_version} —" CHANGELOG.md
            grep -Fq "release version=\"${project_version}\"" packaging/io.github.geocausa.RufusArm64.metainfo.xml
            grep -Fq "rufusarm64_${project_version}_arm64.deb" README.md
            python3 scripts/check-version-sync.py
          '
          grep -Fq 'PROJECT_VERSION="$(tr -d '\''\r\n'\'' < VERSION)"' scripts/test.sh
          grep -Fq 'PROJECT_VERSION="$(tr -d '\''\r\n'\'' < "${ROOT_DIR}/VERSION")"' scripts/build-deb.sh
          git config user.name "RufusArm64 CI"
          git config user.email "actions@users.noreply.github.com"
          git add scripts/build-deb.sh scripts/test.sh
          git commit -m "build: preserve shell escapes in version guards"
          git push origin HEAD:feature/windows-option-eligibility
