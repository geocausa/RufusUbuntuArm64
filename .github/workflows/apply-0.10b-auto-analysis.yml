name: Apply 0.10B automatic persistence analysis

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - name: Reconstruct and verify reviewed patch
        run: |
          base64 -d .recovery/0.10b-auto-analysis.patch.xz.b64 > /tmp/0.10b.patch.xz
          echo 'b79dec7bbda6d102093ab6cb47522d4f425d5a2f88fd9edc23cac076b6681339  /tmp/0.10b.patch.xz' | sha256sum -c -
          xz -dc /tmp/0.10b.patch.xz > /tmp/0.10b.patch
          echo '68cd77cb56620bdcaa62666fd6ecc750188ee3c240f9f5344263fdd9e23bc2ff  /tmp/0.10b.patch' | sha256sum -c -
          git apply --check /tmp/0.10b.patch
          git apply /tmp/0.10b.patch
      - name: Validate automatic read-only analysis
        run: |
          go test ./...
          go test -race ./internal/linuxmedia ./internal/persistence ./internal/sourcefile ./cmd/rufus-linux
          go test -shuffle=on -count=5 ./internal/linuxmedia ./internal/persistence ./internal/sourcefile ./cmd/rufus-linux
          go vet ./...
          python3 -m py_compile gui/rufusarm64.py gui/rufusarm64_logic.py gui/test_logic.py
          (cd gui && python3 -m unittest -v test_logic.py)
          grep -F 'loop,ro,nosuid,nodev,noexec' internal/linuxmedia/analyze.go
          ! grep -E '(--experimental-persistence|"write"|--device)' gui/rufusarm64_logic.py | grep -F 'build_persistence_analyze_command'
      - name: Commit validated 0.10B source
        env:
          BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add README.md cmd/rufus-linux/main.go cmd/rufus-linux/main_test.go \
            docs/gui-acquisition-persistence.md docs/rufusarm64-cli.1 \
            gui/rufusarm64.py gui/rufusarm64_logic.py gui/test_logic.py \
            internal/linuxmedia/analyze.go internal/linuxmedia/analyze_test.go \
            internal/sourcefile/identity_text.go internal/sourcefile/identity_text_test.go
          git diff --cached --check
          git commit -m '0.10B: automatic read-only persistence analysis'
          git push origin HEAD:"${BRANCH}"
