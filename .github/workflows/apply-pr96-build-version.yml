name: Apply PR 96 build versioning

on:
  pull_request:
    branches:
      - feature/unified-persistence-ui

permissions:
  contents: write

jobs:
  integrate:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: feature/windows-option-eligibility
          fetch-depth: 0
      - name: Apply reviewed build-version patch
        shell: bash
        run: |
          exec > >(tee integration.log) 2>&1
          set -euxo pipefail
          python3 <<'PY'
          from pathlib import Path
          import re

          def replace_once(text, pattern, replacement, label):
              updated, count = re.subn(pattern, replacement, text, count=1, flags=re.MULTILINE | re.DOTALL)
              if count != 1:
                  raise SystemExit(f"{label}: replacement count {count}, want 1")
              return updated

          build = Path("scripts/build-deb.sh")
          text = build.read_text()
          if "RUFUS_ALLOW_NONRELEASE_VERSION" not in text:
              text = replace_once(
                  text,
                  r'PROJECT_VERSION="\$\(tr -d \'\\r\\n\' < "\$\{ROOT_DIR\}/VERSION"\)"\nVERSION="\$\{VERSION:-\$\{PROJECT_VERSION\}\}"\nif \[\[ "\$\{VERSION\}" != "\$\{PROJECT_VERSION\}" \]\]; then\n.*?\nfi\n(?=ARCH="arm64")',
                  '''PROJECT_VERSION="$(tr -d '\\r\\n' < "${ROOT_DIR}/VERSION")"
          VERSION="${VERSION:-${PROJECT_VERSION}}"
          RUFUS_ALLOW_NONRELEASE_VERSION="${RUFUS_ALLOW_NONRELEASE_VERSION:-0}"
          if [[ "${VERSION}" != "${PROJECT_VERSION}" && "${RUFUS_ALLOW_NONRELEASE_VERSION}" != "1" ]]; then
            echo "Non-release version ${VERSION} requires RUFUS_ALLOW_NONRELEASE_VERSION=1" >&2
            exit 1
          fi
          if ! dpkg --validate-version "${VERSION}" >/dev/null 2>&1; then
            echo "Invalid Debian package version: ${VERSION}" >&2
            exit 1
          fi
          ''',
                  "build-deb version guard",
              )
              old = '"${ROOT_DIR}/CHANGELOG.md" "${VERSION}" <<\'PYDATE\''
              new = '"${ROOT_DIR}/CHANGELOG.md" "${PROJECT_VERSION}" <<\'PYDATE\''
              if text.count(old) != 1:
                  raise SystemExit(f"build-deb changelog version count {text.count(old)}, want 1")
              text = text.replace(old, new, 1)
              build.write_text(text)

          tests = Path("scripts/test.sh")
          text = tests.read_text()
          if "RUFUS_ALLOW_NONRELEASE_VERSION" not in text:
              text = replace_once(
                  text,
                  r'PROJECT_VERSION="\$\(tr -d \'\\r\\n\' < VERSION\)"\nVERSION="\$\{VERSION:-\$\{PROJECT_VERSION\}\}"\nif \[\[ "\$\{VERSION\}" != "\$\{PROJECT_VERSION\}" \]\]; then\n.*?\nfi\nexport VERSION\nPACKAGE="dist/rufusarm64_\$\{VERSION\}_arm64\.deb"\n\n.*?grep -Fq "rufusarm64_\$\{VERSION\}_arm64\.deb" README\.md\n',
                  '''PROJECT_VERSION="$(tr -d '\\r\\n' < VERSION)"
          VERSION="${VERSION:-${PROJECT_VERSION}}"
          RUFUS_ALLOW_NONRELEASE_VERSION="${RUFUS_ALLOW_NONRELEASE_VERSION:-0}"
          if [[ "${VERSION}" != "${PROJECT_VERSION}" && "${RUFUS_ALLOW_NONRELEASE_VERSION}" != "1" ]]; then
            echo "Non-release version ${VERSION} requires RUFUS_ALLOW_NONRELEASE_VERSION=1" >&2
            exit 1
          fi
          if ! dpkg --validate-version "${VERSION}" >/dev/null 2>&1; then
            echo "Invalid Debian package version: ${VERSION}" >&2
            exit 1
          fi
          export VERSION RUFUS_ALLOW_NONRELEASE_VERSION
          PACKAGE="dist/rufusarm64_${VERSION}_arm64.deb"

          grep -Fq "RufusArm64 ${PROJECT_VERSION}" docs/rufusarm64-cli.1
          grep -Fq "## ${PROJECT_VERSION} —" CHANGELOG.md
          grep -Fq "release version=\"${PROJECT_VERSION}\"" packaging/io.github.geocausa.RufusArm64.metainfo.xml
          grep -Fq "rufusarm64_${PROJECT_VERSION}_arm64.deb" README.md
          ''',
                  "test version guard",
              )
              tests.write_text(text)

          repro = Path("scripts/reproducible-package.sh")
          repro.write_text('''#!/usr/bin/env bash
          set -euo pipefail

          cd "$(dirname "$0")/.."
          PROJECT_VERSION="$(tr -d '\\r\\n' < VERSION)"
          VERSION="${VERSION:-${PROJECT_VERSION}}"
          RUFUS_ALLOW_NONRELEASE_VERSION="${RUFUS_ALLOW_NONRELEASE_VERSION:-0}"
          if [[ "${VERSION}" != "${PROJECT_VERSION}" && "${RUFUS_ALLOW_NONRELEASE_VERSION}" != "1" ]]; then
            echo "Non-release version ${VERSION} requires RUFUS_ALLOW_NONRELEASE_VERSION=1" >&2
            exit 1
          fi
          if ! dpkg --validate-version "${VERSION}" >/dev/null 2>&1; then
            echo "Invalid Debian package version: ${VERSION}" >&2
            exit 1
          fi
          export VERSION RUFUS_ALLOW_NONRELEASE_VERSION
          work="$(mktemp -d)"
          trap 'rm -rf "${work}"' EXIT

          first="${work}/first"
          second="${work}/second"
          mkdir -p "${first}" "${second}"

          OUTPUT_DIR="${first}" bash ./scripts/build-deb.sh
          sleep 1
          OUTPUT_DIR="${second}" bash ./scripts/build-deb.sh

          package="rufusarm64_${VERSION}_arm64.deb"
          checksum="${package}.sha256"
          cmp --silent "${first}/${package}" "${second}/${package}" || {
            echo "Debian package is not reproducible across two clean builds" >&2
            sha256sum "${first}/${package}" "${second}/${package}" >&2
            exit 1
          }
          cmp --silent "${first}/${checksum}" "${second}/${checksum}" || {
            echo "Debian package checksum sidecar is not reproducible" >&2
            exit 1
          }

          echo "Reproducible package confirmed: ${package}"
          ''')

          workflow = Path(".github/workflows/ci.yml")
          lines = workflow.read_text().splitlines()

          def replace_step(lines, old_name, occurrence, include_success_guard):
              indexes = [i for i, line in enumerate(lines) if line.strip() == f"- name: {old_name}"]
              if occurrence >= len(indexes):
                  raise SystemExit(f"{old_name}: occurrence {occurrence} missing from {len(indexes)} matching steps")
              start = indexes[occurrence]
              prefix = lines[start][: len(lines[start]) - len(lines[start].lstrip())]
              end = start + 1
              while end < len(lines):
                  line = lines[end]
                  if line.startswith(prefix + "- name:"):
                      break
                  end += 1
              relative = [
                  "- name: Resolve traceable build version",
                  "  id: version",
              ]
              if include_success_guard:
                  relative.append("  if: success()")
              relative.extend([
                  "  run: |",
                  "    project_version=\"$(tr -d '\\r\\n' < VERSION)\"",
                  "    version=\"${project_version}\"",
                  "    allow_nonrelease=0",
                  "    if [[ \"${GITHUB_EVENT_NAME}\" == \"pull_request\" ]]; then",
                  "      pr_number=\"$(python3 -c 'import json,os; print(json.load(open(os.environ[\"GITHUB_EVENT_PATH\"]))[\"number\"])')\"",
                  "      head_sha=\"$(python3 -c 'import json,os; print(json.load(open(os.environ[\"GITHUB_EVENT_PATH\"]))[\"pull_request\"][\"head\"][\"sha\"])')\"",
                  "      version=\"${project_version}+pr${pr_number}.${head_sha:0:8}\"",
                  "      allow_nonrelease=1",
                  "    fi",
                  "    dpkg --validate-version \"${version}\"",
                  "    echo \"VERSION=${version}\" >> \"$GITHUB_ENV\"",
                  "    echo \"RUFUS_ALLOW_NONRELEASE_VERSION=${allow_nonrelease}\" >> \"$GITHUB_ENV\"",
                  "    echo \"version=${version}\" >> \"$GITHUB_OUTPUT\"",
              ])
              lines[start:end] = [prefix + item for item in relative]

          if not any("Resolve traceable build version" in line for line in lines):
              replace_step(lines, "Read canonical project version", 1, False)
              replace_step(lines, "Read canonical project version", 0, True)
              workflow.write_text("\n".join(lines) + "\n")
          PY
          bash -n scripts/build-deb.sh scripts/test.sh scripts/reproducible-package.sh
          dpkg --validate-version '0.11.0+pr96.deadbeef'
          python3 - <<'PY'
          from pathlib import Path
          build = Path('scripts/build-deb.sh').read_text()
          tests = Path('scripts/test.sh').read_text()
          ci = Path('.github/workflows/ci.yml').read_text()
          assert '"${PROJECT_VERSION}" <<\'PYDATE\'' in build
          assert 'RUFUS_ALLOW_NONRELEASE_VERSION' in build
          assert 'RufusArm64 ${PROJECT_VERSION}' in tests
          assert ci.count('Resolve traceable build version') == 2
          assert 'GITHUB_EVENT_PATH' in ci
          assert '+pr${pr_number}.${head_sha:0:8}' in ci
          PY
          git config user.name "RufusArm64 CI"
          git config user.email "actions@users.noreply.github.com"
          git add scripts/build-deb.sh scripts/test.sh scripts/reproducible-package.sh .github/workflows/ci.yml
          if git diff --cached --quiet; then
            echo "Traceable build versioning is already present."
            exit 0
          fi
          git commit -m "build: stamp traceable pull request versions"
          git push origin HEAD:feature/windows-option-eligibility
      - name: Upload integration diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: pr96-build-version-integration
          path: integration.log
          if-no-files-found: warn
          retention-days: 1
