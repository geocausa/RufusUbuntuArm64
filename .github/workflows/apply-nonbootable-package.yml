name: Apply non-bootable package integration

on:
  push:
    branches: [feature/nonbootable-executor]
    paths:
      - .github/workflows/apply-nonbootable-package.yml
      - .github/scripts/apply_nonbootable_package.py

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: feature/nonbootable-executor
      - name: Apply and verify package integration
        run: |
          mkdir -p dist/applicator
          set +e
          {
            set -x
            python3 .github/scripts/apply_nonbootable_package.py
            bash -n scripts/build-deb.sh
            grep -Fq 'rufusarm64-nonbootable-format' scripts/build-deb.sh
            grep -Fq 'io.github.geocausa.RufusArm64.format-data' packaging/io.github.geocausa.RufusArm64.policy
          } >dist/applicator/output.log 2>&1
          status=$?
          printf '%s\n' "${status}" >dist/applicator/status
          cat dist/applicator/output.log
          exit 0
      - name: Upload applicator diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: nonbootable-package-applicator
          path: dist/applicator/
      - name: Commit package integration
        run: |
          status="$(cat dist/applicator/status)"
          test "${status}" = 0
          rm -rf dist/applicator
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Stage 2: package dedicated non-bootable formatter"
          git push origin HEAD:feature/nonbootable-executor
