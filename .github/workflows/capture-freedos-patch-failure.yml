name: Capture corrected FreeDOS patch failure

on:
  push:
    branches:
      - fix/freedos-progress
    paths:
      - .github/workflows/capture-freedos-patch-failure.yml

permissions:
  actions: read
  contents: write

jobs:
  capture:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p diagnostics
          gh api /repos/geocausa/RufusUbuntuArm64/actions/jobs/88998409686/logs > /tmp/full.log
          tail -n 140 /tmp/full.log > diagnostics/freedos-patch-tail.log
          git rm .github/workflows/capture-freedos-patch-failure.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add diagnostics/freedos-patch-tail.log
          git commit -m "Capture corrected FreeDOS patch failure"
          git push origin HEAD:fix/freedos-progress
