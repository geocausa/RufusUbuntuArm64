name: Promote runtime integrity transaction tests

on:
  pull_request:
    branches: [develop/0.11.0]
    paths:
      - .github/runtime-wrap-trigger

permissions:
  contents: write

jobs:
  promote:
    if: github.event.pull_request.head.ref == 'feature/0.11-runtime-integrity-wrap'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff
        with:
          go-version: '1.22.x'
      - name: Apply transaction regression suite
        run: |
          python3 tools/apply_runtime_wrap_tests.py
          python3 tools/fix_runtime_wrap_root_identity.py
      - name: Format and verify staged sources
        run: |
          gofmt -w internal/runtimeintegrity/transaction.go internal/runtimeintegrity/transaction_linux.go internal/runtimeintegrity/transaction_test.go internal/secureboot/inspect.go
          test -z "$(gofmt -l internal/runtimeintegrity internal/secureboot)"
      - name: Run focused race tests
        run: |
          set -o pipefail
          go test -race -v ./internal/runtimeintegrity ./internal/secureboot 2>&1 | tee runtime-wrap-tests.log
      - name: Upload focused diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: runtime-wrap-tests
          path: runtime-wrap-tests.log
          if-no-files-found: warn
      - name: Vet transaction packages
        run: go vet ./internal/runtimeintegrity ./internal/secureboot
      - name: Run complete Go suite
        run: go test ./...
      - name: Confirm no writer or privilege dependency
        run: |
          if grep -R -nE 'pkexec|ResolveDevice|/dev/' internal/runtimeintegrity/transaction*.go; then
            echo 'transaction package crossed the ordinary-directory safety boundary' >&2
            exit 1
          fi
      - name: Commit validated transaction source and tests
        run: |
          rm -f tools/apply_runtime_wrap_tests.py tools/fix_runtime_wrap_root_identity.py .github/runtime-wrap-trigger
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add internal/runtimeintegrity/transaction.go internal/runtimeintegrity/transaction_linux.go internal/runtimeintegrity/transaction_test.go internal/secureboot/inspect.go
          git add -u tools/apply_runtime_wrap_tests.py tools/fix_runtime_wrap_root_identity.py .github/runtime-wrap-trigger
          git commit -m '0.11: add transactional runtime integrity wrapping'
          git push origin HEAD:feature/0.11-runtime-integrity-wrap
