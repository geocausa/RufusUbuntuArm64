name: Audit acquisition TOCTOU fix

on:
  push:
    branches:
      - audit/pre-0.11-hardening

permissions:
  contents: write

jobs:
  fix:
    if: github.repository == 'geocausa/RufusUbuntuArm64'
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: audit/pre-0.11-hardening
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff
        with:
          go-version: '1.26.5'
      - name: Apply exact reviewed acquisition changes
        run: python3 scripts/audit_acquisition_toctou_fix.py
      - name: Validate acquisition package
        run: |
          gofmt -w internal/acquisition/download.go internal/acquisition/download_test.go
          test -z "$(gofmt -l internal/acquisition/download.go internal/acquisition/download_test.go)"
          go test -race ./internal/acquisition
          go vet ./internal/acquisition
      - name: Commit validated result
        run: |
          git config user.name 'RufusArm64 audit'
          git config user.email 'actions@users.noreply.github.com'
          rm scripts/audit_acquisition_toctou_fix.py
          git add internal/acquisition/download.go internal/acquisition/download_test.go scripts/audit_acquisition_toctou_fix.py
          git commit -m 'audit: bind reused downloads to the opened regular inode'
          git push origin HEAD:audit/pre-0.11-hardening
