name: Integrate qualification cancellation

on:
  push:
    branches:
      - feature/device-qualification-gtk

permissions:
  contents: write

concurrency:
  group: integrate-qualification-cancel
  cancel-in-progress: false

jobs:
  integrate:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: feature/device-qualification-gtk
          fetch-depth: 0
      - name: Wire one public cancellation path
        shell: bash
        run: |
          set -euo pipefail
          python3 <<'PY'
          from pathlib import Path

          def replace_once(path, old, new):
              text = path.read_text(encoding="utf-8")
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"{path}: replacement count {count}, want 1 for {old[:90]!r}")
              path.write_text(text.replace(old, new, 1), encoding="utf-8")

          main = Path("gui/rufusarm64.py")
          replace_once(
              main,
              '        self.cancel_button.set_sensitive(busy and self.active_job in {"writer", "download", "persistence-plan"})\n',
              '        self.cancel_button.set_sensitive(busy and self.active_job in {"writer", "download", "persistence-plan", "qualification"})\n',
          )
          replace_once(
              main,
              '''    def cancel(self, *_):
                  if not self.busy:
                      return
                  self.cancel_requested = True
          '''.replace("              ", ""),
              '''    def cancel(self, *_):
                  if not self.busy:
                      return
                  if self.active_job == "qualification":
                      dialog = getattr(self, "qualification_dialog", None)
                      if dialog is not None:
                          dialog.request_cancel()
                      return
                  self.cancel_requested = True
          '''.replace("              ", ""),
          )

          dialog = Path("gui/rufusarm64_device_qualify_dialog.py")
          replace_once(
              dialog,
              '''    def _cancel_clicked(self, *_):
                  if not self.running:
                      return
                  self.cancel_requested = True
                  self.cancel_button.set_sensitive(False)
                  self.status.set_text("Cancelling safely after the current I/O operation…")
                  process = self.process
                  if process is not None:
                      self._terminate_process(process)
          '''.replace("              ", ""),
              '''    def request_cancel(self):
                  if not self.running:
                      return
                  self.cancel_requested = True
                  self.cancel_button.set_sensitive(False)
                  self.status.set_text("Cancelling safely after the current I/O operation…")
                  process = self.process
                  if process is not None:
                      self._terminate_process(process)

              def _cancel_clicked(self, *_):
                  self.request_cancel()
          '''.replace("              ", ""),
          )
          replace_once(
              dialog,
              '''    def _delete_event(self, *_):
                  if self.running:
                      self._cancel_clicked()
                      return True
          '''.replace("              ", ""),
              '''    def _delete_event(self, *_):
                  if self.running:
                      self.request_cancel()
                      return True
          '''.replace("              ", ""),
          )

          tests = Path("gui/test_device_qualify_source.py")
          replace_once(
              tests,
              '''        self.assertIn("DeviceQualificationDialog(", source)

              logic = self.read("gui/rufusarm64_logic.py")
          '''.replace("          ", ""),
              '''        self.assertIn("DeviceQualificationDialog(", source)
                  self.assertIn('dialog.request_cancel()', source)
                  self.assertIn('"qualification"', source)

              logic = self.read("gui/rufusarm64_logic.py")
          '''.replace("          ", ""),
          )
          replace_once(
              tests,
              '''            'normalize_qualification_event(json.loads(line))',
                  'json.dumps(report, indent=2, sort_keys=True)',
          '''.replace("          ", ""),
              '''            'normalize_qualification_event(json.loads(line))',
                  'json.dumps(report, indent=2, sort_keys=True)',
                  'def request_cancel(self):',
          '''.replace("          ", ""),
          )
          PY

          python3 -m py_compile gui/rufusarm64.py gui/rufusarm64_device_qualify_dialog.py gui/test_device_qualify_source.py
          PYTHONPATH=gui python3 -m unittest gui/test_device_qualify_logic.py gui/test_device_qualify_source.py

          git config user.name 'RufusArm64 CI'
          git config user.email 'actions@users.noreply.github.com'
          git rm .github/workflows/integrate-qualification-cancel.yml docs/.pr102-cancel-trigger
          git add gui/rufusarm64.py gui/rufusarm64_device_qualify_dialog.py gui/test_device_qualify_source.py
          git commit -m 'gui: unify qualification cancellation controls'
          git push origin HEAD:feature/device-qualification-gtk
