name: Audit static repair

on:
  pull_request:
    branches:
      - feature/persistence-wizard

permissions:
  contents: write

concurrency:
  group: audit-static-repair
  cancel-in-progress: false

jobs:
  repair:
    if: github.repository == 'geocausa/RufusUbuntuArm64' && github.event.pull_request.head.ref == 'audit/pre-0.11-hardening'
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: audit/pre-0.11-hardening
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.26.5'
      - name: Apply exact static-analysis corrections
        run: |
          python3 - <<'PY'
          from pathlib import Path

          def edit(path_name, replacements=(), removals=()):
              path = Path(path_name)
              text = path.read_text(encoding='utf-8')
              for old, new in replacements:
                  count = text.count(old)
                  if count != 1:
                      raise SystemExit(f'{path}: expected one occurrence, found {count}: {old[:120]!r}')
                  text = text.replace(old, new, 1)
              for block in removals:
                  count = text.count(block)
                  if count != 1:
                      raise SystemExit(f'{path}: expected one removable block, found {count}: {block[:120]!r}')
                  text = text.replace(block, '', 1)
              path.write_text(text, encoding='utf-8')

          edit('cmd/rufus-linux/main.go', replacements=(
              ('Windows partition and setup options can only be used with a supported Windows installation ISO', 'windows partition and setup options can only be used with a supported Windows installation ISO'),
              ('Windows driver folder is on the selected target: %w', 'windows driver folder is on the selected target: %w'),
              ('Secure Boot DBX file is on the selected target: %w', 'secure Boot DBX file is on the selected target: %w'),
          ))

          edit('internal/linuxmedia/copy.go', replacements=(
              ('Linux media manifest is empty', 'linux media manifest is empty'),
          ), removals=(
              '\t"syscall"\n',
              '''func openDirectoryNoFollow(path string) (*os.File, error) {
\tfd, err := syscall.Open(path, syscall.O_RDONLY|syscall.O_DIRECTORY|syscall.O_CLOEXEC|syscall.O_NOFOLLOW, 0)
\tif err != nil {
\t\treturn nil, err
\t}
\treturn os.NewFile(uintptr(fd), path), nil
}
''',
          ))

          edit('internal/linuxmedia/layout.go', replacements=(
              ('Linux media tree is empty', 'linux media tree is empty'),
              ('Linux media size overflows the boot partition calculation', 'linux media size overflows the boot partition calculation'),
              ('Linux media manifest is empty', 'linux media manifest is empty'),
              ('Linux media entry count overflows FAT32 sizing', 'linux media entry count overflows FAT32 sizing'),
              ('Linux media size overflows FAT32 sizing', 'linux media size overflows FAT32 sizing'),
          ), removals=(
              '''func verifyLayoutHeader(header []byte, current, backup, entriesLBA uint64, diskGUID [16]byte, entriesCRC uint32) error {
\tif len(header) < layoutGPTHeaderSize || string(header[:8]) != "EFI PART" || binary.LittleEndian.Uint32(header[12:16]) != layoutGPTHeaderSize {
\t\treturn errors.New("invalid GPT header structure")
\t}
\tstoredCRC := binary.LittleEndian.Uint32(header[16:20])
\tcopyHeader := append([]byte(nil), header[:layoutGPTHeaderSize]...)
\tbinary.LittleEndian.PutUint32(copyHeader[16:20], 0)
\tif crc32.ChecksumIEEE(copyHeader) != storedCRC {
\t\treturn errors.New("GPT header CRC mismatch")
\t}
\tif binary.LittleEndian.Uint64(header[24:32]) != current || binary.LittleEndian.Uint64(header[32:40]) != backup ||
\t\tbinary.LittleEndian.Uint64(header[72:80]) != entriesLBA || !bytes.Equal(header[56:72], diskGUID[:]) ||
\t\tbinary.LittleEndian.Uint32(header[88:92]) != entriesCRC {
\t\treturn errors.New("GPT header geometry mismatch")
\t}
\treturn nil
}

''',
          ))

          edit('internal/persistence/detect.go', replacements=(
              ('Ubuntu casper kernel and initrd were found, but no supported kernel command selects /casper/vmlinuz or boot=casper', 'ubuntu casper kernel and initrd were found, but no supported kernel command selects /casper/vmlinuz or boot=casper'),
              ('Debian live kernel and initrd were found, but no supported kernel command contains boot=live', 'debian live kernel and initrd were found, but no supported kernel command contains boot=live'),
          ), removals=(
              '''func containsKernelToken(content, token string) bool {
\tfor _, line := range strings.Split(content, "\\n") {
\t\ttrimmed := strings.TrimSpace(line)
\t\tif trimmed == "" || strings.HasPrefix(trimmed, "#") {
\t\t\tcontinue
\t\t}
\t\tfields := strings.Fields(trimmed)
\t\tif len(fields) < 2 || !isKernelArgumentCommand(fields[0]) {
\t\t\tcontinue
\t\t}
\t\tif kernelArgumentsContain(fields[1:], token) {
\t\t\treturn true
\t\t}
\t}
\treturn false
}

''',
          ))

          edit('internal/secureboot/dbx.go', replacements=(
              ('Microsoft DBX response is unexpectedly large', 'downloaded DBX response is unexpectedly large'),
          ))

          edit('internal/windowsmedia/legacy_boot.go', replacements=(
              ('write Windows MBR bootstrap: %w', 'write windows MBR bootstrap: %w'),
              ('read back Windows MBR: %w', 'read back windows MBR: %w'),
              ('Windows MBR bootstrap verification found an invalid active partition table', 'windows MBR bootstrap verification found an invalid active partition table'),
          ))

          edit('internal/windowsmedia/windowsmedia.go', replacements=(
              ('Secure Boot DBX file is unsafe: %w', 'secure Boot DBX file is unsafe: %w'),
              ('Windows boot file %s is revoked by the selected Secure Boot DBX; no USB data was changed', 'windows boot file %s is revoked by the selected Secure Boot DBX; no USB data was changed'),
              ('Windows driver folder is unsafe: %w', 'windows driver folder is unsafe: %w'),
              ('Windows media plan is nil', 'windows media plan is nil'),
          ), removals=(
              '''func verifySplitImage(ctx context.Context, parts []string, emit EventFunc) error {
\tif len(parts) == 0 {
\t\treturn errors.New("no split WIM parts were supplied")
\t}
\targs := []string{"verify", parts[0]}
\tfor _, part := range parts {
\t\t// An exact path is also a valid wimlib --ref glob, and avoids relying on
\t\t// shell expansion or filename case.
\t\targs = append(args, "--ref="+part)
\t}
\twimlib, err := wimlibExecutable()
\tif err != nil {
\t\treturn err
\t}
\treturn run(ctx, emit, wimlib, args...)
}

''',
          ))

          edit('internal/sourcefile/digest_test.go', replacements=(
              ('\tif _, err := SHA256Open(nil, file, nil); err == nil || !strings.Contains(err.Error(), "context") {', '\t//lint:ignore SA1012 This regression test deliberately verifies that nil contexts fail closed.\n\tif _, err := SHA256Open(nil, file, nil); err == nil || !strings.Contains(err.Error(), "context") {'),
          ))
          PY
          gofmt -w cmd/rufus-linux/main.go internal/linuxmedia/copy.go internal/linuxmedia/layout.go internal/persistence/detect.go internal/secureboot/dbx.go internal/windowsmedia/legacy_boot.go internal/windowsmedia/windowsmedia.go internal/sourcefile/digest_test.go
      - name: Validate repaired tree
        run: |
          audit_bin="${RUNNER_TEMP}/audit-bin"
          mkdir -p "${audit_bin}"
          GOBIN="${audit_bin}" go install honnef.co/go/tools/cmd/staticcheck@v0.7.0
          GOBIN="${audit_bin}" go install golang.org/x/vuln/cmd/govulncheck@v1.6.0
          "${audit_bin}/staticcheck" ./...
          "${audit_bin}/govulncheck" ./...
          go test ./...
          test -z "$(gofmt -l cmd internal)"
      - name: Commit exact cleanup
        run: |
          git config user.name 'RufusArm64 audit'
          git config user.email 'actions@users.noreply.github.com'
          git add cmd/rufus-linux/main.go internal/linuxmedia/copy.go internal/linuxmedia/layout.go internal/persistence/detect.go internal/secureboot/dbx.go internal/windowsmedia/legacy_boot.go internal/windowsmedia/windowsmedia.go internal/sourcefile/digest_test.go
          git commit -m 'audit: clear static-analysis findings'
          git push origin HEAD:audit/pre-0.11-hardening
