name: Apply small-screen dialog patch

on:
  pull_request:
    branches:
      - stage2/0.13.0

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'fix/report-dialogs-small-screens'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: fix/report-dialogs-small-screens
      - name: Apply reviewed source patch
        run: python3 scripts/apply-small-screen-dialogs.py
      - name: Validate focused dialog contracts
        run: |
          python3 -m py_compile gui/rufusarm64_device_qualify_dialog.py gui/rufusarm64_freedos_dialog.py
          python3 -m unittest \
            gui.test_device_qualify_dialog \
            gui.test_device_backup_dialog \
            gui.test_freedos_dialog
      - name: Publish source and remove temporary patch machinery
        run: |
          rm scripts/apply-small-screen-dialogs.py
          rm .github/workflows/apply-small-screen-dialogs.yml
          rm -f small-screen-patch-diagnostic.txt
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "GTK: keep report-dialog controls visible on small screens"
          git push origin HEAD:fix/report-dialogs-small-screens
