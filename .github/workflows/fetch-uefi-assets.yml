name: Fetch pinned BCD-SYS source

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fetch:
    runs-on: ubuntu-24.04
    steps:
      - name: Download and verify pinned BCD-SYS source
        shell: bash
        run: |
          set -euo pipefail
          commit='cd3829c559c621b4df1060eebbb03492631cdc5c'
          curl --fail --location --retry 5 --retry-all-errors \
            "https://codeload.github.com/jpz4085/BCD-SYS/tar.gz/${commit}" \
            -o bcd-sys.tar.gz
          mkdir source artifact
          tar -xzf bcd-sys.tar.gz -C source --strip-components=1
          find source -maxdepth 2 -type f | sort
          test -f source/LICENSE
          test -f source/Linux/bcd-sys.sh
          test -d source/Templates
          cp -a source/Linux source/Resources source/Templates source/LICENSE source/README.md artifact/
          cat > artifact/PINNED-UPSTREAM.txt <<EOF
          Upstream: https://github.com/jpz4085/BCD-SYS
          Commit: ${commit}
          License: GPL-3.0-or-later
          Purpose: Linux-side Windows Boot Manager/BCD creation for Windows To Go media.
          EOF
          (cd artifact && find . -type f -print0 | sort -z | xargs -0 sha256sum) > artifact/SHA256SUMS
          tar -czf bcd-sys-pinned.tar.gz -C artifact .
          sha256sum bcd-sys-pinned.tar.gz > bcd-sys-pinned.tar.gz.sha256

      - name: Upload pinned source
        uses: actions/upload-artifact@v4
        with:
          name: bcd-sys-pinned-source
          path: |
            bcd-sys-pinned.tar.gz
            bcd-sys-pinned.tar.gz.sha256
          if-no-files-found: error
          retention-days: 7
