name: Apply acquisition resume hardening

on:
  pull_request:
    branches: [main]
    paths:
      - scripts/apply-acquisition-resume-hardening.py
      - .github/workflows/apply-acquisition-resume-hardening.yml

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'feature/acquisition-resume'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: feature/acquisition-resume
          fetch-depth: 0
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff
        with:
          go-version: '1.22.x'
      - name: Apply and validate resume path hardening
        run: |
          python3 scripts/apply-acquisition-resume-hardening.py
          gofmt -w internal/acquisition/download.go internal/acquisition/resume.go internal/acquisition/resume_test.go
          go test ./internal/acquisition ./cmd/rufus-linux
          go vet ./internal/acquisition ./cmd/rufus-linux
          rm scripts/apply-acquisition-resume-hardening.py .github/workflows/apply-acquisition-resume-hardening.yml
      - name: Commit validated hardening
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m 'acquisition: bind resumable partial path identity'
          git push origin HEAD:feature/acquisition-resume
