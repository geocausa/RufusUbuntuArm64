name: Diagnose FreeDOS media verifier

on:
  push:
    branches: [feature/freedos-media-verifier]
    paths:
      - .github/workflows/diagnose-freedos-media.yml

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: feature/freedos-media-verifier
          fetch-depth: 0
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v6
        with:
          go-version: '1.22.x'
      - name: Capture focused Go failure
        shell: bash
        run: |
          set +e
          {
            go version
            go test -count=1 -v ./internal/freedos
          } > docs/freedos-media-diagnostic.txt 2>&1
          status=$?
          printf '\nEXIT_STATUS=%s\n' "$status" >> docs/freedos-media-diagnostic.txt
          cat docs/freedos-media-diagnostic.txt
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add docs/freedos-media-diagnostic.txt
          git commit -m 'Maintenance: record FreeDOS media verifier diagnostic'
          git push origin HEAD:feature/freedos-media-verifier
