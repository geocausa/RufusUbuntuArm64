name: Repair FreeDOS progress dialog replacements

on:
  push:
    branches:
      - fix/freedos-progress
    paths:
      - .github/workflows/run-freedos-progress-patch-v4.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - name: Extract, repair, and run patch script
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          workflow = Path('.github/workflows/apply-freedos-progress-v2.yml').read_text(encoding='utf-8')
          begin_marker = '      - name: Add phase and byte progress\n        run: |\n'
          end_marker = '\n      - name: Commit progress implementation\n'
          begin = workflow.find(begin_marker)
          end = workflow.find(end_marker, begin)
          if begin < 0 or end < 0:
              raise SystemExit(f'could not locate patch shell block: begin={begin} end={end}')
          yaml_block = workflow[begin + len(begin_marker):end]
          lines = []
          for line in yaml_block.splitlines():
              if line.startswith('          '):
                  lines.append(line[10:])
              elif not line:
                  lines.append('')
              else:
                  raise SystemExit(f'unexpected original YAML indentation: {line!r}')
          script = '\n'.join(lines) + '\n'

          def rewrite_dialog_call(source, marker, old_value, new_value):
              start = source.find(marker)
              if start < 0:
                  raise SystemExit(f'could not locate dialog literal {marker!r}')
              next_file = source.find('"gui/rufusarm64_freedos_dialog.py"', start)
              next_replace = source.rfind('replace_once(', start, next_file)
              if next_file < 0 or next_replace < 0:
                  raise SystemExit(f'could not locate replacement boundary for {marker!r}: file={next_file} replace={next_replace}')
              replacement = repr(old_value) + ',\n    ' + repr(new_value) + ',\n)\n'
              return source[:start] + replacement + source[next_replace:]

          script = rewrite_dialog_call(
              script,
              '"""                text=True,',
              '                text=True,\n                start_new_session=True,\n            )\n',
              '                text=True,\n                bufsize=1,\n                start_new_session=True,\n            )\n',
          )
          script = rewrite_dialog_call(
              script,
              '"""            self.process = process',
              '            self.process = process\n            stdout, stderr = process.communicate()\n            returncode = process.returncode\n            self.process = None\n            for line in stderr.splitlines():\n                text = line.strip()\n                if text and len(diagnostics) < 64 and diagnostics_size + len(text) <= 32768:\n                    diagnostics.append(text)\n                    diagnostics_size += len(text)\n',
              '            self.process = process\n            expected_total = int(reviewed["plan"]["device_size_bytes"]) * 2\n            last_done = 0\n            for line in process.stderr:\n                progress = decode_progress_line(line)\n                if progress is not None:\n                    if progress["overall_total"] != expected_total:\n                        raise ValueError("FreeDOS helper progress does not match the reviewed full-device I/O total.")\n                    if progress["overall_done"] < last_done:\n                        raise ValueError("FreeDOS helper progress moved backwards.")\n                    last_done = progress["overall_done"]\n                    GLib.idle_add(self._progress_ready, generation, progress)\n                    continue\n                text = line.strip()\n                if text and len(diagnostics) < 64 and diagnostics_size + len(text) <= 32768:\n                    diagnostics.append(text)\n                    diagnostics_size += len(text)\n            stdout = process.stdout.read()\n            returncode = process.wait()\n            self.process = None\n',
          )
          Path('/tmp/apply-freedos-progress.sh').write_text(script, encoding='utf-8')
          PY
          bash -x /tmp/apply-freedos-progress.sh
      - name: Commit implementation
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            internal/freedos/executor.go \
            internal/freedos/executor_test.go \
            internal/freedos/stream.go \
            internal/freedos/stream_test.go \
            cmd/rufus-freedos-format/main.go \
            cmd/rufus-freedos-format/progress_test.go \
            gui/rufusarm64_freedos.py \
            gui/rufusarm64_freedos_dialog.py \
            gui/test_freedos_dialog.py \
            gui/test_freedos_progress.py
          git commit -m "Show FreeDOS full-device progress"
          git push origin HEAD:fix/freedos-progress
