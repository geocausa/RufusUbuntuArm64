name: Audit GUI async fix

on:
  push:
    branches:
      - audit/pre-0.11-hardening

permissions:
  contents: write

jobs:
  fix:
    if: github.repository == 'geocausa/RufusUbuntuArm64'
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: audit/pre-0.11-hardening
      - name: Apply reviewed GUI worker changes
        run: |
          python3 scripts/audit_gui_async_main.py
          python3 scripts/audit_gui_async_persistence.py
          python3 scripts/audit_gui_async_catalog.py
      - name: Validate GUI and structural contracts
        run: |
          python3 -m py_compile gui/rufusarm64.py gui/rufusarm64_logic.py gui/rufusarm64_persistence.py gui/rufusarm64_persistence_logic.py gui/test_source_structure.py
          PYTHONPATH=gui python3 -m unittest discover -s gui -p 'test_*.py'
      - name: Commit validated result
        run: |
          git config user.name 'RufusArm64 audit'
          git config user.email 'actions@users.noreply.github.com'
          rm scripts/audit_gui_async_main.py scripts/audit_gui_async_persistence.py scripts/audit_gui_async_catalog.py
          git add gui/rufusarm64.py gui/rufusarm64_persistence.py gui/test_source_structure.py scripts/audit_gui_async_main.py scripts/audit_gui_async_persistence.py scripts/audit_gui_async_catalog.py
          git commit -m 'audit: move slow GUI probes off the GTK thread'
          git push origin HEAD:audit/pre-0.11-hardening
