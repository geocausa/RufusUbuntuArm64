name: Apply Windows source-lease integration

on:
  pull_request:
    types: [opened, reopened, ready_for_review]
    branches: [stage2/0.13.0]

permissions:
  contents: write

concurrency:
  group: apply-windows-source-lease-integration
  cancel-in-progress: false

jobs:
  apply:
    if: github.event.pull_request.head.ref == 'audit/windows-source-lease-integration-run'
    runs-on: ubuntu-24.04
    steps:
      - name: Check out the integration branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: audit/windows-source-lease-integration-run
          fetch-depth: 0

      - name: Set up declared Go version
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff
        with:
          go-version-file: go.mod
          cache: false

      - name: Apply the reviewed patch
        run: python3 scripts/apply-windows-source-lease-integration.py

      - name: Format and run focused regressions
        run: |
          gofmt -w internal/windowsmedia/windowsmedia.go internal/windowsmedia/source_lease_linux_test.go internal/operationcost/contract.go internal/operationcost/contract_test.go
          go test ./internal/sourcefile ./internal/windowsmedia ./internal/operationcost
          python3 -m json.tool docs/operation-cost-contract.json >/dev/null
          git diff --check

      - name: Remove the one-shot executor and publish the reviewed source commit
        run: |
          rm scripts/apply-windows-source-lease-integration.py
          rm .github/workflows/apply-windows-source-lease-integration.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m 'Audit: integrate kernel-held Windows ISO verification'
          git push origin HEAD:audit/windows-source-lease-integration-run
