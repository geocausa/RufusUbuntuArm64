name: Capture clean FreeDOS repair failure

on:
  push:
    branches:
      - fix/freedos-progress
    paths:
      - .github/workflows/capture-freedos-repair2-failure.yml

permissions:
  actions: read
  contents: write

jobs:
  capture:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p diagnostics
          gh api /repos/geocausa/RufusUbuntuArm64/actions/jobs/88997761937/logs > /tmp/full.log
          tail -n 100 /tmp/full.log > diagnostics/freedos-repair2-tail.log
          git rm .github/workflows/capture-freedos-repair2-failure.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add diagnostics/freedos-repair2-tail.log
          git commit -m "Capture clean FreeDOS repair failure"
          git push origin HEAD:fix/freedos-progress
