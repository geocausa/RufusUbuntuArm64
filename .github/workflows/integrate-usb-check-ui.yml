name: Integrate USB check UI

on:
  pull_request:

permissions:
  contents: write

jobs:
  integrate:
    if: github.head_ref == 'feature/usb-check-ui'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: feature/usb-check-ui
          fetch-depth: 0
      - name: Wire, test, and push the GTK workflow
        shell: bash
        run: |
          exec > >(tee "${RUNNER_TEMP}/usb-check-ui.log") 2>&1
          set -euxo pipefail
          python3 <<'PY'
          from pathlib import Path

          gui = Path('gui/rufusarm64.py')
          text = gui.read_text(encoding='utf-8')
          import_line = 'from rufusarm64_checksums import ChecksumDialog\n'
          dialog_import = 'from rufusarm64_device_qualify_dialog import DeviceQualificationDialog\n'
          if dialog_import not in text:
              if text.count(import_line) != 1:
                  raise SystemExit('checksum import anchor mismatch')
              text = text.replace(import_line, import_line + dialog_import, 1)
          constant = 'DEVICE_QUALIFY = "/usr/bin/rufusarm64-device-qualify"\n'
          anchor = 'PERSISTENCE_HELPER = "/usr/lib/rufusarm64/rufusarm64-persistence-helper"\n'
          if constant not in text:
              if text.count(anchor) != 1:
                  raise SystemExit('qualification constant anchor mismatch')
              text = text.replace(anchor, anchor + constant, 1)
          old_target = (
              '        self.refresh_button = Gtk.Button.new_from_icon_name("view-refresh-symbolic", Gtk.IconSize.BUTTON)\n'
              '        self.refresh_button.set_tooltip_text("Refresh connected USB drives")\n'
              '        self.refresh_button.connect("clicked", lambda *_: self.refresh_devices())\n'
              '        grid.attach(self.refresh_button, 2, 1, 1, 1)\n'
          )
          new_target = (
              '        target_actions = Gtk.Box(orientation=Gtk.Orientation.HORIZONTAL, spacing=8)\n'
              '        self.refresh_button = Gtk.Button.new_from_icon_name("view-refresh-symbolic", Gtk.IconSize.BUTTON)\n'
              '        self.refresh_button.set_tooltip_text("Refresh connected USB drives")\n'
              '        self.refresh_button.connect("clicked", lambda *_: self.refresh_devices())\n'
              '        target_actions.pack_start(self.refresh_button, False, False, 0)\n'
              '        self.qualify_button = Gtk.Button(label="Check USB…")\n'
              '        self.qualify_button.set_tooltip_text("Run a separate destructive capacity and bad-block qualification test")\n'
              '        self.qualify_button.connect("clicked", self.open_device_qualification)\n'
              '        target_actions.pack_start(self.qualify_button, False, False, 0)\n'
              '        grid.attach(target_actions, 2, 1, 1, 1)\n'
          )
          if 'self.qualify_button = Gtk.Button(label="Check USB…")' not in text:
              if text.count(old_target) != 1:
                  raise SystemExit(f'USB action row anchor count = {text.count(old_target)}, want 1')
              text = text.replace(old_target, new_target, 1)
          method = (
              '    def open_device_qualification(self, *_):\n'
              '        if self.busy:\n'
              '            return\n'
              '        target_index = self.target_combo.get_active()\n'
              '        selected = self.devices[target_index] if 0 <= target_index < len(self.devices) else None\n'
              '        device_path = str((selected or {}).get("path") or "")\n'
              '        identity = str((selected or {}).get("identity") or "")\n'
              '        if not device_path or not identity:\n'
              '            self.progress_detail.set_text("Choose a USB drive and refresh the device list before checking it.")\n'
              '            return\n'
              '        dialog = DeviceQualificationDialog(self, device_path, identity, DEVICE_QUALIFY, PKEXEC)\n'
              '        dialog.run()\n'
              '        if dialog.running:\n'
              '            return\n'
              '        dialog.destroy()\n'
              '        self.refresh_devices()\n\n'
          )
          method_anchor = '    def open_checksum_dialog(self, *_):\n'
          if '    def open_device_qualification(self, *_):\n' not in text:
              if text.count(method_anchor) != 1:
                  raise SystemExit('dialog method anchor mismatch')
              text = text.replace(method_anchor, method + method_anchor, 1)
          busy_anchor = '        self.refresh_button.set_sensitive(not busy and not self.device_refreshing)\n'
          busy_add = busy_anchor + '        self.qualify_button.set_sensitive(not busy and not self.device_refreshing and self.target_combo.get_active() >= 0)\n'
          if 'self.qualify_button.set_sensitive(not busy' not in text:
              if text.count(busy_anchor) != 1:
                  raise SystemExit('busy-state anchor mismatch')
              text = text.replace(busy_anchor, busy_add, 1)
          gui.write_text(text, encoding='utf-8')

          build = Path('scripts/build-deb.sh')
          text = build.read_text(encoding='utf-8')
          anchor = (
              'install -Dm644 "${ROOT_DIR}/gui/rufusarm64_checksums.py" \\\n'
              '  "${PACKAGE_DIR}/usr/lib/rufusarm64/rufusarm64_checksums.py"\n'
          )
          addition = anchor + (
              'install -Dm644 "${ROOT_DIR}/gui/rufusarm64_device_qualify.py" \\\n'
              '  "${PACKAGE_DIR}/usr/lib/rufusarm64/rufusarm64_device_qualify.py"\n'
              'install -Dm644 "${ROOT_DIR}/gui/rufusarm64_device_qualify_dialog.py" \\\n'
              '  "${PACKAGE_DIR}/usr/lib/rufusarm64/rufusarm64_device_qualify_dialog.py"\n'
          )
          if 'rufusarm64_device_qualify_dialog.py' not in text:
              if text.count(anchor) != 1:
                  raise SystemExit(f'package module anchor count = {text.count(anchor)}, want 1')
              text = text.replace(anchor, addition, 1)
          build.write_text(text, encoding='utf-8')

          tests = Path('scripts/test.sh')
          text = tests.read_text(encoding='utf-8')
          old_compile = (
              '  gui/rufusarm64.py gui/rufusarm64_logic.py gui/rufusarm64_checksums.py \\\n'
              '  gui/rufusarm64_persistence.py gui/rufusarm64_persistence_logic.py\n'
          )
          new_compile = (
              '  gui/rufusarm64.py gui/rufusarm64_logic.py gui/rufusarm64_checksums.py \\\n'
              '  gui/rufusarm64_device_qualify.py gui/rufusarm64_device_qualify_dialog.py \\\n'
              '  gui/rufusarm64_persistence.py gui/rufusarm64_persistence_logic.py\n'
          )
          if 'gui/rufusarm64_device_qualify_dialog.py \\' not in text:
              if text.count(old_compile) != 1:
                  raise SystemExit(f'py_compile anchor count = {text.count(old_compile)}, want 1')
              text = text.replace(old_compile, new_compile, 1)
          installed_anchor = '[[ -f "${extract_dir}/usr/lib/rufusarm64/rufusarm64_logic.py" ]]\n'
          installed_add = installed_anchor + '[[ -f "${extract_dir}/usr/lib/rufusarm64/rufusarm64_device_qualify.py" ]]\n[[ -f "${extract_dir}/usr/lib/rufusarm64/rufusarm64_device_qualify_dialog.py" ]]\n'
          if 'extract_dir}/usr/lib/rufusarm64/rufusarm64_device_qualify_dialog.py' not in text:
              if text.count(installed_anchor) != 1:
                  raise SystemExit('installed module anchor mismatch')
              text = text.replace(installed_anchor, installed_add, 1)
          tests.write_text(text, encoding='utf-8')
          PY
          python3 -m py_compile gui/rufusarm64.py gui/rufusarm64_device_qualify.py gui/rufusarm64_device_qualify_dialog.py
          PYTHONPATH=gui python3 -m unittest discover -s gui -p 'test_*.py'
          bash -n scripts/build-deb.sh scripts/test.sh
          git config user.name 'RufusArm64 CI'
          git config user.email 'actions@users.noreply.github.com'
          if git diff --quiet -- gui/rufusarm64.py scripts/build-deb.sh scripts/test.sh; then
            exit 0
          fi
          git add gui/rufusarm64.py scripts/build-deb.sh scripts/test.sh
          git commit -m 'gui: expose identity-bound USB qualification dialog'
          git push origin HEAD:feature/usb-check-ui
      - name: Upload integration diagnostic
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: usb-check-ui-integration-${{ github.run_id }}
          path: ${{ runner.temp }}/usb-check-ui.log
          if-no-files-found: warn
