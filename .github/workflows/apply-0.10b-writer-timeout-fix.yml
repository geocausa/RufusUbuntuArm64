name: Apply 0.10B writer timeout correction

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - name: Verify and apply reviewed correction
        run: |
          base64 -d .recovery/0.10b-writer-timeout-fix.patch.xz.b64 > /tmp/fix.patch.xz
          echo '229b00467c8dfef186c44eeb03a416ba92c6ee12b3d5c6428111dddf8df606ce  /tmp/fix.patch.xz' | sha256sum -c -
          xz -dc /tmp/fix.patch.xz > /tmp/fix.patch
          echo '2737539142540523b297bb53219d99d4f8d7aa2ae94ba003ca5ef16f93cb9ff9  /tmp/fix.patch' | sha256sum -c -
          git apply --check /tmp/fix.patch
          git apply /tmp/fix.patch
      - name: Revalidate operation deadlines and full source
        run: |
          go test ./...
          go test -race ./cmd/rufus-linux ./internal/linuxmedia ./internal/sourcefile
          go test -shuffle=on -count=5 ./cmd/rufus-linux ./internal/linuxmedia ./internal/sourcefile
          go vet ./...
          (cd gui && python3 -m unittest -v test_logic.py)
          go test ./cmd/rufus-linux -run 'TestWriterContextHasNoAutomaticDeadline|TestPersistenceAnalysisContextHasBoundedDeadline' -count=1
      - name: Commit validated correction
        env:
          BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add cmd/rufus-linux/main.go cmd/rufus-linux/main_test.go
          git diff --cached --check
          git commit -m '0.10B: keep USB writes unbounded while timing out analysis'
          git push origin HEAD:"${BRANCH}"
