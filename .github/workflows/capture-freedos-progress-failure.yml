name: Capture FreeDOS progress failure

on:
  push:
    branches:
      - fix/freedos-progress
    paths:
      - .github/workflows/capture-freedos-progress-failure.yml

permissions:
  actions: read
  contents: write

jobs:
  capture:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - name: Capture failed job tail
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p diagnostics
          gh api /repos/geocausa/RufusUbuntuArm64/actions/jobs/88995689536/logs > diagnostics/freedos-progress-v2.log
          tail -n 160 diagnostics/freedos-progress-v2.log > diagnostics/freedos-progress-v2-tail.log
          mv diagnostics/freedos-progress-v2-tail.log diagnostics/freedos-progress-v2.log
      - name: Commit diagnostics
        run: |
          set -euo pipefail
          git rm .github/workflows/capture-freedos-progress-failure.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add diagnostics/freedos-progress-v2.log
          git commit -m "Capture FreeDOS progress workflow failure"
          git push origin HEAD:fix/freedos-progress
