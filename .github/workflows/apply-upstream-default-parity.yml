name: Apply upstream default parity

on:
  pull_request:
    types: [opened, reopened, ready_for_review]
    branches: [stage2/0.13.0]

permissions:
  contents: write

concurrency:
  group: apply-upstream-default-parity
  cancel-in-progress: false

jobs:
  apply:
    if: github.event.pull_request.head.ref == 'audit/upstream-default-parity'
    runs-on: ubuntu-24.04
    steps:
      - name: Check out the audit branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: audit/upstream-default-parity
          fetch-depth: 0

      - name: Set up declared Go version
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff
        with:
          go-version-file: go.mod
          cache: false

      - name: Apply the reviewed default patch
        run: python3 scripts/apply-upstream-default-parity.py

      - name: Format and run focused parity regressions
        run: |
          gofmt -w cmd/rufus-linux/main.go cmd/rufus-linux/defaults_test.go internal/windowsmedia/options.go internal/windowsmedia/options_test.go internal/windowsmedia/layout_defaults_test.go internal/defaultparity/contract.go internal/defaultparity/contract_test.go
          go test ./internal/defaultparity ./internal/windowsmedia ./cmd/rufus-linux
          python3 -m json.tool docs/upstream-default-contract.json >/dev/null
          (
            cd gui
            python3 -m unittest -v test_logic.py test_default_parity.py
          )
          git diff --check

      - name: Remove executor and publish the source-only audit
        run: |
          rm scripts/apply-upstream-default-parity.py
          rm .github/workflows/apply-upstream-default-parity.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m 'Audit: align defaults with upstream Rufus'
          git push origin HEAD:audit/upstream-default-parity
