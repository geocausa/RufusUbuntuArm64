name: Publish PR237 hardware-test prerelease

on:
  pull_request:
    branches:
      - stage2/0.13.0

permissions:
  actions: read
  contents: write
  issues: write
  pull-requests: write

jobs:
  publish:
    if: github.repository == 'geocausa/RufusUbuntuArm64' && github.head_ref == 'ops/publish-pr237-test'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    env:
      TESTED_SHA: 2323fd203dc550019c377cf1ded30e6ad1732e02
      MERGED_STAGE_SHA: 106c17330b99aecd40829f8fdc69bedbdb3dea0c
      RUN_ID: '29950491496'
      ARTIFACT_ID: '8542133871'
      ARTIFACT_NAME: rufusarm64-0.13.0+pr237.2323fd20-ubuntu-arm64
      ARTIFACT_DIGEST: sha256:281036916cfcef31df87fcdcacd3cf809097765fddae06a9bdf2370214e999d0
      PACKAGE_VERSION: 0.13.0+pr237.2323fd20
      TAG: v0.13.0-pr237-test
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ops/publish-pr237-test
          fetch-depth: 0
      - name: Verify exact tested run and artifact
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          test "$(gh api "/repos/${GITHUB_REPOSITORY}/actions/runs/${RUN_ID}" --jq .status)" = completed
          test "$(gh api "/repos/${GITHUB_REPOSITORY}/actions/runs/${RUN_ID}" --jq .conclusion)" = success
          test "$(gh api "/repos/${GITHUB_REPOSITORY}/actions/runs/${RUN_ID}" --jq .head_sha)" = "${TESTED_SHA}"
          test "$(gh api "/repos/${GITHUB_REPOSITORY}/actions/artifacts/${ARTIFACT_ID}" --jq .name)" = "${ARTIFACT_NAME}"
          test "$(gh api "/repos/${GITHUB_REPOSITORY}/actions/artifacts/${ARTIFACT_ID}" --jq .workflow_run.id)" = "${RUN_ID}"
          test "$(gh api "/repos/${GITHUB_REPOSITORY}/actions/artifacts/${ARTIFACT_ID}" --jq .expired)" = false
          test "$(gh api "/repos/${GITHUB_REPOSITORY}/actions/artifacts/${ARTIFACT_ID}" --jq .digest)" = "${ARTIFACT_DIGEST}"
          test "$(git rev-parse "${TESTED_SHA}^{commit}")" = "${TESTED_SHA}"
          test "$(git rev-parse "${MERGED_STAGE_SHA}^{commit}")" = "${MERGED_STAGE_SHA}"
      - name: Download and verify exact package bytes
        id: package
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p release-assets
          gh run download "${RUN_ID}" \
            --repo "${GITHUB_REPOSITORY}" \
            --name "${ARTIFACT_NAME}" \
            --dir release-assets
          deb="release-assets/rufusarm64_${PACKAGE_VERSION}_arm64.deb"
          checksum="${deb}.sha256"
          test -f "${deb}"
          test -f "${checksum}"
          test "$(find release-assets -maxdepth 1 -type f | wc -l)" -eq 2
          (
            cd release-assets
            sha256sum -c "$(basename "${checksum}")"
          )
          test "$(dpkg-deb -f "${deb}" Package)" = rufusarm64
          test "$(dpkg-deb -f "${deb}" Version)" = "${PACKAGE_VERSION}"
          test "$(dpkg-deb -f "${deb}" Architecture)" = arm64
          package_sha="$(sha256sum "${deb}" | awk '{print $1}')"
          test "$(awk 'NF {print $1; exit}' "${checksum}")" = "${package_sha}"
          echo "deb=${deb}" >> "${GITHUB_OUTPUT}"
          echo "checksum=${checksum}" >> "${GITHUB_OUTPUT}"
          echo "package_sha=${package_sha}" >> "${GITHUB_OUTPUT}"
      - name: Create immutable test tag and prerelease
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
          DEB: ${{ steps.package.outputs.deb }}
          CHECKSUM: ${{ steps.package.outputs.checksum }}
          PACKAGE_SHA: ${{ steps.package.outputs.package_sha }}
        run: |
          set -euo pipefail
          existing_tag="$({
            gh api "/repos/${GITHUB_REPOSITORY}/git/matching-refs/tags/${TAG}" \
              --jq ".[] | select(.ref == \"refs/tags/${TAG}\") | .object.sha"
          } || true)"
          if [[ -n "${existing_tag}" ]]; then
            test "${existing_tag}" = "${TESTED_SHA}" || {
              echo "Refusing to move ${TAG} from ${existing_tag} to ${TESTED_SHA}" >&2
              exit 1
            }
          else
            gh api --method POST "/repos/${GITHUB_REPOSITORY}/git/refs" \
              -f ref="refs/tags/${TAG}" \
              -f sha="${TESTED_SHA}" >/dev/null
          fi

          cat > release-notes.md <<EOF
          ## RufusArm64 0.13.0 PR237 hardware-test build

          This is a **hardware-test prerelease**, not the public 0.13.0 release.

          - Package version: \`${PACKAGE_VERSION}\`
          - Exact tested source commit: \`${TESTED_SHA}\`
          - Corresponding merged Stage 2 checkpoint: \`${MERGED_STAGE_SHA}\`
          - Exact CI run: \`${RUN_ID}\`
          - Package SHA-256: \`${PACKAGE_SHA}\`
          - GitHub artifact digest: \`${ARTIFACT_DIGEST}\`

          The exact source head passed Go 1.22, native ARM64 execution, reproducible Debian packaging and audit, deterministic WIM and UEFI loader builds, FreeDOS loop qualification, and non-bootable formatter qualification.

          Use this build only for the remaining real-machine gates:

          1. Complete one FreeDOS creation run with the full-device progress display and retain its final report. Physical boot observation requires an x86 BIOS/Legacy or UEFI-CSM computer.
          2. Confirm a harmless persistence change survives reboot and retain the start/verify qualification reports and checksums.
          3. On the 1280×800 ARM64 work area, confirm **Restore / format…**, **Check USB**, **Save drive image…**, and **FreeDOS…** keep confirmation, progress, action, and Close controls visible while long text scrolls.
          4. Record the final GO or NO-GO against the exact package SHA-256.

          No Secure Boot compatibility or universal physical-boot claim is made. The production acquisition channel remains disabled.
          EOF
          sed -i 's/^          //' release-notes.md

          if gh release view "${TAG}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            test "$(gh release view "${TAG}" --repo "${GITHUB_REPOSITORY}" --json isPrerelease --jq .isPrerelease)" = true
            release_url="$(gh release view "${TAG}" --repo "${GITHUB_REPOSITORY}" --json url --jq .url)"
          else
            release_url="$(gh release create "${TAG}" \
              --repo "${GITHUB_REPOSITORY}" \
              --verify-tag \
              --prerelease \
              --title 'RufusArm64 0.13.0 PR237 hardware-test build' \
              --notes-file release-notes.md \
              "${DEB}" "${CHECKSUM}")"
          fi
          echo "url=${release_url}" >> "${GITHUB_OUTPUT}"
      - name: Record publication checkpoint
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_URL: ${{ steps.release.outputs.url }}
          PACKAGE_SHA: ${{ steps.package.outputs.package_sha }}
        run: |
          set -euo pipefail
          cat > publication-comment.md <<EOF
          ### PR237 hardware-test prerelease published

          - Release: ${RELEASE_URL}
          - Tag: \`${TAG}\`
          - Exact tested commit: \`${TESTED_SHA}\`
          - Package: \`rufusarm64_${PACKAGE_VERSION}_arm64.deb\`
          - Package SHA-256: \`${PACKAGE_SHA}\`
          - CI run: \`${RUN_ID}\`

          This remains a prerelease for the physical FreeDOS, persistence-reboot, 1280×800 dialog, and final GO/NO-GO checks. It is not the public 0.13.0 release.
          EOF
          sed -i 's/^          //' publication-comment.md
          gh issue comment 118 --repo "${GITHUB_REPOSITORY}" --body-file publication-comment.md
          gh pr comment "${{ github.event.pull_request.number }}" \
            --repo "${GITHUB_REPOSITORY}" --body-file publication-comment.md
      - name: Remove one-shot publisher from the operational branch
        run: |
          set -euo pipefail
          rm .github/workflows/publish-pr237-hardware-test.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add .github/workflows/publish-pr237-hardware-test.yml
          git commit -m "Ops: remove PR237 prerelease publisher"
          git push origin HEAD:ops/publish-pr237-test
