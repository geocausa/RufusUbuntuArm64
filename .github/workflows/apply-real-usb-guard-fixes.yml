name: Apply real USB guard fixes

on:
  push:
    branches:
      - feature/unified-persistence-ui
    paths:
      - scripts/apply-real-usb-guard-fixes.py
      - scripts/fix-real-usb-loop-test.py
      - .github/workflows/apply-real-usb-guard-fixes.yml
  pull_request:
    branches:
      - main
    paths:
      - scripts/apply-real-usb-guard-fixes.py
      - scripts/fix-real-usb-loop-test.py
      - .github/workflows/apply-real-usb-guard-fixes.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: feature/unified-persistence-ui
          fetch-depth: 0
      - name: Apply guarded real-hardware fixes
        run: |
          python3 scripts/apply-real-usb-guard-fixes.py
          python3 scripts/fix-real-usb-loop-test.py
      - name: Format and run focused tests
        run: |
          gofmt -w \
            cmd/rufus-linux/main.go \
            internal/safety/reopenable_linux.go \
            internal/safety/reopenable_linux_test.go \
            internal/safety/safety_linux.go \
            internal/windowsmedia/windowsmedia.go \
            internal/windowsmedia/destructive_gate_test.go \
            internal/linuxmedia/create.go \
            internal/linuxmedia/destructive_gate_test.go \
            internal/persistence/filesystem.go
          go test ./internal/safety ./internal/windowsmedia ./internal/linuxmedia ./internal/persistence ./cmd/rufus-linux ./cmd/rufus-persistence-helper
      - name: Exercise formatter lock handoff on a real loop device
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends dosfstools e2fsprogs
          sudo modprobe loop || true
          go test -c -o "${RUNNER_TEMP}/safety-loop.test" ./internal/safety
          set -o pipefail
          sudo env RUFUS_REAL_BLOCK_TEST=1 \
            "${RUNNER_TEMP}/safety-loop.test" \
            -test.run '^TestOpenReopenableDeviceSupportsFilesystemToolsOnLoop$' \
            -test.v 2>&1 | tee loop-test.log
      - name: Upload focused loop diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: usb-guard-loop-diagnostics
          path: loop-test.log
          if-no-files-found: warn
      - name: Remove staging files
        run: rm -f loop-test.log scripts/apply-real-usb-guard-fixes.py scripts/fix-real-usb-loop-test.py .github/workflows/apply-real-usb-guard-fixes.yml
      - name: Commit validated fixes
        run: |
          exec > >(tee commit-diagnostics.txt) 2>&1
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git status --short
          git diff --cached --check
          test -n "$(git diff --cached --name-only)"
          git commit -m "Fix real USB identity and formatter handoff"
          git pull --rebase origin feature/unified-persistence-ui
          git push origin HEAD:feature/unified-persistence-ui
      - name: Upload commit diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: usb-guard-commit-diagnostics
          path: commit-diagnostics.txt
          if-no-files-found: warn
