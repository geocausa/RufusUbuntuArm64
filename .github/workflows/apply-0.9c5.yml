name: Apply 0.9C5 persistence qualification

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'develop/0.9.0-persistence-qualification'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: develop/0.9.0-persistence-qualification
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23.x'

      - name: Decode and verify qualification patch
        shell: bash
        run: |
          set -euo pipefail
          cat .changes/0.9C5/chunk-* > /tmp/0.9C5.patch.xz.b64
          base64 --decode /tmp/0.9C5.patch.xz.b64 > /tmp/0.9C5.patch.xz
          echo 'cec9fff325ac9e04cb9811bbb51c38da3cee194b14d86f1e1f0648e670f90fec  /tmp/0.9C5.patch.xz' | sha256sum --check --strict
          xz --decompress --stdout /tmp/0.9C5.patch.xz > /tmp/0.9C5.patch
          echo '5718a5f59958b5b44e6b9471365bca0acf4b58ea07fa0038882d8ceb3f9fd672  /tmp/0.9C5.patch' | sha256sum --check --strict
          git apply --check /tmp/0.9C5.patch
          git apply /tmp/0.9C5.patch
          rm -rf .changes

      - name: Validate persistence qualification evidence
        shell: bash
        run: |
          set -euo pipefail
          test -z "$(gofmt -l cmd internal)"
          go test ./...
          go test -race ./...
          go test -shuffle=on -count=5 ./internal/linuxmedia ./internal/persistence ./internal/qualification ./internal/acquisition ./cmd/rufus-linux
          go vet ./...
          python3 -m py_compile gui/rufusarm64.py gui/rufusarm64_logic.py gui/test_logic.py
          (cd gui && python3 -m unittest test_logic.py)
          GOOS=linux GOARCH=arm64 CGO_ENABLED=0 go build ./cmd/rufus-linux
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build ./cmd/rufus-linux

      - name: Commit validated qualification evidence
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add --all
          git commit -m 'Add persistence creation and reboot qualification evidence'
          git push origin HEAD:develop/0.9.0-persistence-qualification
