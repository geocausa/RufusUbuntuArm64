name: Imaging size autopatch

on:
  push:
    branches:
      - audit/pre-0.11-hardening

permissions:
  contents: write

concurrency:
  group: imaging-size-autopatch-${{ github.ref }}
  cancel-in-progress: false

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: audit/pre-0.11-hardening
          fetch-depth: 0
      - run: |
          python3 scripts/imaging_size_patch.py
          gofmt -w internal/imaging/input.go internal/imaging/size.go internal/imaging/size_test.go
      - run: |
          if git diff --quiet; then exit 0; fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add internal/imaging/input.go internal/imaging/size.go internal/imaging/size_test.go
          git commit -m "imaging: reject prepared-image size overflow"
          git push origin HEAD:audit/pre-0.11-hardening
