name: Fix unified package contract

on:
  push:
    branches:
      - feature/unified-persistence-ui
    paths:
      - .github/workflows/fix-unified-package-contract.yml

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: feature/unified-persistence-ui
          fetch-depth: 0
      - name: Update package GUI contract
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('scripts/build-deb.sh')
          text = path.read_text(encoding='utf-8')
          old = '''grep -Fq "Persistent Linux media (guarded creator)" "${GUI_TARGET}"
          grep -Fq "Open Persistent USB Creator" "${GUI_TARGET}"
          grep -Fq "Checksums…" "${GUI_TARGET}"'''
          new = '''grep -Fq 'Gtk.Expander(label="Persistent storage")' "${GUI_TARGET}"
          grep -Fq "Keep files and settings across reboots" "${GUI_TARGET}"
          if grep -Fq "Open Persistent USB Creator" "${GUI_TARGET}"; then
            echo "Packaged GUI must not expose the removed secondary persistence window" >&2
            exit 1
          fi
          grep -Fq "Checksums…" "${GUI_TARGET}"'''
          if old not in text:
              raise SystemExit('obsolete package GUI contract not found')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY
          bash -n scripts/build-deb.sh
          rm .github/workflows/fix-unified-package-contract.yml
      - name: Commit correction
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "Packaging: validate unified persistence GUI"
          git push origin HEAD:feature/unified-persistence-ui
