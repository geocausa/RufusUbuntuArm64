name: Apply persistence formatter reopen fix

on:
  push:
    branches:
      - fix/persistence-formatter-reopen
  pull_request:
    branches:
      - audit/pre-0.11-hardening

permissions:
  contents: write

concurrency:
  group: apply-persistence-formatter-reopen
  cancel-in-progress: false

jobs:
  apply:
    name: Apply, validate, and promote fix
    if: >-
      github.repository == 'geocausa/RufusUbuntuArm64' &&
      (github.event_name == 'push' ||
       github.event.pull_request.head.ref == 'fix/persistence-formatter-reopen')
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: fix/persistence-formatter-reopen
          fetch-depth: 0
          persist-credentials: true
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.26.5'
      - name: Verify audited branch ancestry
        env:
          BASE_SHA: c3bf92e78fd4f1fde7933765c0165011c72904f0
        run: |
          set -euo pipefail
          git merge-base --is-ancestor "${BASE_SHA}" HEAD
      - name: Verify reviewed patch checksum
        env:
          PATCH_PATH: .github/patches/persistence-formatter-reopen.patch
          PATCH_SHA256: be037ffe5d04c644c91934626f06bfec06c516c7129e79ea3e4c7aaae205460e
        run: |
          set -euo pipefail
          sha256sum "${PATCH_PATH}"
          printf '%s  %s\n' "${PATCH_SHA256}" "${PATCH_PATH}" | sha256sum -c -
      - name: Check reviewed patch applicability
        env:
          PATCH_PATH: .github/patches/persistence-formatter-reopen.patch
        run: |
          set -euo pipefail
          git apply --check --verbose "${PATCH_PATH}"
      - name: Apply reviewed patch
        env:
          PATCH_PATH: .github/patches/persistence-formatter-reopen.patch
        run: |
          set -euo pipefail
          git apply --verbose "${PATCH_PATH}"
      - name: Format added source and documentation
        run: |
          set -euo pipefail
          sed -i \
            -e 's/runCommand(t, "umount"/runFormatterTestCommand(t, "umount"/g' \
            -e 's/^func runCommand(/func runFormatterTestCommand(/' \
            internal/safety/reopenable_linux_test.go
          gofmt -w internal/safety/reopenable_linux.go internal/safety/reopenable_linux_test.go
          sed -i 's/^\(\*\*Severity:\*\* high destructive-path correctness\)  $/\1/' docs/pre-0.11-code-audit.md
      - name: Validate patched diff whitespace
        run: |
          set -euo pipefail
          git diff --check
      - name: Test safety package
        run: |
          set -o pipefail
          go test -v ./internal/safety 2>&1 | tee "${RUNNER_TEMP}/formatter-fix-safety.log"
      - name: Upload safety-package diagnostic
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: formatter-fix-safety-${{ github.run_id }}
          path: ${{ runner.temp }}/formatter-fix-safety.log
          if-no-files-found: error
      - name: Test Linux-media package
        run: go test -v ./internal/linuxmedia
      - name: Test persistence package
        run: go test -v ./internal/persistence
      - name: Run complete Go suite
        run: go test ./...
      - name: Exercise the real block-device formatter chain
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends dosfstools e2fsprogs
          sudo modprobe loop || true
          go test -c -o "${RUNNER_TEMP}/safety-loop.test" ./internal/safety
          sudo env \
            PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin \
            RUFUS_REAL_BLOCK_TEST=1 \
            "${RUNNER_TEMP}/safety-loop.test" \
            -test.run '^TestOpenReopenableDeviceSupportsFilesystemToolsOnLoop$' \
            -test.v
      - name: Remove one-shot staging files and stage production tree
        env:
          PATCH_PATH: .github/patches/persistence-formatter-reopen.patch
          WORKFLOW_PATH: .github/workflows/apply-persistence-formatter-reopen.yml
        run: |
          set -euo pipefail
          git rm -- "${PATCH_PATH}" "${WORKFLOW_PATH}"
          git add -A
      - name: Verify exact production diff
        env:
          BASE_SHA: c3bf92e78fd4f1fde7933765c0165011c72904f0
        run: |
          set -o pipefail
          cat >"${RUNNER_TEMP}/expected-files" <<'EOF'
          .github/workflows/ci.yml
          CHANGELOG.md
          docs/persistence-materialization.md
          docs/pre-0.11-code-audit.md
          internal/linuxmedia/create.go
          internal/persistence/filesystem.go
          internal/safety/reopenable_linux.go
          internal/safety/reopenable_linux_test.go
          EOF
          git diff --cached --name-only "${BASE_SHA}" | LC_ALL=C sort >"${RUNNER_TEMP}/actual-files"
          {
            echo '=== expected ==='
            cat "${RUNNER_TEMP}/expected-files"
            echo '=== actual ==='
            cat "${RUNNER_TEMP}/actual-files"
            echo '=== diff ==='
            diff -u "${RUNNER_TEMP}/expected-files" "${RUNNER_TEMP}/actual-files"
          } 2>&1 | tee "${RUNNER_TEMP}/formatter-fix-manifest.log"
          git diff --cached --check
      - name: Upload production-diff diagnostic
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: formatter-fix-manifest-${{ github.run_id }}
          path: ${{ runner.temp }}/formatter-fix-manifest.log
          if-no-files-found: error
      - name: Commit validated production changes
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m '0.10.5: allow inherited filesystem-tool descriptor reopen'
      - name: Archive validated production commit
        run: |
          set -euo pipefail
          archive_root="${RUNNER_TEMP}/formatter-fix-production"
          mkdir -p "${archive_root}"
          git archive --format=tar.gz -o "${archive_root}/production-tree.tar.gz" HEAD \
            .github/workflows/ci.yml \
            CHANGELOG.md \
            docs/persistence-materialization.md \
            docs/pre-0.11-code-audit.md \
            internal/linuxmedia/create.go \
            internal/persistence/filesystem.go \
            internal/safety/reopenable_linux.go \
            internal/safety/reopenable_linux_test.go
          git format-patch -1 --stdout >"${archive_root}/production-commit.patch"
          git rev-parse HEAD >"${archive_root}/validated-commit.txt"
          sha256sum "${archive_root}/production-tree.tar.gz" \
            "${archive_root}/production-commit.patch" \
            >"${archive_root}/SHA256SUMS"
      - name: Push validated production changes
        continue-on-error: true
        run: |
          set -o pipefail
          git push origin 'HEAD:fix/persistence-formatter-reopen' 2>&1 | tee "${RUNNER_TEMP}/formatter-fix-production/push.log"
      - name: Upload validated production commit
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: formatter-fix-production-${{ github.run_id }}
          path: ${{ runner.temp }}/formatter-fix-production/
          if-no-files-found: error
