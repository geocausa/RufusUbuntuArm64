name: Apply device qualification contract fixes

on:
  pull_request:
    branches:
      - feature/windows-option-eligibility

permissions:
  contents: write

jobs:
  integrate:
    if: github.head_ref == 'feature/device-qualification-foundation'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: feature/device-qualification-foundation
          fetch-depth: 0
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff
        with:
          go-version: '1.22.x'
      - name: Apply reviewed fixes and focused tests
        shell: bash
        run: |
          set -euo pipefail
          python3 <<'PY'
          from pathlib import Path

          path = Path('internal/devicequal/engine.go')
          text = path.read_text(encoding='utf-8')

          old = 'AliasedWithOffset  uint64 `json:"aliased_with_offset,omitempty"`'
          new = 'AliasedWithOffset  *uint64 `json:"aliased_with_offset,omitempty"`'
          if text.count(old) != 1:
              raise SystemExit(f'alias field count = {text.count(old)}, want 1')
          text = text.replace(old, new, 1)

          old = '''\t\tif writeErr != nil {
\t\t\tfailure := failureFromError("write", passIndex+1, pattern.ID, region, region.Offset+written, writeErr)
\t\t\treturn finishFailed(report, pass, failure, started, config.Now(), false)
\t\t}
'''
          new = '''\t\tif writeErr != nil {
\t\t\tif errors.Is(writeErr, context.Canceled) || errors.Is(writeErr, context.DeadlineExceeded) {
\t\t\t\treturn finishCancelled(report, pass, passIndex, pattern, started, config.Now(), writeErr)
\t\t\t}
\t\t\tfailure := failureFromError("write", passIndex+1, pattern.ID, region, region.Offset+written, writeErr)
\t\t\treturn finishFailed(report, pass, failure, started, config.Now(), false)
\t\t}
'''
          if text.count(old) != 1:
              raise SystemExit(f'write failure block count = {text.count(old)}, want 1')
          text = text.replace(old, new, 1)

          old = '''\t\tfailure.Kind = "alias"
\t\tfailure.AliasedWithOffset = owner
\t\tfailure.Message = fmt.Sprintf("region at byte %d contains the address pattern for byte %d", region.Offset, owner)
'''
          new = '''\t\tfailure.Kind = "alias"
\t\taliasOffset := owner
\t\tfailure.AliasedWithOffset = &aliasOffset
\t\tfailure.Message = fmt.Sprintf("region at byte %d contains the address pattern for byte %d", region.Offset, owner)
'''
          if text.count(old) != 1:
              raise SystemExit(f'alias assignment count = {text.count(old)}, want 1')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY
          gofmt -w internal/devicequal/engine.go internal/devicequal/engine_test.go
          go test ./internal/devicequal
          git config user.name 'RufusArm64 CI'
          git config user.email 'actions@users.noreply.github.com'
          git add internal/devicequal/engine.go internal/devicequal/engine_test.go
          git commit -m 'devicequal: preserve alias offsets and cancellation state'
          git push origin HEAD:feature/device-qualification-foundation
