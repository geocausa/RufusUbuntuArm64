name: Fix unified persistence package contract

on:
  pull_request:
    branches: [main]
    paths:
      - scripts/fix-unified-persistence-package-contract.py
      - .github/workflows/fix-unified-persistence-package-contract.yml

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'feature/unified-persistence-ui'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: feature/unified-persistence-ui
          fetch-depth: 0
      - name: Apply and validate package contract
        run: |
          python3 scripts/fix-unified-persistence-package-contract.py
          PYTHONPATH=gui python3 -m unittest discover -s gui -p 'test_*.py'
          python3 -m py_compile gui/*.py
          sh -n packaging/rufusarm64
          desktop-file-validate packaging/io.github.geocausa.RufusArm64.desktop || true
          bash -n scripts/*.sh
          git diff --check
          rm scripts/fix-unified-persistence-package-contract.py .github/workflows/fix-unified-persistence-package-contract.yml
      - name: Commit validated package contract
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m 'gui: keep persistence in one installed application'
          git push origin HEAD:feature/unified-persistence-ui
