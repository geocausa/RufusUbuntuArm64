name: FreeDOS loop qualification

on:
  push:
    branches:
      - main
      - stage2/0.13.0
      - feature/freedos-gui
      - 'release/**'
  pull_request:

permissions:
  contents: write

concurrency:
  group: freedos-loop-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  apply-gui-packaging:
    name: Apply reviewed FreeDOS GUI packaging
    if: github.event_name == 'push' && github.event.head_commit.message == 'CI: apply FreeDOS GUI packaging through loop gate'
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: feature/freedos-gui
          persist-credentials: true
          fetch-depth: 0
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.26.5'
      - name: Apply, verify, and remove temporary workflow changes
        run: |
          python3 - <<'PY'
          from pathlib import Path

          def replace_once(text, old, new, label):
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"{label}: expected one match, found {count}")
              return text.replace(old, new, 1)

          build_path = Path("scripts/build-deb.sh")
          build = build_path.read_text(encoding="utf-8")
          build = replace_once(
              build,
              '''grep -Fq 'Gtk.Button(label="Non bootable…")' "${ROOT_DIR}/gui/rufusarm64_nonbootable_dialog.py"
          grep -Fq 'install_nonbootable(RufusWindow)' "${ROOT_DIR}/gui/rufusarm64_integrated.py"
          ''',
              '''grep -Fq 'Gtk.Button(label="Non bootable…")' "${ROOT_DIR}/gui/rufusarm64_nonbootable_dialog.py"
          grep -Fq 'install_nonbootable(RufusWindow)' "${ROOT_DIR}/gui/rufusarm64_integrated.py"
          grep -Fq 'Gtk.Button(label="FreeDOS…")' "${ROOT_DIR}/gui/rufusarm64_freedos_dialog.py"
          grep -Fq 'install_freedos(RufusWindow)' "${ROOT_DIR}/gui/rufusarm64_integrated.py"
          ''',
              "FreeDOS GUI source gates",
          )
          build = replace_once(
              build,
              '''install -Dm644 "${ROOT_DIR}/gui/rufusarm64_nonbootable_dialog.py" \\
            "${PACKAGE_DIR}/usr/lib/rufusarm64/rufusarm64_nonbootable_dialog.py"
          install -Dm644 "${ROOT_DIR}/gui/rufusarm64_integrated.py" \\
          ''',
              '''install -Dm644 "${ROOT_DIR}/gui/rufusarm64_nonbootable_dialog.py" \\
            "${PACKAGE_DIR}/usr/lib/rufusarm64/rufusarm64_nonbootable_dialog.py"
          install -Dm644 "${ROOT_DIR}/gui/rufusarm64_freedos.py" \\
            "${PACKAGE_DIR}/usr/lib/rufusarm64/rufusarm64_freedos.py"
          install -Dm644 "${ROOT_DIR}/gui/rufusarm64_freedos_dialog.py" \\
            "${PACKAGE_DIR}/usr/lib/rufusarm64/rufusarm64_freedos_dialog.py"
          install -Dm644 "${ROOT_DIR}/gui/rufusarm64_integrated.py" \\
          ''',
              "FreeDOS GUI installation",
          )
          build = replace_once(
              build,
              '''install -Dm644 "${ROOT_DIR}/docs/freedos-linux-backend.md" \\
            "${PACKAGE_DIR}/usr/share/doc/rufusarm64/freedos-linux-backend.md"
          install -Dm644 "${ROOT_DIR}/NOTICE" \\
          ''',
              '''install -Dm644 "${ROOT_DIR}/docs/freedos-linux-backend.md" \\
            "${PACKAGE_DIR}/usr/share/doc/rufusarm64/freedos-linux-backend.md"
          install -Dm644 "${ROOT_DIR}/docs/freedos-user-guide.md" \\
            "${PACKAGE_DIR}/usr/share/doc/rufusarm64/freedos-user-guide.md"
          install -Dm644 "${ROOT_DIR}/NOTICE" \\
          ''',
              "FreeDOS user guide installation",
          )
          build_path.write_text(build, encoding="utf-8")

          test_path = Path("scripts/test.sh")
          test = test_path.read_text(encoding="utf-8")
          test = replace_once(
              test,
              '''  gui/rufusarm64_nonbootable.py gui/rufusarm64_nonbootable_dialog.py \\
            gui/rufusarm64_integrated.py gui/rufusarm64_persistence.py gui/rufusarm64_persistence_logic.py
          ''',
              '''  gui/rufusarm64_nonbootable.py gui/rufusarm64_nonbootable_dialog.py \\
            gui/rufusarm64_freedos.py gui/rufusarm64_freedos_dialog.py \\
            gui/rufusarm64_integrated.py gui/rufusarm64_persistence.py gui/rufusarm64_persistence_logic.py
          ''',
              "FreeDOS Python compilation",
          )
          test = replace_once(
              test,
              '''[[ -f "${extract_dir}/usr/lib/rufusarm64/rufusarm64_device_qualify_dialog.py" ]]
          [[ -f "${extract_dir}/usr/lib/rufusarm64/rufusarm64_persistence.py" ]]
          ''',
              '''[[ -f "${extract_dir}/usr/lib/rufusarm64/rufusarm64_device_qualify_dialog.py" ]]
          [[ -f "${extract_dir}/usr/lib/rufusarm64/rufusarm64_freedos.py" ]]
          [[ -f "${extract_dir}/usr/lib/rufusarm64/rufusarm64_freedos_dialog.py" ]]
          [[ -f "${extract_dir}/usr/lib/rufusarm64/rufusarm64_persistence.py" ]]
          ''',
              "FreeDOS installed Python checks",
          )
          test = replace_once(
              test,
              '''[[ -f "${extract_dir}/usr/share/doc/rufusarm64/persistence-qualification.md" ]]
          [[ ! -e "${extract_dir}/usr/bin/rufus-channel-admin" ]]
          ''',
              '''[[ -f "${extract_dir}/usr/share/doc/rufusarm64/persistence-qualification.md" ]]
          [[ -f "${extract_dir}/usr/share/doc/rufusarm64/freedos-user-guide.md" ]]
          [[ ! -e "${extract_dir}/usr/bin/rufus-channel-admin" ]]
          ''',
              "FreeDOS installed guide check",
          )
          test_path.write_text(test, encoding="utf-8")
          PY
          python3 -m py_compile \
            gui/rufusarm64_freedos.py gui/rufusarm64_freedos_dialog.py \
            gui/rufusarm64_integrated.py
          PYTHONPATH=gui python3 -m unittest \
            gui.test_freedos_format gui.test_freedos_dialog
          go test ./internal/freedos ./cmd/rufus-freedos-format
          git fetch origin stage2/0.13.0
          git show origin/stage2/0.13.0:.github/workflows/freedos-loop.yml \
            > .github/workflows/freedos-loop.yml
          rm -f .github/workflows/apply-freedos-gui-packaging.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add scripts/build-deb.sh scripts/test.sh \
            .github/workflows/freedos-loop.yml \
            .github/workflows/apply-freedos-gui-packaging.yml
          git commit -m 'FreeDOS: package graphical workflow'
          git push origin HEAD:feature/freedos-gui

  loop-readback:
    name: Build and verify through a real loop device
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.26.5'
      - name: Install loop qualification tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends dosfstools util-linux
      - name: Exercise deterministic FreeDOS media through the kernel
        env:
          RUFUS_REAL_BLOCK_TEST: '1'
        run: |
          mkdir -p dist/audit-logs
          set -o pipefail
          {
            sudo modprobe loop || true
            go test -c -o "${RUNNER_TEMP}/freedos-loop.test" ./internal/freedos
            sudo env RUFUS_REAL_BLOCK_TEST="${RUFUS_REAL_BLOCK_TEST}" \
              "${RUNNER_TEMP}/freedos-loop.test" \
              -test.run '^(TestBuildMediaImageSupportsRealLoopReadback|TestExecuteLinuxDeviceThroughRealLoop)$' \
              -test.v
          } 2>&1 | tee dist/audit-logs/freedos-loop-qualification.log
      - name: Upload qualification log
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: freedos-loop-${{ github.run_id }}
          path: dist/audit-logs/freedos-loop-qualification.log
          if-no-files-found: warn
