name: Apply 0.9C3 Linux media copy

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'develop/0.9.0-linux-media-copy'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: develop/0.9.0-linux-media-copy
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23.x'

      - name: Decode and verify Linux media copy patch
        shell: bash
        run: |
          set -euo pipefail
          base64 --decode .changes/0.9C3/patch.xz.b64 > /tmp/0.9C3.patch.xz
          echo '57fcf07810b2133226daa9a7c109f3a5e4e9b7117526a93d6343bd515847cff0  /tmp/0.9C3.patch.xz' | sha256sum --check --strict
          xz --decompress --stdout /tmp/0.9C3.patch.xz > /tmp/0.9C3.patch
          echo '3af23aeea0b29d9caa4e10ea4add47e76e75d57b8f4ade7589b5aa96f74ecc46  /tmp/0.9C3.patch' | sha256sum --check --strict
          git apply --check /tmp/0.9C3.patch
          git apply /tmp/0.9C3.patch
          rm -rf .changes

      - name: Validate Linux media copy foundation
        shell: bash
        run: |
          set -euo pipefail
          test -z "$(gofmt -l cmd internal)"
          go test ./...
          go test -race ./internal/linuxmedia ./internal/persistence ./internal/acquisition ./cmd/rufus-linux
          go test -shuffle=on -count=5 ./internal/linuxmedia ./internal/persistence ./internal/acquisition ./cmd/rufus-linux
          go vet ./...
          python3 -m py_compile gui/rufusarm64.py gui/rufusarm64_logic.py gui/test_logic.py
          (cd gui && python3 -m unittest test_logic.py)

      - name: Commit validated Linux media copy foundation
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add --all
          git commit -m 'Add verified writable Linux media copy foundation'
          git push origin HEAD:develop/0.9.0-linux-media-copy
