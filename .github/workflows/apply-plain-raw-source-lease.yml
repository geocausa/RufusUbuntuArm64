name: Apply plain raw source lease

on:
  pull_request:
    types: [opened, reopened, ready_for_review]
    branches: [stage2/0.13.0]

permissions:
  contents: write

concurrency:
  group: apply-plain-raw-source-lease
  cancel-in-progress: false

jobs:
  apply:
    if: github.event.pull_request.head.ref == 'audit/plain-raw-source-lease'
    runs-on: ubuntu-24.04
    steps:
      - name: Check out the integration branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: audit/plain-raw-source-lease
          fetch-depth: 0

      - name: Set up declared Go version
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff
        with:
          go-version-file: go.mod
          cache: false

      - name: Apply the reviewed patch
        run: python3 scripts/apply-plain-raw-source-lease.py

      - name: Format and run focused regressions
        run: |
          gofmt -w internal/imaging/imaging.go internal/imaging/source_hold_linux_test.go cmd/rufus-linux/main.go
          go test ./internal/sourcefile ./internal/imaging ./cmd/rufus-linux
          python3 -m json.tool docs/operation-cost-contract.json >/dev/null
          git diff --check

      - name: Remove the one-shot executor and publish the reviewed source commit
        run: |
          rm scripts/apply-plain-raw-source-lease.py
          rm .github/workflows/apply-plain-raw-source-lease.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m 'Audit: hold plain raw sources through destructive writes'
          git push origin HEAD:audit/plain-raw-source-lease
