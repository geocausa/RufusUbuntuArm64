name: Apply non-bootable GTK hardening v2

on:
  push:
    branches: [feature/nonbootable-gtk]
    paths:
      - .github/workflows/apply-nonbootable-gtk-hardening-v2.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: feature/nonbootable-gtk
      - name: Apply and verify hardening
        id: verify
        shell: bash
        run: |
          set +e
          {
            set -x
            python3 .github/scripts/apply_nonbootable_gtk_hardening.py
            python3 -m py_compile gui/rufusarm64_nonbootable.py gui/rufusarm64_nonbootable_dialog.py
            PYTHONPATH=gui python3 -m unittest -v gui/test_nonbootable_format.py gui/test_nonbootable_dialog.py gui/test_packaged_launcher.py
          } > hardening.log 2>&1
          status=$?
          cat hardening.log
          echo "status=${status}" >> "$GITHUB_OUTPUT"
          exit 0
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: nonbootable-gtk-hardening-log
          path: hardening.log
      - name: Commit verified hardening
        if: steps.verify.outputs.status == '0'
        run: |
          set -eux
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add gui/rufusarm64_nonbootable_dialog.py gui/test_nonbootable_format.py gui/test_nonbootable_dialog.py
          git commit -m "GTK: bind formatter policy path and canonical labels"
          git push origin HEAD:feature/nonbootable-gtk
      - name: Fail on verification error
        if: steps.verify.outputs.status != '0'
        run: exit 1
