name: Apply checksum CLI tranche

on:
  push:
    branches: [feature/checksum-cli]
    paths:
      - scripts/apply-checksum-cli.py
      - .github/workflows/apply-checksum-cli.yml

permissions:
  contents: write

concurrency:
  group: apply-checksum-cli
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: feature/checksum-cli
          fetch-depth: 0
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.22.x'
      - name: Apply and validate the read-only CLI tranche
        run: |
          set -euo pipefail
          python3 -m py_compile scripts/apply-checksum-cli.py
          python3 scripts/apply-checksum-cli.py
          gofmt -w \
            cmd/rufus-linux/main.go \
            cmd/rufus-linux/hash_cli.go \
            cmd/rufus-linux/hash_cli_test.go
          go test ./cmd/rufus-linux ./internal/sourcefile
          go vet ./cmd/rufus-linux ./internal/sourcefile
          bash -n scripts/test.sh
          rm scripts/apply-checksum-cli.py .github/workflows/apply-checksum-cli.yml
          git diff --check
      - name: Commit the validated tranche
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m 'Checksum parity: expose selectable algorithms through CLI'
          git push origin HEAD:feature/checksum-cli
