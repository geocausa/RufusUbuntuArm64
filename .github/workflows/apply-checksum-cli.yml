name: Apply checksum CLI tranche

on:
  push:
    branches: [feature/checksum-cli]
    paths:
      - scripts/apply-checksum-cli.py
      - .github/workflows/apply-checksum-cli.yml
  pull_request:
    branches: [main]
    paths:
      - scripts/apply-checksum-cli.py
      - .github/workflows/apply-checksum-cli.yml

permissions:
  contents: write

concurrency:
  group: apply-checksum-cli
  cancel-in-progress: false

jobs:
  apply:
    if: github.head_ref == 'feature/checksum-cli' || github.ref_name == 'feature/checksum-cli'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: feature/checksum-cli
          fetch-depth: 0
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.22.x'
      - name: Apply, validate, and preserve diagnostics
        run: |
          set -u
          status=0
          {
            set -e
            sed -i 's/if count != 1:/if count < 1:/' scripts/apply-checksum-cli.py
            sed -i 's/expected one replacement target/expected a replacement target/' scripts/apply-checksum-cli.py
            python3 -m py_compile scripts/apply-checksum-cli.py
            python3 scripts/apply-checksum-cli.py
            gofmt -w \
              cmd/rufus-linux/main.go \
              cmd/rufus-linux/hash_cli.go \
              cmd/rufus-linux/hash_cli_test.go
            go test ./cmd/rufus-linux ./internal/sourcefile
            go vet ./cmd/rufus-linux ./internal/sourcefile
            bash -n scripts/test.sh
            git diff --check
          } > checksum-cli-validation.log 2>&1 || status=$?
          rm -f scripts/apply-checksum-cli.py .github/workflows/apply-checksum-cli.yml
          if [[ "${status}" -eq 0 ]]; then
            rm -f checksum-cli-validation.log
          else
            printf '\nvalidation exit status: %s\n' "${status}" >> checksum-cli-validation.log
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m 'Checksum parity: materialize CLI tranche for review'
          git push origin HEAD:feature/checksum-cli
