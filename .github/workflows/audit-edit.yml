name: Audit exact edit

on:
  pull_request:
    branches:
      - feature/persistence-wizard

permissions:
  contents: write

concurrency:
  group: audit-exact-edit
  cancel-in-progress: false

jobs:
  edit:
    if: github.repository == 'geocausa/RufusUbuntuArm64' && github.event.pull_request.head.ref == 'audit/pre-0.11-hardening'
    runs-on: ubuntu-24.04
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: audit/pre-0.11-hardening
      - name: Apply exact source corrections
        run: |
          python3 - <<'PY'
          from pathlib import Path

          def replace(path, old, new):
              text = path.read_text(encoding='utf-8')
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'{path}: expected one occurrence, found {count}: {old!r}')
              path.write_text(text.replace(old, new, 1), encoding='utf-8')

          test = Path('scripts/test.sh')
          replacements = {
              "! grep -q -- '--private-key' cmd/rufus-channel-admin/main.go": "if grep -q -- '--private-key' cmd/rufus-channel-admin/main.go; then echo 'private-key option must not exist' >&2; exit 1; fi",
              "! grep -q 'ed25519.PrivateKey' cmd/rufus-channel-admin/main.go": "if grep -q 'ed25519.PrivateKey' cmd/rufus-channel-admin/main.go; then echo 'private Ed25519 keys must not exist' >&2; exit 1; fi",
              "! grep -q 'ed25519.Sign(' cmd/rufus-channel-admin/main.go": "if grep -q 'ed25519.Sign(' cmd/rufus-channel-admin/main.go; then echo 'signing code must not exist' >&2; exit 1; fi",
              "! readelf -l \"${helper}\" | grep -q 'Requesting program interpreter'": "if readelf -l \"${helper}\" | grep -q 'Requesting program interpreter'; then echo 'main helper must be static' >&2; exit 1; fi",
              "! readelf -l \"${persistence_helper}\" | grep -q 'Requesting program interpreter'": "if readelf -l \"${persistence_helper}\" | grep -q 'Requesting program interpreter'; then echo 'persistence helper must be static' >&2; exit 1; fi",
              "! grep -q '^Suggests:.*wimtools' \"${extract_dir}/DEBIAN/control\"": "if grep -q '^Suggests:.*wimtools' \"${extract_dir}/DEBIAN/control\"; then echo 'package must not suggest external wimtools' >&2; exit 1; fi",
              "! grep -q 'Depends:.*parted' \"${extract_dir}/DEBIAN/control\"": "if grep -q 'Depends:.*parted' \"${extract_dir}/DEBIAN/control\"; then echo 'package must not depend on parted' >&2; exit 1; fi",
              "! grep -q 'auth_admin_keep' \"${extract_dir}/usr/share/polkit-1/actions/io.github.geocausa.RufusArm64.policy\"": "if grep -q 'auth_admin_keep' \"${extract_dir}/usr/share/polkit-1/actions/io.github.geocausa.RufusArm64.policy\"; then echo 'Polkit authorization must not be retained' >&2; exit 1; fi",
          }
          for old, new in replacements.items():
              replace(test, old, new)
          PY
          bash -n scripts/test.sh scripts/static-audit.sh
          shellcheck -x scripts/*.sh packaging/rufusarm64
      - name: Commit exact corrections
        run: |
          git config user.name 'RufusArm64 audit'
          git config user.email 'actions@users.noreply.github.com'
          git add scripts/test.sh
          git commit -m 'audit: make validation assertions explicit'
          git push origin HEAD:audit/pre-0.11-hardening
