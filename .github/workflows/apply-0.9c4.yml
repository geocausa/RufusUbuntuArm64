name: Apply 0.9C4 persistent Linux orchestration

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'develop/0.9.0-persistence-orchestration'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: develop/0.9.0-persistence-orchestration
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23.x'

      - name: Decode and verify persistence orchestration patch
        shell: bash
        run: |
          set -euo pipefail
          cat .changes/0.9C4/chunk-* > /tmp/0.9C4.patch.xz.b64
          base64 --decode /tmp/0.9C4.patch.xz.b64 > /tmp/0.9C4.patch.xz
          echo '8ae74c1026163bb0bc35c4697338eb8b19133130877480ab93e0d349fd2ea5a2  /tmp/0.9C4.patch.xz' | sha256sum --check --strict
          xz --decompress --stdout /tmp/0.9C4.patch.xz > /tmp/0.9C4.patch
          echo 'e4dd88ebcd65f8a1e2eb4bfa8e0bc5bf474715f431eee69302da34953af581df  /tmp/0.9C4.patch' | sha256sum --check --strict
          git apply --check /tmp/0.9C4.patch
          git apply /tmp/0.9C4.patch
          rm -rf .changes

      - name: Validate persistent Linux orchestration
        shell: bash
        run: |
          set -euo pipefail
          test -z "$(gofmt -l cmd internal)"
          go test ./...
          go test -race ./internal/linuxmedia ./internal/persistence ./internal/acquisition ./cmd/rufus-linux
          go test -shuffle=on -count=5 ./internal/linuxmedia ./internal/persistence ./internal/acquisition ./cmd/rufus-linux
          go vet ./...
          python3 -m py_compile gui/rufusarm64.py gui/rufusarm64_logic.py gui/test_logic.py
          (cd gui && python3 -m unittest test_logic.py)

      - name: Commit validated persistent Linux orchestration
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add --all
          git commit -m 'Add CLI-only persistent Linux creation orchestration'
          git push origin HEAD:develop/0.9.0-persistence-orchestration
