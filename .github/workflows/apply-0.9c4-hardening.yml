name: Apply 0.9C4 persistence hardening

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'develop/0.9.0-persistence-hardening'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: develop/0.9.0-persistence-hardening
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23.x'

      - name: Decode and verify persistence hardening patch
        shell: bash
        run: |
          set -euo pipefail
          base64 --decode .changes/0.9C4-hardening/patch.xz.b64 > /tmp/0.9C4-hardening.patch.xz
          echo '41860282eff95a512dcbb2bf2a2a1eaca468a8e2fbf083e0691497d64518bddc  /tmp/0.9C4-hardening.patch.xz' | sha256sum --check --strict
          xz --decompress --stdout /tmp/0.9C4-hardening.patch.xz > /tmp/0.9C4-hardening.patch
          echo 'b9e0828aa325577d3de54da8b55d9c8c0a3d68802f1c7506953c532c7df65d18  /tmp/0.9C4-hardening.patch' | sha256sum --check --strict
          git apply --check /tmp/0.9C4-hardening.patch
          git apply /tmp/0.9C4-hardening.patch
          rm -rf .changes

      - name: Validate persistence hardening
        shell: bash
        run: |
          set -euo pipefail
          test -z "$(gofmt -l cmd internal)"
          go test ./...
          go test -race ./internal/linuxmedia ./internal/persistence ./internal/acquisition ./cmd/rufus-linux
          go test -shuffle=on -count=5 ./internal/linuxmedia ./internal/persistence ./internal/acquisition ./cmd/rufus-linux
          go vet ./...
          python3 -m py_compile gui/rufusarm64.py gui/rufusarm64_logic.py gui/test_logic.py
          (cd gui && python3 -m unittest test_logic.py)

      - name: Commit validated persistence hardening
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add --all
          git commit -m 'Harden persistence durability and partition identity'
          git push origin HEAD:develop/0.9.0-persistence-hardening
