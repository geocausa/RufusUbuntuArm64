name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test-and-package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23.x'
      - name: Check formatting
        run: test -z "$(gofmt -l cmd internal)"
      - name: Unit tests with race detector
        run: go test -race ./...
      - name: Go vet
        run: go vet ./...
      - name: Check Python GUI syntax
        run: python3 -m py_compile gui/rufusarm64.py
      - name: Build ARM64 Debian package
        run: VERSION=0.2.0 ./scripts/build-deb.sh
      - name: Inspect package
        run: |
          dpkg-deb --info dist/rufusarm64_0.2.0_arm64.deb
          dpkg-deb --contents dist/rufusarm64_0.2.0_arm64.deb
      - uses: actions/upload-artifact@v4
        with:
          name: rufusarm64-ubuntu-arm64
          path: |
            dist/rufusarm64_0.2.0_arm64.deb
            dist/rufusarm64_0.2.0_arm64.deb.sha256
