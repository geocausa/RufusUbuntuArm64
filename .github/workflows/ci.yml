name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23.x'
      - run: gofmt -w . && git diff --exit-code
      - run: go test ./...
      - run: go vet ./...
      - name: Build Linux ARM64
        run: CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -trimpath -o rufus-linux-arm64 ./cmd/rufus-linux
      - uses: actions/upload-artifact@v4
        with:
          name: rufus-linux-arm64
          path: rufus-linux-arm64
