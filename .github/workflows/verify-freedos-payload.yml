name: Verify FreeDOS payload contract

on:
  push:
    branches: [feature/freedos-payload-provenance]
    paths:
      - .github/workflows/verify-freedos-payload.yml

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: feature/freedos-payload-provenance
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v6
        with:
          go-version: '1.22.12'
      - name: Format and verify payload contract
        shell: bash
        run: |
          set -euxo pipefail
          gofmt -w internal/freedos/manifest.go internal/freedos/payload.go internal/freedos/payload_test.go
          test -z "$(gofmt -l internal/freedos)"
          go test -race ./internal/freedos
          go test -shuffle=on -count=3 ./internal/freedos
          go install honnef.co/go/tools/cmd/staticcheck@2025.1.1
          staticcheck ./internal/freedos
          python3 scripts/extract-freedos-payload.py --check
          python3 -m py_compile scripts/extract-freedos-payload.py
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add internal/freedos/manifest.go internal/freedos/payload.go internal/freedos/payload_test.go
          if ! git diff --cached --quiet; then
            git commit -m 'FreeDOS: format payload contract sources'
            git push origin HEAD:feature/freedos-payload-provenance
          fi
