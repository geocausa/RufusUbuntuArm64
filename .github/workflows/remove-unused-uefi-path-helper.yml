name: Remove unused UEFI path helper

on:
  pull_request:
    branches:
      - develop/0.11.0
    paths:
      - '.github/remove-unused-uefi-path-helper.trigger'

permissions:
  contents: write

jobs:
  remove:
    if: github.head_ref == 'feature/0.11-uefi-descriptor-traversal'
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: feature/0.11-uefi-descriptor-traversal
          persist-credentials: true
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.22.x'
      - name: Remove obsolete pathname helper
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          path = Path('internal/secureboot/uefi.go')
          source = path.read_text()
          start = source.index('func parseUEFIImageFile(')
          end = source.index('\nfunc parseUEFIImage(', start)
          source = source[:start] + source[end + 1:]
          source = source.replace('\n\t"os"', '', 1)
          path.write_text(source)
          PY
          gofmt -w internal/secureboot/uefi.go
          git diff --check
          go test -race -count=1 ./internal/secureboot -run 'TestValidateUEFI'
          go vet ./internal/secureboot
          go test ./...
      - name: Commit validated cleanup
        run: |
          git add internal/secureboot/uefi.go
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m '0.11: remove obsolete pathname UEFI parser helper'
          git push origin 'HEAD:feature/0.11-uefi-descriptor-traversal'
