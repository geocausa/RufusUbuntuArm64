name: Apply exact raw mutation boundary

on:
  pull_request:
    types: [reopened, ready_for_review]
    branches: [stage2/0.13.0]

permissions:
  contents: write

concurrency:
  group: apply-raw-mutation-boundary
  cancel-in-progress: false

jobs:
  apply:
    if: github.event.pull_request.head.ref == 'audit/plain-raw-source-lease'
    runs-on: ubuntu-24.04
    steps:
      - name: Check out the source branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: audit/plain-raw-source-lease
          fetch-depth: 0

      - name: Set up declared Go version
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff
        with:
          go-version-file: go.mod
          cache: false

      - name: Apply the reviewed mutation-boundary patch
        run: python3 scripts/apply-raw-mutation-boundary.py

      - name: Format and test imaging boundaries
        run: |
          gofmt -w internal/imaging/imaging.go
          go test ./internal/sourcefile ./internal/imaging ./cmd/rufus-linux
          git diff --check

      - name: Remove executor and publish source-only correction
        run: |
          rm scripts/apply-raw-mutation-boundary.py
          rm .github/workflows/apply-raw-mutation-boundary.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m 'Audit: track raw target mutation after successful writes'
          git push origin HEAD:audit/plain-raw-source-lease
