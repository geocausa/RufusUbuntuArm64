name: Audit test script cleanup

on:
  pull_request:
    branches:
      - feature/persistence-wizard

permissions:
  contents: write

concurrency:
  group: audit-test-script-cleanup
  cancel-in-progress: false

jobs:
  remove-duplicate-audit-blocks:
    if: github.repository == 'geocausa/RufusUbuntuArm64' && github.event.pull_request.head.ref == 'audit/pre-0.11-hardening'
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: audit/pre-0.11-hardening
      - name: Remove exact duplicated blocks
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('scripts/test.sh')
          text = path.read_text(encoding='utf-8')
          blocks = (
              '''if command -v shellcheck >/dev/null 2>&1; then
            shellcheck -x scripts/*.sh packaging/rufusarm64
          fi
          ''',
              '''if command -v lintian >/dev/null 2>&1; then
            lintian --fail-on error "${PACKAGE}"
          fi
          ''',
              '''grep -q '^NoDisplay=true$' "${extract_dir}/usr/share/applications/io.github.geocausa.RufusArm64.Persistence.desktop"
          grep -q '^Actions=.*Persistence' "${extract_dir}/usr/share/applications/io.github.geocausa.RufusArm64.desktop"
          grep -q 'Open Persistent USB Creator' "${installed_gui}"
          ''',
          )
          changed = False
          for block in blocks:
              count = text.count(block)
              if count < 1:
                  raise SystemExit(f'expected audit block missing: {block.splitlines()[0]}')
              while text.count(block) > 1:
                  index = text.rfind(block)
                  text = text[:index] + text[index + len(block):]
                  changed = True
          if not changed:
              raise SystemExit(0)
          path.write_text(text, encoding='utf-8')
          PY
          bash -n scripts/test.sh
      - name: Commit the exact cleanup
        run: |
          if git diff --quiet -- scripts/test.sh; then
            exit 0
          fi
          git config user.name 'RufusArm64 audit'
          git config user.email 'actions@users.noreply.github.com'
          git add scripts/test.sh
          git commit -m 'audit: remove duplicated validation blocks'
          git push origin HEAD:audit/pre-0.11-hardening
