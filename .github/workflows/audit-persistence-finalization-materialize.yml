name: Audit persistence finalization materializer

on:
  push:
    branches:
      - audit/persistence-filesystem-finalization

permissions:
  contents: write

jobs:
  materialize:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: true
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.26.5'
      - name: Apply and commit reviewed persistence finalization edits
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('internal/persistence/filesystem.go')
          text = path.read_text(encoding='utf-8')
          if 'emitFilesystemCompletion(completed, returnErr' in text:
              raise SystemExit(0)

          replacements = [
              (
                  'func CreateFilesystem(ctx context.Context, partitionPath string, plan Plan, opts FilesystemOptions) (returnErr error) {\n\tif err := validateFilesystemPlan(plan); err != nil {',
                  'func CreateFilesystem(ctx context.Context, partitionPath string, plan Plan, opts FilesystemOptions) (returnErr error) {\n\tcompleted := false\n\tdefer func() {\n\t\temitFilesystemCompletion(completed, returnErr, opts.Event)\n\t}()\n\tif err := validateFilesystemPlan(plan); err != nil {'
              ),
              (
                  '\tdefer partition.Close()\n\tif err := verifyPersistencePartition(partition, partitionPath, plan, opts); err != nil {',
                  '\tpartitionLocked := false\n\tdefer func() {\n\t\treturnErr = finishPersistenceFile(returnErr, partition, partitionLocked, "persistence partition")\n\t}()\n\tif err := verifyPersistencePartition(partition, partitionPath, plan, opts); err != nil {'
              ),
              (
                  '\tdefer syscall.Flock(int(partition.Fd()), syscall.LOCK_UN) // best effort\n',
                  '\tpartitionLocked = true\n'
              ),
              (
                  '\temitFilesystem(opts.Event, "complete", "Persistence filesystem created and checked.")\n\treturn nil\n}',
                  '\tcompleted = true\n\treturn nil\n}'
              ),
          ]

          for old, new in replacements:
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'expected exactly one match, found {count}: {old[:100]!r}')
              text = text.replace(old, new, 1)

          path.write_text(text, encoding='utf-8')
          PY
          gofmt -w internal/persistence/filesystem.go
          go test ./internal/persistence
          if git diff --quiet -- internal/persistence/filesystem.go; then
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add internal/persistence/filesystem.go
          git commit -m 'Finalize persistence resources before completion'
          git push origin HEAD:audit/persistence-filesystem-finalization
