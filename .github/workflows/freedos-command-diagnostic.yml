name: FreeDOS command diagnostic

on:
  push:
    branches:
      - feature/freedos-command
    paths:
      - .github/workflows/freedos-command-diagnostic.yml

permissions:
  contents: read

jobs:
  go-compatibility:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.22.x'
      - name: Capture complete test output
        run: |
          mkdir -p dist/diagnostics
          set -o pipefail
          go test ./... 2>&1 | tee dist/diagnostics/go-1.22.log
      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: freedos-command-go-1.22-${{ github.run_id }}
          path: dist/diagnostics/go-1.22.log
          if-no-files-found: error
