name: Apply runtime manifest snapshot binding

on:
  push:
    branches:
      - audit/runtime-manifest-snapshot

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: audit/runtime-manifest-snapshot
          fetch-depth: 0
      - name: Bind the runtime manifest snapshot
        shell: bash
        run: |
          set +e
          python3 .github/scripts/apply_runtime_manifest_snapshot.py >/tmp/runtime-manifest-patch.log 2>&1
          patch_status=$?
          if [ "$patch_status" -eq 0 ]; then
            gofmt -w internal/runtimeintegrity/tree_linux.go internal/runtimeintegrity/transaction_linux.go internal/runtimeintegrity/manifest_snapshot_linux_test.go
            go test ./internal/runtimeintegrity >/tmp/runtime-manifest-test.log 2>&1
            patch_status=$?
          fi
          if [ "$patch_status" -ne 0 ]; then
            if [ -s /tmp/runtime-manifest-test.log ]; then
              cp /tmp/runtime-manifest-test.log runtime-manifest-patch-error.txt
            else
              cp /tmp/runtime-manifest-patch.log runtime-manifest-patch-error.txt
            fi
            git config user.name github-actions[bot]
            git config user.email 41898282+github-actions[bot]@users.noreply.github.com
            git add runtime-manifest-patch-error.txt
            git commit -m "Record runtime manifest patch failure" || true
            git push origin HEAD:audit/runtime-manifest-snapshot
            exit 0
          fi

          git rm .github/workflows/apply-runtime-manifest-snapshot.yml .github/scripts/apply_runtime_manifest_snapshot.py
          if [ -e runtime-manifest-patch-error.txt ]; then
            git rm runtime-manifest-patch-error.txt
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add internal/runtimeintegrity
          git commit -m "Bind runtime manifest to enumerated snapshot"
          git push origin HEAD:audit/runtime-manifest-snapshot
