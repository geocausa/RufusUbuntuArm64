name: Repair FreeDOS progress Popen anchor

on:
  push:
    branches:
      - fix/freedos-progress
    paths:
      - .github/workflows/repair-freedos-progress-v2.yml

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - name: Repair exact indentation
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          path = Path('.github/workflows/apply-freedos-progress-v2.yml')
          text = path.read_text(encoding='utf-8')
          old = '''              """                text=True,
                      start_new_session=True,
                  )
          """,
              """                text=True,
                      bufsize=1,
                      start_new_session=True,
                  )
          """,
          '''
          new = '''              "                text=True,\\n                start_new_session=True,\\n",
              "                text=True,\\n                bufsize=1,\\n                start_new_session=True,\\n",
          '''
          if text.count(old) != 1:
              raise SystemExit(f'workflow Popen anchor count={text.count(old)}, expected 1')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY
      - name: Commit repair
        run: |
          set -euo pipefail
          git rm .github/workflows/repair-freedos-progress-v2.yml diagnostics/freedos-progress-v2.log
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/workflows/apply-freedos-progress-v2.yml
          git commit -m "Repair FreeDOS progress workflow anchor"
          git push origin HEAD:fix/freedos-progress
