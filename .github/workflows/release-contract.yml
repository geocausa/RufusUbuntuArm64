name: Tagged release contract

on:
  pull_request:
    branches: [develop/0.11.0]
    paths:
      - .github/workflows/release.yml
      - .github/workflows/release-contract.yml
      - VERSION
      - CHANGELOG.md
      - README.md
      - ROADMAP.md
      - docs/release-*.md
      - docs/rufusarm64*.1
      - packaging/io.github.geocausa.RufusArm64.metainfo.xml
      - scripts/check-version-sync.py
      - scripts/check-release-runtime-integrity.py
      - scripts/build-uefi-md5sum-arm64.sh
      - scripts/build-deb.sh
      - scripts/test.sh
  push:
    branches:
      - fix/0.11-release-runtime-integrity
      - release/0.11.0

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Validate tagged-release artifact and metadata graph
        run: |
          python3 -m py_compile \
            scripts/check-version-sync.py \
            scripts/check-release-runtime-integrity.py
          python3 scripts/check-version-sync.py
          python3 scripts/check-release-runtime-integrity.py
          bash -n scripts/build-uefi-md5sum-arm64.sh scripts/build-deb.sh scripts/test.sh
      - name: Confirm the complete test harness changed only by the version-sync gate
        run: |
          git fetch --no-tags --depth=1 origin \
            develop/0.11.0:refs/remotes/origin/develop/0.11.0
          python3 - <<'PY'
          import subprocess
          from pathlib import Path

          base = subprocess.check_output(
              ["git", "show", "origin/develop/0.11.0:scripts/test.sh"],
              text=True,
          )
          expected = base.replace(
              'grep -Fq "rufusarm64_${VERSION}_arm64.deb" README.md\n',
              'grep -Fq "rufusarm64_${VERSION}_arm64.deb" README.md\n'
              'python3 scripts/check-version-sync.py\n',
              1,
          )
          if expected == base:
              raise SystemExit("could not locate the canonical insertion point in the base test harness")
          actual = Path("scripts/test.sh").read_text(encoding="utf-8")
          if actual != expected:
              raise SystemExit("scripts/test.sh changed beyond the single release version-sync invocation")
          PY
