name: Release contracts

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/release.yml
      - .github/workflows/release-contract.yml
      - .github/workflows/release-published.yml
      - .github/workflows/version-tag.yml
      - VERSION
      - CHANGELOG.md
      - README.md
      - ROADMAP.md
      - docs/release-*.md
      - docs/rufusarm64*.1
      - packaging/io.github.geocausa.RufusArm64.metainfo.xml
      - scripts/check-version-sync.py
      - scripts/check-release-runtime-integrity.py
      - scripts/check-published-release.py
      - scripts/test-check-published-release.py
      - scripts/build-uefi-md5sum-arm64.sh
      - scripts/build-deb.sh
      - scripts/test.sh
  push:
    branches: [main]
    paths:
      - .github/workflows/release.yml
      - .github/workflows/release-contract.yml
      - .github/workflows/release-published.yml
      - .github/workflows/version-tag.yml
      - VERSION
      - CHANGELOG.md
      - README.md
      - ROADMAP.md
      - docs/release-*.md
      - docs/rufusarm64*.1
      - packaging/io.github.geocausa.RufusArm64.metainfo.xml
      - scripts/check-version-sync.py
      - scripts/check-release-runtime-integrity.py
      - scripts/check-published-release.py
      - scripts/test-check-published-release.py
      - scripts/build-uefi-md5sum-arm64.sh
      - scripts/build-deb.sh
      - scripts/test.sh
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Validate release metadata, publication, and asset contracts
        run: |
          set -euo pipefail
          python3 -m py_compile \
            scripts/check-version-sync.py \
            scripts/check-release-runtime-integrity.py \
            scripts/check-published-release.py \
            scripts/test-check-published-release.py
          python3 scripts/check-version-sync.py
          python3 scripts/check-release-runtime-integrity.py
          python3 scripts/test-check-published-release.py
          bash -n scripts/build-uefi-md5sum-arm64.sh scripts/build-deb.sh scripts/test.sh
