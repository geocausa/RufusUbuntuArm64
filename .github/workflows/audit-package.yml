name: Audit package determinism

on:
  pull_request:
    branches:
      - feature/persistence-wizard

permissions:
  contents: write

concurrency:
  group: audit-package-determinism
  cancel-in-progress: false

jobs:
  harden:
    if: github.repository == 'geocausa/RufusUbuntuArm64' && github.event.pull_request.head.ref == 'audit/pre-0.11-hardening'
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: audit/pre-0.11-hardening
      - name: Apply exact package-build changes
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('scripts/build-deb.sh')
          text = path.read_text(encoding='utf-8')

          def replace(old, new, count=1):
              global text
              actual = text.count(old)
              if actual != count:
                  raise SystemExit(f'expected {count} occurrence(s), found {actual}: {old[:100]!r}')
              text = text.replace(old, new, count)

          replace(
              'OUTPUT_DIR="${ROOT_DIR}/dist"\n',
              '''OUTPUT_DIR="${OUTPUT_DIR:-${ROOT_DIR}/dist}"
          SOURCE_DATE_EPOCH="${SOURCE_DATE_EPOCH:-$(python3 - "${ROOT_DIR}/CHANGELOG.md" "${VERSION}" <<'PYDATE'
          import datetime
          import pathlib
          import re
          import sys

          changelog = pathlib.Path(sys.argv[1]).read_text(encoding="utf-8")
          version = re.escape(sys.argv[2])
          match = re.search(rf"^## {version} — (\\d{{4}}-\\d{{2}}-\\d{{2}})$", changelog, re.MULTILINE)
          if match is None:
              raise SystemExit("canonical release date is missing from CHANGELOG.md")
          date = datetime.date.fromisoformat(match.group(1))
          moment = datetime.datetime.combine(date, datetime.time(), datetime.timezone.utc)
          print(int(moment.timestamp()))
          PYDATE
          )}"
          export SOURCE_DATE_EPOCH
          export LC_ALL=C
          export TZ=UTC
          ''',
          )
          replace(
              'go build -trimpath -ldflags="-s -w -X main.version=${VERSION}"',
              'go build -buildvcs=false -trimpath -ldflags="-buildid= -s -w -X main.version=${VERSION}"',
              count=2,
          )
          replace(
              '''if [[ ! -f "${WIMLIB_SOURCE}" ]]; then
            echo "Missing verified ARM64 WIM engine: ${WIMLIB_SOURCE}" >&2
            exit 1
          fi
          ''',
              '''if [[ ! -f "${WIMLIB_SOURCE}" ]]; then
            echo "Missing verified ARM64 WIM engine: ${WIMLIB_SOURCE}" >&2
            exit 1
          fi
          expected_wim_hash="$(awk 'NF {print $1; exit}' "${ROOT_DIR}/vendor/wimlib/arm64/wimlib-imagex.sha256")"
          actual_wim_hash="$(sha256sum "${WIMLIB_SOURCE}" | awk '{print $1}')"
          [[ -n "${expected_wim_hash}" && "${actual_wim_hash}" == "${expected_wim_hash}" ]] || {
            echo "Refusing unpinned ARM64 WIM engine: ${actual_wim_hash}" >&2
            exit 1
          }
          ''',
          )
          replace(
              '''find "${PACKAGE_DIR}" -type d -exec chmod 0755 {} +
          dpkg-deb --root-owner-group -Zgzip -z9 --build "${PACKAGE_DIR}" \\
            "${OUTPUT_DIR}/rufusarm64_${VERSION}_${ARCH}.deb"
          ''',
              '''find "${PACKAGE_DIR}" -type d -exec chmod 0755 {} +
          find "${PACKAGE_DIR}" -exec touch --no-dereference --date="@${SOURCE_DATE_EPOCH}" {} +
          dpkg-deb --root-owner-group -Zgzip -z9 --build "${PACKAGE_DIR}" \\
            "${OUTPUT_DIR}/rufusarm64_${VERSION}_${ARCH}.deb"
          ''',
          )
          path.write_text(text, encoding='utf-8')
          PY
          bash -n scripts/build-deb.sh scripts/reproducible-package.sh
          shellcheck -x scripts/build-deb.sh scripts/reproducible-package.sh
      - name: Commit package hardening
        run: |
          git config user.name 'RufusArm64 audit'
          git config user.email 'actions@users.noreply.github.com'
          git add scripts/build-deb.sh
          git commit -m 'audit: make Debian packages reproducible'
          git push origin HEAD:audit/pre-0.11-hardening
