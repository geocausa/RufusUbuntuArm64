name: Apply 0.9.0 release candidate

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'release/0.9.0-rc1'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: release/0.9.0-rc1
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23.x'

      - name: Decode and verify release patch
        shell: bash
        run: |
          set -euo pipefail
          base64 --decode .changes/0.9.0-rc1/release.patch.xz.b64 > /tmp/release.patch.xz
          echo 'b1ed0de59473c1554da28fd8ee986e74b36430f3e79fb87d53032d7aa7295a52  /tmp/release.patch.xz' | sha256sum --check --strict
          xz --decompress --stdout /tmp/release.patch.xz > /tmp/release.patch
          echo 'c1d88b42267e24d38a9b5f615b807081a4ede4be0d661472367c30377a2b1019  /tmp/release.patch' | sha256sum --check --strict
          git apply --check /tmp/release.patch
          git apply /tmp/release.patch
          rm -rf .changes

      - name: Validate release candidate
        shell: bash
        run: |
          set -euo pipefail
          test "$(tr -d '\r\n' < VERSION)" = '0.9.0'
          grep -Fxq 'var version = "0.9.0"' cmd/rufus-linux/main.go
          grep -Fxq 'VERSION = "0.9.0"' gui/rufusarm64.py
          grep -Fq 'RufusArm64 0.9.0' docs/rufusarm64-cli.1
          grep -Fq '## 0.9.0 —' CHANGELOG.md
          grep -Fq 'release version="0.9.0"' packaging/io.github.geocausa.RufusArm64.metainfo.xml
          grep -Fq 'rufusarm64_0.9.0_arm64.deb' README.md
          test -z "$(gofmt -l cmd internal)"
          go test ./...
          go vet ./...
          python3 -m py_compile gui/rufusarm64.py gui/rufusarm64_logic.py gui/test_logic.py
          (cd gui && python3 -m unittest test_logic.py)
          for script in scripts/*.sh; do bash -n "$script"; done
          sh -n packaging/rufusarm64
          python3 - <<'PY'
          import configparser
          import xml.etree.ElementTree as ET
          for path in (
              'packaging/io.github.geocausa.RufusArm64.metainfo.xml',
              'packaging/io.github.geocausa.RufusArm64.policy',
              'packaging/io.github.geocausa.RufusArm64.svg',
          ):
              ET.parse(path)
          parser = configparser.ConfigParser(interpolation=None)
          parser.read('packaging/io.github.geocausa.RufusArm64.desktop')
          assert parser['Desktop Entry']['Type'] == 'Application'
          PY
          if VERSION=0.8.0 ./scripts/build-arm64.sh >/tmp/version-mismatch.out 2>&1; then
            echo 'Mismatched version unexpectedly succeeded' >&2
            exit 1
          fi
          grep -q 'does not match repository VERSION 0.9.0' /tmp/version-mismatch.out

      - name: Commit validated release candidate
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add --all
          git commit -m 'Prepare RufusArm64 0.9.0 release candidate'
          git push origin HEAD:release/0.9.0-rc1
