name: Promote UEFI descriptor traversal

on:
  pull_request:
    branches:
      - develop/0.11.0
    paths:
      - '.github/uefi-descriptor-traversal.trigger'

permissions:
  contents: write

concurrency:
  group: promote-uefi-descriptor-traversal
  cancel-in-progress: false

jobs:
  promote:
    if: github.head_ref == 'feature/0.11-uefi-descriptor-traversal'
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: feature/0.11-uefi-descriptor-traversal
          fetch-depth: 0
          persist-credentials: true
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.22.x'
      - name: Apply descriptor-rooted traversal change
        env:
          APPLY_SCRIPT_GZIP_BASE64: ''
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import base64, gzip, os
          from pathlib import Path
          Path('/tmp/apply-uefi-descriptor-traversal.py').write_bytes(
              gzip.decompress(base64.b64decode(os.environ['APPLY_SCRIPT_GZIP_BASE64']))
          )
          PY
          python3 /tmp/apply-uefi-descriptor-traversal.py
          gofmt -w internal/secureboot/uefi.go internal/secureboot/uefi_descriptor_linux.go internal/secureboot/uefi_test.go
          git diff --check
      - name: Run focused UEFI race tests
        run: go test -race -count=1 ./internal/secureboot -run 'TestValidateUEFI'
      - name: Vet Secure Boot package
        run: go vet ./internal/secureboot
      - name: Run complete Go suite
        run: go test ./...
      - name: Commit validated production changes
        run: |
          set -euo pipefail
          git add internal/secureboot/uefi.go internal/secureboot/uefi_descriptor_linux.go internal/secureboot/uefi_test.go
          git diff --cached --check
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m '0.11: bind UEFI validation to descriptor-rooted media snapshots'
          git push origin 'HEAD:feature/0.11-uefi-descriptor-traversal'
