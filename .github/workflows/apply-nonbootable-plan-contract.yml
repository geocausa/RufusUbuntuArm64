name: Apply non-bootable plan contract alignment

on:
  push:
    branches: [feature/nonbootable-executor]
    paths:
      - .github/workflows/apply-nonbootable-plan-contract.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: feature/nonbootable-executor
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.22.x'
      - name: Remove unused tool and count Unicode labels on disk
        run: |
          python3 - <<'PY'
          from pathlib import Path

          plan = Path("internal/nonbootable/plan.go")
          text = plan.read_text(encoding="utf-8")
          replacements = [
              ('\t"unicode"\n\t"unicode/utf8"\n', '\t"unicode"\n\t"unicode/utf16"\n\t"unicode/utf8"\n'),
              ('\tmaxLabelRunes int\n', '\tmaxLabelUTF16 int\n'),
              ('\t\tmaxLabelRunes: 15,\n', '\t\tmaxLabelUTF16: 15,\n'),
              ('\t\tmaxLabelRunes: 32,\n', '\t\tmaxLabelUTF16: 32,\n'),
              ('return []string{"sfdisk", "blockdev", "udevadm", contract.mkfs, contract.check}', 'return []string{"sfdisk", "blockdev", contract.mkfs, contract.check}'),
              ('\tif contract.maxLabelRunes != 0 && utf8.RuneCountInString(value) > contract.maxLabelRunes {\n\t\treturn "", fmt.Errorf("%s label exceeds %d characters", contract.display, contract.maxLabelRunes)\n\t}\n', '\tif contract.maxLabelUTF16 != 0 && len(utf16.Encode([]rune(value))) > contract.maxLabelUTF16 {\n\t\treturn "", fmt.Errorf("%s label exceeds %d UTF-16 code units", contract.display, contract.maxLabelUTF16)\n\t}\n'),
          ]
          for old, new in replacements:
              if text.count(old) != 1:
                  raise SystemExit(f"plan marker count for {old!r} is {text.count(old)}")
              text = text.replace(old, new, 1)
          plan.write_text(text, encoding="utf-8")

          tests = Path("internal/nonbootable/plan_test.go")
          text = tests.read_text(encoding="utf-8")
          replacements = [
              ('wantTools := []string{"sfdisk", "blockdev", "udevadm", "mkfs.vfat", "fsck.vfat"}', 'wantTools := []string{"sfdisk", "blockdev", "mkfs.vfat", "fsck.vfat"}'),
              ('plan.FilesystemDisplay != display || len(plan.RequiredTools) != 5', 'plan.FilesystemDisplay != display || len(plan.RequiredTools) != 4'),
              ('want: "15 characters"', 'want: "15 UTF-16 code units"'),
              ('want: "32 characters"', 'want: "32 UTF-16 code units"'),
          ]
          for old, new in replacements:
              if text.count(old) != 1:
                  raise SystemExit(f"test marker count for {old!r} is {text.count(old)}")
              text = text.replace(old, new, 1)
          insertion = '''\nfunc TestUnicodeLabelsUseOnDiskUTF16Limits(t *testing.T) {
          \ttests := []struct {
          \t\tfilesystem string
          \t\tlabel      string
          \t\twant       string
          \t}{
          \t\t{filesystem: FilesystemExFAT, label: strings.Repeat("😀", 8), want: "15 UTF-16 code units"},
          \t\t{filesystem: FilesystemNTFS, label: strings.Repeat("😀", 17), want: "32 UTF-16 code units"},
          \t}
          \tfor _, test := range tests {
          \t\trequest := baseRequest()
          \t\trequest.Filesystem = test.filesystem
          \t\trequest.Label = test.label
          \t\tif _, err := BuildPlan(request); err == nil || !strings.Contains(err.Error(), test.want) {
          \t\t\tt.Fatalf("%s label error=%v, want %q", test.filesystem, err, test.want)
          \t\t}
          \t}
          }
          '''
          marker = '\nfunc TestPlanJSONIsStableAndExplicitlyNonBootable'
          if text.count(marker) != 1:
              raise SystemExit("plan JSON test marker is not unique")
          text = text.replace(marker, insertion + marker, 1)
          tests.write_text(text, encoding="utf-8")
          PY
          gofmt -w internal/nonbootable/plan.go internal/nonbootable/plan_test.go
          go test ./internal/nonbootable ./cmd/rufus-nonbootable-format
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add internal/nonbootable/plan.go internal/nonbootable/plan_test.go
          git commit -m "Stage 2: align formatter plan with actual tool contracts"
          git push origin HEAD:feature/nonbootable-executor
