name: Apply nonblocking UEFI entry opens

on:
  push:
    branches:
      - audit/uefi-entry-nonblocking

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: audit/uefi-entry-nonblocking
          fetch-depth: 0
      - name: Wire nonblocking UEFI entry opens
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('internal/secureboot/uefi_descriptor_linux.go')
          text = path.read_text()
          old = 'flags := syscall.O_RDONLY | syscall.O_NOFOLLOW | syscall.O_CLOEXEC'
          new = 'flags := syscall.O_RDONLY | syscall.O_NOFOLLOW | syscall.O_CLOEXEC | syscall.O_NONBLOCK'
          if text.count(old) != 1:
              raise SystemExit(f'expected one UEFI entry flag set, found {text.count(old)}')
          path.write_text(text.replace(old, new, 1))
          PY
          gofmt -w internal/secureboot/uefi_descriptor_linux.go internal/secureboot/uefi_fifo_linux_test.go
          go test ./internal/secureboot
          git rm .github/workflows/apply-uefi-entry-nonblocking.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add internal/secureboot
          git commit -m "Wire nonblocking UEFI entry opens"
          git push origin HEAD:audit/uefi-entry-nonblocking
