name: Wire acquisition descriptor reader

on:
  push:
    branches:
      - audit/channel-descriptor-read

permissions:
  contents: write

jobs:
  wire:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: audit/channel-descriptor-read
          fetch-depth: 0
      - name: Replace the legacy path open
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('internal/acquisition/channel.go')
          text = path.read_text()
          start = text.index('func readRegularLimited(path string, limit int) ([]byte, error) {')
          end = text.index('\nfunc writeAtomicPrivate(', start)
          replacement = '''func readRegularLimited(path string, limit int) ([]byte, error) {
          \treturn readRegularLimitedWithOpen(path, limit, openChannelMetadataNoFollow)
          }
          '''
          replacement = '\n'.join(line[10:] if line.startswith('          ') else line for line in replacement.splitlines()) + '\n'
          path.write_text(text[:start] + replacement + text[end+1:])
          PY
          gofmt -w internal/acquisition/channel.go internal/acquisition/read_regular_linux.go internal/acquisition/read_regular_linux_test.go
          go test ./internal/acquisition
          git rm .github/workflows/audit-channel-descriptor-wire.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add internal/acquisition/channel.go internal/acquisition/read_regular_linux.go internal/acquisition/read_regular_linux_test.go
          git commit -m "Audit: harden acquisition metadata opens"
          git push origin HEAD:audit/channel-descriptor-read
