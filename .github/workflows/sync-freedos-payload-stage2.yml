name: Synchronize FreeDOS payload tranche with Stage 2

on:
  push:
    branches: [feature/freedos-payload-provenance]
    paths:
      - .github/workflows/sync-freedos-payload-stage2.yml

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: feature/freedos-payload-provenance
          fetch-depth: 0
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v6
        with:
          go-version: '1.22.12'
      - name: Merge current Stage 2 and resolve the reviewed documentation overlap
        shell: bash
        run: |
          set -euxo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git fetch origin stage2/0.13.0
          set +e
          git merge --no-ff --no-commit origin/stage2/0.13.0
          merge_status=$?
          set -e
          if [[ "$merge_status" -ne 0 ]]; then
            conflicts="$(git diff --name-only --diff-filter=U)"
            [[ "$conflicts" == "docs/freedos-feasibility.md" ]]
            git checkout --ours docs/freedos-feasibility.md
            git add docs/freedos-feasibility.md
          fi
          python3 - <<'PY'
          from pathlib import Path

          docs = Path('docs/freedos-feasibility.md')
          text = docs.read_text(encoding='utf-8')
          anchor = '''This checkpoint validates byte transformations on ordinary in-memory images only. It does not authorize a device operation or establish that a physical PC will boot.\n\n## Resolved payload and kernel checkpoint\n'''
          kernel_section = '''This checkpoint validates byte transformations on ordinary in-memory images only. It does not authorize a device operation or establish that a physical PC will boot.\n\n## Resolved kernel configuration checkpoint\n\nThe pinned FreeDOS kernel source establishes the `KERNEL.SYS` configuration layout without relying on reverse engineering or executing the payload:\n\n- `kernel/kernel.asm` identifies byte zero of `KERNEL.SYS`, emits a two-byte short jump, then writes the `CONFIG` signature, the configuration-size word, and the configuration fields;\n- `hdr/kconfig.h` places `ForceLBA` after the three one-byte `DLASortByDriveNo`, `InitDiskShowDriveAssignment`, and `SkipConfigSeconds` fields;\n- `sys/fdkrncfg.c` reads the configuration structure from file offset 2 and treats `FORCELBA` as present when the configuration area contains at least four fields;\n- `docs/sys.txt` defines `FORCELBA=1` as using extended INT 13 LBA addressing whenever possible.\n\nThose source-backed offsets place `ForceLBA` at file offset `0x0d`. `vendor/freedos-kernel/KERNEL-CONFIG.json` pins the exact source commit and Git blob IDs used for the conclusion. `internal/freedos/kernel.go` parses the header, rejects truncated or malformed configuration areas, requires a binary setting, requires the reviewed Rufus value `0x01`, and independently requires the exact pinned Rufus `KERNEL.SYS` Git blob identity.\n\nThis parser accepts ordinary bytes only. It does not execute, modify, package, or copy a FreeDOS kernel and does not authorize a device operation.\n\n## Resolved payload provenance checkpoint\n'''
          if text.count(anchor) != 1:
              raise SystemExit('unexpected feasibility-document merge anchor')
          text = text.replace(anchor, kernel_section, 1)
          text = text.replace(
              '- `KERNEL.SYS` changes only offset `0x0d` to `0x01` and then matches Rufus exactly;',
              '- `KERNEL.SYS` changes only offset `0x0d` to `0x01`, passes the source-backed configuration parser, and matches Rufus exactly;',
              1,
          )
          docs.write_text(text, encoding='utf-8')

          cleanup = Path('internal/freedos/no_exposure_test.go')
          source = cleanup.read_text(encoding='utf-8')
          cleanup_anchor = '\t\tfilepath.Join(root, "docs", "freedos-finalizer-diagnostic.txt"),\n'
          if source.count(cleanup_anchor) != 1:
              raise SystemExit('unexpected cleanup-regression anchor')
          source = source.replace(
              cleanup_anchor,
              cleanup_anchor + '\t\tfilepath.Join(root, ".github", "workflows", "sync-freedos-payload-stage2.yml"),\n',
              1,
          )
          cleanup.write_text(source, encoding='utf-8')
          PY
          rm -f .github/workflows/sync-freedos-payload-stage2.yml
          gofmt -w internal/freedos
          test -z "$(gofmt -l internal/freedos)"
          go test -race ./internal/freedos
          go test -shuffle=on -count=3 ./internal/freedos
          python3 scripts/extract-freedos-payload.py --check
          python3 -m py_compile scripts/extract-freedos-payload.py
          git add -A
          git commit -m 'FreeDOS: synchronize payload provenance with kernel contract'
          git push origin HEAD:feature/freedos-payload-provenance
