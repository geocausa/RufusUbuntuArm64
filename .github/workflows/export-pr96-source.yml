name: Apply PR 96 writer integration

on:
  pull_request:
    branches:
      - feature/unified-persistence-ui

permissions:
  contents: write

jobs:
  integrate:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: feature/windows-option-eligibility
          fetch-depth: 0
      - name: Apply reviewed writer integration
        shell: bash
        run: |
          exec > >(tee integration.log) 2>&1
          set -euxo pipefail
          python3 <<'PY'
          from pathlib import Path

          custom = Path("internal/windowsmedia/customizations.go")
          custom_text = custom.read_text()
          helper = r'''

          // customizationPreparer keeps the writer integration testable without invoking
          // an external WIM engine. Production callers pass PrepareCustomizations.
          type customizationPreparer func(context.Context, string, string, windowsconfig.Options) (CustomizationPreparation, error)

          // preparePlanAnswerFile preserves the historical zero-option no-op. Metadata is
          // required only when at least one customization is selected; this keeps ordinary
          // Windows media creation compatible with images whose product metadata cannot be
          // classified while failing closed before any customized answer file is produced.
          func preparePlanAnswerFile(ctx context.Context, plan mediaPlan, options windowsconfig.Options, prepare customizationPreparer) ([]byte, error) {
              if !options.Enabled() {
                  return windowsconfig.Generate(plan.Architecture, options)
              }
              imagePath, err := customizationImagePath(plan)
              if err != nil {
                  return nil, err
              }
              result, err := prepare(ctx, imagePath, plan.Architecture, options)
              if err != nil {
                  return nil, err
              }
              return result.AnswerFile, nil
          }

          func customizationImagePath(plan mediaPlan) (string, error) {
              if plan.InstallPath != "" {
                  return plan.InstallPath, nil
              }
              if len(plan.ExistingSplitFiles) > 0 {
                  return plan.ExistingSplitFiles[0], nil
              }
              return "", fmt.Errorf("Windows installation payload path is unavailable for setup capability inspection")
          }
          '''
          if "func preparePlanAnswerFile(" not in custom_text:
              custom.write_text(custom_text.rstrip() + helper + "\n")

          writer = Path("internal/windowsmedia/windowsmedia.go")
          writer_text = writer.read_text()
          old = '''\tcustomizations := opts.Customizations
          \tcustomizations.LoadDrivers = plan.DriverFolder != ""
          \tplan.AnswerFile, err = windowsconfig.Generate(plan.Architecture, customizations)
          \tif err != nil {
          \t\treturn fmt.Errorf("prepare Windows setup options: %w", err)
          \t}
          '''
          new = '''\tcustomizations := opts.Customizations
          \tcustomizations.LoadDrivers = plan.DriverFolder != ""
          \tplan.AnswerFile, err = preparePlanAnswerFile(ctx, plan, customizations, PrepareCustomizations)
          \tif err != nil {
          \t\treturn fmt.Errorf("prepare Windows setup options: %w", err)
          \t}
          '''
          if old in writer_text:
              writer.write_text(writer_text.replace(old, new, 1))
          elif new not in writer_text:
              raise SystemExit("expected Windows customization block was not found")

          Path("internal/windowsmedia/customizations_plan_test.go").write_text(r'''//go:build linux

          package windowsmedia

          import (
              "context"
              "strings"
              "testing"

              "github.com/geocausa/RufusArm64/internal/windowsconfig"
          )

          func TestPreparePlanAnswerFileZeroOptionsDoesNotInspectMetadata(t *testing.T) {
              called := false
              answer, err := preparePlanAnswerFile(context.Background(), mediaPlan{Architecture: "ARM64 UEFI"}, windowsconfig.Options{}, func(context.Context, string, string, windowsconfig.Options) (CustomizationPreparation, error) {
                  called = true
                  return CustomizationPreparation{}, nil
              })
              if err != nil {
                  t.Fatalf("prepare zero-option answer file: %v", err)
              }
              if called {
                  t.Fatal("metadata preparer was called for zero selected options")
              }
              if len(answer) != 0 {
                  t.Fatalf("zero selected options produced %d answer-file bytes", len(answer))
              }
          }

          func TestPreparePlanAnswerFileUsesExistingSplitPayload(t *testing.T) {
              const firstPart = "/media/sources/install.swm"
              plan := mediaPlan{Architecture: "ARM64 UEFI", ExistingSplitFiles: []string{firstPart, "/media/sources/install2.swm"}}
              want := []byte("answer")
              answer, err := preparePlanAnswerFile(context.Background(), plan, windowsconfig.Options{BypassHardwareChecks: true}, func(_ context.Context, imagePath, architecture string, options windowsconfig.Options) (CustomizationPreparation, error) {
                  if imagePath != firstPart {
                      t.Fatalf("metadata path = %q, want %q", imagePath, firstPart)
                  }
                  if architecture != plan.Architecture {
                      t.Fatalf("architecture = %q, want %q", architecture, plan.Architecture)
                  }
                  if !options.BypassHardwareChecks {
                      t.Fatal("selected options were not forwarded")
                  }
                  return CustomizationPreparation{AnswerFile: want}, nil
              })
              if err != nil {
                  t.Fatalf("prepare split-media answer file: %v", err)
              }
              if string(answer) != string(want) {
                  t.Fatalf("answer = %q, want %q", answer, want)
              }
          }

          func TestPreparePlanAnswerFileRejectsMissingPayloadForSelectedOptions(t *testing.T) {
              _, err := preparePlanAnswerFile(context.Background(), mediaPlan{Architecture: "ARM64 UEFI"}, windowsconfig.Options{LocalAccount: "tester"}, PrepareCustomizations)
              if err == nil || !strings.Contains(err.Error(), "payload path is unavailable") {
                  t.Fatalf("error = %v, want missing payload path", err)
              }
          }
          ''')
          PY
          gofmt -w internal/windowsmedia/customizations.go internal/windowsmedia/windowsmedia.go internal/windowsmedia/customizations_plan_test.go
          go test ./internal/windowsmedia ./internal/windowsconfig
          git config user.name "RufusArm64 CI"
          git config user.email "actions@users.noreply.github.com"
          git add internal/windowsmedia/customizations.go internal/windowsmedia/windowsmedia.go internal/windowsmedia/customizations_plan_test.go
          if git diff --cached --quiet; then
            echo "Writer integration is already present."
            exit 0
          fi
          git commit -m "windows: enforce media eligibility in writer"
          git push origin HEAD:feature/windows-option-eligibility
      - name: Upload integration diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: pr96-integration-${{ github.sha }}
          if-no-files-found: warn
          retention-days: 1
          path: integration.log
