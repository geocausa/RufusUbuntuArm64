name: Apply prepared-input digest handoff

on:
  pull_request:
    types: [opened, reopened, ready_for_review]
    branches: [stage2/0.13.0]

permissions:
  contents: write

concurrency:
  group: apply-prepared-input-digest-handoff
  cancel-in-progress: false

jobs:
  apply:
    if: github.event.pull_request.head.ref == 'audit/prepared-input-digest-handoff-clean'
    runs-on: ubuntu-24.04
    steps:
      - name: Check out the integration branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: audit/prepared-input-digest-handoff-clean
          fetch-depth: 0

      - name: Set up declared Go version
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff
        with:
          go-version-file: go.mod
          cache: false

      - name: Apply the reviewed patch
        run: python3 scripts/apply-prepared-input-digest-handoff.py

      - name: Format and run focused regressions
        run: |
          gofmt -w internal/imaging/input.go internal/imaging/input_test.go internal/imaging/input_source_lease_linux_test.go internal/imaging/imaging.go cmd/rufus-linux/main.go internal/operationcost/contract.go internal/operationcost/contract_test.go
          go test ./internal/sourcefile ./internal/imaging ./internal/operationcost ./cmd/rufus-linux
          python3 -m json.tool docs/operation-cost-contract.json >/dev/null
          git diff --check

      - name: Remove the one-shot executor and publish the reviewed source commit
        run: |
          rm scripts/apply-prepared-input-digest-handoff.py
          rm .github/workflows/apply-prepared-input-digest-handoff.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m 'Audit: bind prepared-image digests through the raw writer'
          git push origin HEAD:audit/prepared-input-digest-handoff-clean
