name: Apply persistence no-automount hotfix

on:
  push:
    branches:
      - hotfix/0.10.6-persistence-no-automount
  pull_request:
    branches:
      - audit/pre-0.11-hardening

permissions:
  contents: write

concurrency:
  group: apply-persistence-no-automount
  cancel-in-progress: false

jobs:
  apply:
    if: >-
      github.repository == 'geocausa/RufusUbuntuArm64' &&
      (github.event_name == 'push' ||
       github.event.pull_request.head.ref == 'hotfix/0.10.6-persistence-no-automount')
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: hotfix/0.10.6-persistence-no-automount
          fetch-depth: 0
          persist-credentials: true
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.26.5'
      - name: Verify audited branch ancestry
        env:
          BASE_SHA: e0cb993c923d9ddc87e38c89e181e17215bdd70c
        run: git merge-base --is-ancestor "${BASE_SHA}" HEAD
      - name: Verify reviewed patch checksum
        env:
          PATCH_PATH: .github/patches/persistence-no-automount.patch
          PATCH_SHA256: 369c96114042af77a6f5c56899153dbfa80a504c2b9e86da793b128f77b26198
        run: |
          set -euo pipefail
          sha256sum "${PATCH_PATH}"
          printf '%s  %s\n' "${PATCH_SHA256}" "${PATCH_PATH}" | sha256sum -c -
      - name: Verify reviewed patch applicability
        run: git apply --check .github/patches/persistence-no-automount.patch
      - name: Apply and format reviewed patch
        run: |
          set -euo pipefail
          git apply .github/patches/persistence-no-automount.patch
          gofmt -w internal/linuxmedia/layout.go internal/linuxmedia/layout_test.go
          git diff --check
      - name: Test persistent GPT construction and repository
        run: |
          set -euo pipefail
          go test ./internal/linuxmedia -run 'TestWritePersistentGPT|TestPlanPersistentLayout' -count=1
          go test ./...
      - name: Promote validated production files
        env:
          BASE_SHA: e0cb993c923d9ddc87e38c89e181e17215bdd70c
        run: |
          set -euo pipefail
          git rm -- .github/patches/persistence-no-automount.patch .github/workflows/apply-persistence-no-automount.yml
          git add -A
          cat >"${RUNNER_TEMP}/expected-files" <<'EOF'
          internal/linuxmedia/layout.go
          internal/linuxmedia/layout_test.go
          EOF
          git diff --cached --name-only "${BASE_SHA}" | LC_ALL=C sort >"${RUNNER_TEMP}/actual-files"
          diff -u "${RUNNER_TEMP}/expected-files" "${RUNNER_TEMP}/actual-files"
          git diff --cached --check
          git config user.name 'github-actions[bot]'
          git config user.email '4189828+github-actions[bot]@users.noreply.github.com'
          git commit -m '0.10.6: prevent persistent partition automount races'
          git push origin 'HEAD:hotfix/0.10.6-persistence-no-automount'
