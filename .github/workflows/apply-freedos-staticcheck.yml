name: Apply FreeDOS staticcheck fix

on:
  push:
    branches: [feature/freedos-bootcode-provenance]
    paths:
      - .github/workflows/apply-freedos-staticcheck.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: feature/freedos-bootcode-provenance
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v6
        with:
          go-version: '1.22.12'
      - name: Normalize error strings and verify
        shell: bash
        run: |
          set -euxo pipefail
          python3 - <<'PY'
          from pathlib import Path
          path = Path('internal/freedos/bootassets.go')
          text = path.read_text(encoding='utf-8')
          replacements = {
              'Rufus MBR bootstrap does not match the pinned asset': 'rufus MBR bootstrap does not match the pinned asset',
              'FreeDOS FAT32 boot region at byte offset %d does not match pinned assets': 'pinned FreeDOS FAT32 boot region at byte offset %d does not match assets',
          }
          for old, new in replacements.items():
              if text.count(old) != 1:
                  raise SystemExit(f'expected one occurrence of {old!r}')
              text = text.replace(old, new, 1)
          path.write_text(text, encoding='utf-8')
          PY
          gofmt -w internal/freedos/bootassets.go
          go test ./internal/freedos
          go install honnef.co/go/tools/cmd/staticcheck@2025.1.1
          staticcheck ./internal/freedos
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add internal/freedos/bootassets.go
          git commit -m 'FreeDOS: normalize verifier error messages'
          git push origin HEAD:feature/freedos-bootcode-provenance
