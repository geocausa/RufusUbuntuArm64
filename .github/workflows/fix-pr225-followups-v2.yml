name: Retry PR225 hardware follow-up fixes

on:
  push:
    branches:
      - ops/refresh-prerelease-pr225
    paths:
      - .github/workflows/fix-pr225-followups-v2.yml

permissions:
  contents: write
  pull-requests: write

jobs:
  prepare:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    env:
      GH_TOKEN: ${{ github.token }}
      BRANCH: fix/pr225-hardware-followups
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: stage2/0.13.0
          fetch-depth: 0

      - name: Apply hardware-test follow-up fixes
        env:
          APPLY_SCRIPT_B64: 
        run: |
          set -euo pipefail
          git checkout -B "${BRANCH}" origin/stage2/0.13.0
          printf '%s' "${APPLY_SCRIPT_B64}" | base64 -d > /tmp/apply.py
          python3 /tmp/apply.py
          gofmt -w cmd/rufus-freedos-format/main.go cmd/rufus-freedos-format/main_test.go internal/windowsmedia/wimmetadata.go internal/windowsmedia/wimmetadata_test.go

      - name: Run focused regressions
        run: go test ./cmd/rufus-freedos-format ./internal/windowsmedia ./internal/windowsconfig

      - name: Commit and open pull request
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add cmd/rufus-freedos-format internal/windowsmedia
          git commit -m "Fix remaining PR225 hardware-test regressions"
          git push --force-with-lease origin HEAD:"${BRANCH}"
          if ! gh pr view "${BRANCH}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh pr create --repo "${GITHUB_REPOSITORY}" --base stage2/0.13.0 --head "${BRANCH}" --title "Fix FreeDOS planning and Windows 11 WIM identity" --body $'Closes #227.\nCloses #228.\n\nFollow-up fixes from real ARM64 GUI testing of v0.13.0-pr225-test.\n\n- moves the FreeDOS read-only plan from privileged blockdev access to readable kernel sysfs while retaining the exact 512-byte-sector requirement;\n- parses bounded WIM DISPLAYNAME metadata and prefers it over generic product fields for Windows generation/family classification;\n- adds focused regressions for unprivileged FreeDOS geometry and official-style Windows 11 ARM64 metadata;\n- leaves destructive identity revalidation, UTF-16 normalization, edition agreement, and fail-closed policies unchanged.'
          fi
