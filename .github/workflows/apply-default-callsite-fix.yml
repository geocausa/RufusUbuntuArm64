name: Apply default callsite fix

on:
  pull_request:
    types: [opened, reopened]
    branches: [stage2/0.13.0]

permissions:
  contents: write

concurrency:
  group: apply-default-callsite-fix
  cancel-in-progress: false

jobs:
  apply:
    if: github.event.pull_request.head.ref == 'audit/upstream-default-parity'
    runs-on: ubuntu-24.04
    steps:
      - name: Check out the parity branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: audit/upstream-default-parity
          fetch-depth: 0

      - name: Apply and test the callsite correction
        run: |
          python3 scripts/apply-default-callsite-fix.py
          (
            cd gui
            python3 -m unittest -v test_logic.py test_default_parity.py
          )
          git diff --check

      - name: Remove executor and publish source-only correction
        run: |
          rm scripts/apply-default-callsite-fix.py
          rm .github/workflows/apply-default-callsite-fix.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m 'Audit: keep Windows defaults out of raw writes'
          git push origin HEAD:audit/upstream-default-parity
