name: Export PR 96 versioned CI

on:
  pull_request:
    branches:
      - feature/unified-persistence-ui

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - name: Generate versioned CI workflow
        shell: bash
        run: |
          set -euo pipefail
          python3 <<'PY'
          from pathlib import Path

          path = Path('.github/workflows/ci.yml')
          lines = path.read_text().splitlines()

          def replace_step(lines, occurrence, include_success_guard):
              old_name = 'Read canonical project version'
              indexes = [i for i, line in enumerate(lines) if line.strip() == f'- name: {old_name}']
              if occurrence >= len(indexes):
                  raise SystemExit(f'{old_name}: occurrence {occurrence} missing from {len(indexes)} steps')
              start = indexes[occurrence]
              prefix = lines[start][:len(lines[start]) - len(lines[start].lstrip())]
              end = start + 1
              while end < len(lines) and not lines[end].startswith(prefix + '- name:'):
                  end += 1
              relative = [
                  '- name: Resolve traceable build version',
                  '  id: version',
              ]
              if include_success_guard:
                  relative.append('  if: success()')
              relative.extend([
                  '  run: |',
                  '    project_version="$(tr -d \'\\r\\n\' < VERSION)"',
                  '    version="${project_version}"',
                  '    allow_nonrelease=0',
                  '    if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then',
                  '      pr_number="$(python3 -c \'import json,os; print(json.load(open(os.environ["GITHUB_EVENT_PATH"]))["number"])\')"',
                  '      head_sha="$(python3 -c \'import json,os; print(json.load(open(os.environ["GITHUB_EVENT_PATH"]))["pull_request"]["head"]["sha"])\')"',
                  '      version="${project_version}+pr${pr_number}.${head_sha:0:8}"',
                  '      allow_nonrelease=1',
                  '    fi',
                  '    dpkg --validate-version "${version}"',
                  '    echo "VERSION=${version}" >> "$GITHUB_ENV"',
                  '    echo "RUFUS_ALLOW_NONRELEASE_VERSION=${allow_nonrelease}" >> "$GITHUB_ENV"',
                  '    echo "version=${version}" >> "$GITHUB_OUTPUT"',
              ])
              lines[start:end] = [prefix + line for line in relative]

          replace_step(lines, 1, False)
          replace_step(lines, 0, True)
          path.write_text('\n'.join(lines) + '\n')
          PY
          grep -c 'Resolve traceable build version' .github/workflows/ci.yml | grep -qx 2
          grep -Fq '+pr${pr_number}.${head_sha:0:8}' .github/workflows/ci.yml
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: pr96-versioned-ci
          path: .github/workflows/ci.yml
          if-no-files-found: error
          retention-days: 1
