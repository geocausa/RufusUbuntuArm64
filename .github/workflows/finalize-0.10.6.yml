name: Finalize RufusArm64 0.10.6

on:
  push:
    branches:
      - hotfix/0.10.6-persistence-no-automount

permissions:
  contents: write

concurrency:
  group: finalize-rufusarm64-0.10.6
  cancel-in-progress: false

jobs:
  finalize:
    if: github.repository == 'geocausa/RufusUbuntuArm64'
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: hotfix/0.10.6-persistence-no-automount
          fetch-depth: 0
          persist-credentials: true
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.26.5'
      - name: Install release validators
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            shellcheck desktop-file-utils appstream lintian dosfstools e2fsprogs
      - name: Stamp complete 0.10.6 metadata
        run: |
          python3 - <<'PY'
          from pathlib import Path

          version = "0.10.6"
          date = "2026-07-17"

          Path("VERSION").write_text(version + "\n", encoding="utf-8")

          readme = Path("README.md")
          text = readme.read_text(encoding="utf-8")
          text = text.replace("rufusarm64_0.10.5_arm64.deb", "rufusarm64_0.10.6_arm64.deb")
          text = text.replace("Version 0.10.5 retains", "Version 0.10.6 retains")
          readme.write_text(text, encoding="utf-8")

          changelog = Path("CHANGELOG.md")
          text = changelog.read_text(encoding="utf-8")
          heading = f"## {version} — {date}"
          if heading not in text:
              release = f'''{heading}\n\n- Marked both fresh persistent-live GPT partitions with attribute bit 63 before the kernel publishes them, preventing desktop automount services from racing FAT32 and ext4 creation.\n- Included the do-not-automount attribute in exact primary and backup GPT entry-table readback verification and added focused regression coverage for both partitions.\n- Bumped the Debian package and runtime version so systems already on 0.10.5 receive the correction through a normal upgrade.\n\n'''
              text = text.replace("# Changelog\n\n", "# Changelog\n\n" + release, 1)
          changelog.write_text(text, encoding="utf-8")

          man = Path("docs/rufusarm64-cli.1")
          text = man.read_text(encoding="utf-8").replace("RufusArm64 0.10.5", "RufusArm64 0.10.6")
          man.write_text(text, encoding="utf-8")

          meta = Path("packaging/io.github.geocausa.RufusArm64.metainfo.xml")
          text = meta.read_text(encoding="utf-8")
          marker = '    <release version="0.10.5" date="2026-07-17">'
          release = '''    <release version="0.10.6" date="2026-07-17">\n      <description>\n        <p>Prevents desktop automount races during persistent-live USB creation by setting and verifying the GPT do-not-automount attribute before FAT32 and ext4 formatting.</p>\n      </description>\n    </release>\n'''
          if 'release version="0.10.6"' not in text:
              if marker not in text:
                  raise SystemExit("0.10.5 AppStream release marker missing")
              text = text.replace(marker, release + marker, 1)
          meta.write_text(text, encoding="utf-8")

          audit = Path("docs/pre-0.11-code-audit.md")
          text = audit.read_text(encoding="utf-8")
          text = text.replace("**23 fixed findings**", "**24 fixed findings**", 1)
          if "### A-033 — persistent GPT partitions permit a desktop automount race" not in text:
              marker = "## GUI, semantics, and concurrency"
              if marker not in text:
                  raise SystemExit("audit insertion marker missing")
              finding = '''### A-033 — persistent GPT partitions permit a desktop automount race\n\n**Severity:** high destructive-path correctness\n**Status:** fixed\n\nA physical Surface Pro 11 and USB retest still reached `mkfs.vfat` with `EBUSY` after A-032 removed the creator's kernel-exclusive partition open. A partitioned-loop diagnostic then proved that the long-held, flocked parent-disk descriptor does not block a formatter reopening the child partition. The remaining host race was that both newly published GPT entries had all attribute bits clear, allowing desktop storage services to automount a stale or newly recognized filesystem between RufusArm64's explicit unmount verification and the formatter's exclusive open.\n\nImplemented correction:\n\n- set GPT attribute bit 63 (do not automount) on both the FAT32 boot partition and ext4 persistence partition before the kernel partition-table reread;\n- include the attribute in exact primary and backup GPT entry-table readback verification;\n- retain the whole-disk lock, partition `flock`, no-follow descriptors, device identity and capacity checks, exact geometry verification, and parent-device binding;\n- release the correction as 0.10.6 so an installed 0.10.5 package is upgraded normally rather than ambiguously reinstalled.\n\nThe do-not-automount attribute prevents host desktop policy from claiming the partitions during creation. It does not change their firmware boot type, filesystem format, or normal mountability after the USB is complete.\n\n'''
              text = text.replace(marker, finding + marker, 1)
          audit.write_text(text, encoding="utf-8")
          PY
          git diff --check
      - name: Run focused GPT regression
        run: go test ./internal/linuxmedia -run 'TestWritePersistentGPT|TestPlanPersistentLayout' -count=1
      - name: Run complete release and package gate
        run: ./scripts/test.sh
      - name: Confirm package version and checksum
        run: |
          set -euo pipefail
          dpkg-deb -f dist/rufusarm64_0.10.6_arm64.deb Version | grep -Fx 0.10.6
          sha256sum -c dist/rufusarm64_0.10.6_arm64.deb.sha256
      - name: Commit finalized release
        run: |
          set -euo pipefail
          git rm -- .github/workflows/finalize-0.10.6.yml
          git add -A
          git diff --cached --check
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m '0.10.6: finalize persistence automount-race hotfix'
          git push origin 'HEAD:hotfix/0.10.6-persistence-no-automount'
