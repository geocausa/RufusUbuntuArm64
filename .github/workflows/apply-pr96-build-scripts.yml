name: Apply PR 96 package script versioning

on:
  pull_request:
    branches:
      - feature/unified-persistence-ui

permissions:
  contents: write

jobs:
  integrate:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: feature/windows-option-eligibility
          fetch-depth: 0
      - name: Apply package script versioning
        shell: bash
        run: |
          set -euxo pipefail
          python3 <<'PY'
          from pathlib import Path
          import re

          def replace_once(text, pattern, replacement, label):
              updated, count = re.subn(pattern, replacement, text, count=1, flags=re.MULTILINE | re.DOTALL)
              if count != 1:
                  raise SystemExit(f"{label}: replacement count {count}, want 1")
              return updated

          build = Path("scripts/build-deb.sh")
          text = build.read_text()
          if "RUFUS_ALLOW_NONRELEASE_VERSION" not in text:
              text = replace_once(
                  text,
                  r'PROJECT_VERSION="\$\(tr -d \'\\r\\n\' < "\$\{ROOT_DIR\}/VERSION"\)"\nVERSION="\$\{VERSION:-\$\{PROJECT_VERSION\}\}"\nif \[\[ "\$\{VERSION\}" != "\$\{PROJECT_VERSION\}" \]\]; then\n.*?\nfi\n(?=ARCH="arm64")',
                  '''PROJECT_VERSION="$(tr -d '\\r\\n' < "${ROOT_DIR}/VERSION")"
          VERSION="${VERSION:-${PROJECT_VERSION}}"
          RUFUS_ALLOW_NONRELEASE_VERSION="${RUFUS_ALLOW_NONRELEASE_VERSION:-0}"
          if [[ "${VERSION}" != "${PROJECT_VERSION}" && "${RUFUS_ALLOW_NONRELEASE_VERSION}" != "1" ]]; then
            echo "Non-release version ${VERSION} requires RUFUS_ALLOW_NONRELEASE_VERSION=1" >&2
            exit 1
          fi
          if ! dpkg --validate-version "${VERSION}" >/dev/null 2>&1; then
            echo "Invalid Debian package version: ${VERSION}" >&2
            exit 1
          fi
          ''',
                  "build-deb version guard",
              )
              old = '"${ROOT_DIR}/CHANGELOG.md" "${VERSION}" <<\'PYDATE\''
              new = '"${ROOT_DIR}/CHANGELOG.md" "${PROJECT_VERSION}" <<\'PYDATE\''
              if text.count(old) != 1:
                  raise SystemExit(f"build-deb changelog version count {text.count(old)}, want 1")
              build.write_text(text.replace(old, new, 1))

          tests = Path("scripts/test.sh")
          text = tests.read_text()
          if "RUFUS_ALLOW_NONRELEASE_VERSION" not in text:
              text = replace_once(
                  text,
                  r'PROJECT_VERSION="\$\(tr -d \'\\r\\n\' < VERSION\)"\nVERSION="\$\{VERSION:-\$\{PROJECT_VERSION\}\}"\nif \[\[ "\$\{VERSION\}" != "\$\{PROJECT_VERSION\}" \]\]; then\n.*?\nfi\nexport VERSION\nPACKAGE="dist/rufusarm64_\$\{VERSION\}_arm64\.deb"\n\n.*?grep -Fq "rufusarm64_\$\{VERSION\}_arm64\.deb" README\.md\n',
                  '''PROJECT_VERSION="$(tr -d '\\r\\n' < VERSION)"
          VERSION="${VERSION:-${PROJECT_VERSION}}"
          RUFUS_ALLOW_NONRELEASE_VERSION="${RUFUS_ALLOW_NONRELEASE_VERSION:-0}"
          if [[ "${VERSION}" != "${PROJECT_VERSION}" && "${RUFUS_ALLOW_NONRELEASE_VERSION}" != "1" ]]; then
            echo "Non-release version ${VERSION} requires RUFUS_ALLOW_NONRELEASE_VERSION=1" >&2
            exit 1
          fi
          if ! dpkg --validate-version "${VERSION}" >/dev/null 2>&1; then
            echo "Invalid Debian package version: ${VERSION}" >&2
            exit 1
          fi
          export VERSION RUFUS_ALLOW_NONRELEASE_VERSION
          PACKAGE="dist/rufusarm64_${VERSION}_arm64.deb"

          grep -Fq "RufusArm64 ${PROJECT_VERSION}" docs/rufusarm64-cli.1
          grep -Fq "## ${PROJECT_VERSION} —" CHANGELOG.md
          grep -Fq "release version=\"${PROJECT_VERSION}\"" packaging/io.github.geocausa.RufusArm64.metainfo.xml
          grep -Fq "rufusarm64_${PROJECT_VERSION}_arm64.deb" README.md
          ''',
                  "test version guard",
              )
              tests.write_text(text)

          Path("scripts/reproducible-package.sh").write_text('''#!/usr/bin/env bash
          set -euo pipefail

          cd "$(dirname "$0")/.."
          PROJECT_VERSION="$(tr -d '\\r\\n' < VERSION)"
          VERSION="${VERSION:-${PROJECT_VERSION}}"
          RUFUS_ALLOW_NONRELEASE_VERSION="${RUFUS_ALLOW_NONRELEASE_VERSION:-0}"
          if [[ "${VERSION}" != "${PROJECT_VERSION}" && "${RUFUS_ALLOW_NONRELEASE_VERSION}" != "1" ]]; then
            echo "Non-release version ${VERSION} requires RUFUS_ALLOW_NONRELEASE_VERSION=1" >&2
            exit 1
          fi
          if ! dpkg --validate-version "${VERSION}" >/dev/null 2>&1; then
            echo "Invalid Debian package version: ${VERSION}" >&2
            exit 1
          fi
          export VERSION RUFUS_ALLOW_NONRELEASE_VERSION
          work="$(mktemp -d)"
          trap 'rm -rf "${work}"' EXIT

          first="${work}/first"
          second="${work}/second"
          mkdir -p "${first}" "${second}"
          OUTPUT_DIR="${first}" bash ./scripts/build-deb.sh
          sleep 1
          OUTPUT_DIR="${second}" bash ./scripts/build-deb.sh

          package="rufusarm64_${VERSION}_arm64.deb"
          checksum="${package}.sha256"
          cmp --silent "${first}/${package}" "${second}/${package}" || {
            echo "Debian package is not reproducible across two clean builds" >&2
            sha256sum "${first}/${package}" "${second}/${package}" >&2
            exit 1
          }
          cmp --silent "${first}/${checksum}" "${second}/${checksum}" || {
            echo "Debian package checksum sidecar is not reproducible" >&2
            exit 1
          }
          echo "Reproducible package confirmed: ${package}"
          ''')
          PY
          bash -n scripts/build-deb.sh scripts/test.sh scripts/reproducible-package.sh
          dpkg --validate-version '0.11.0+pr96.deadbeef'
          git config user.name "RufusArm64 CI"
          git config user.email "actions@users.noreply.github.com"
          git add scripts/build-deb.sh scripts/test.sh scripts/reproducible-package.sh
          git commit -m "build: support traceable non-release package versions"
          git push origin HEAD:feature/windows-option-eligibility
