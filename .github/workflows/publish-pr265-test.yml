name: Publish PR265 hardware-test prerelease

on:
  pull_request:
    branches:
      - stage2/0.13.0
    types: [opened, reopened, synchronize]

permissions:
  contents: write

jobs:
  publish:
    if: github.event.pull_request.head.ref == 'ops/publish-pr265-test'
    runs-on: ubuntu-24.04
    env:
      TAG: v0.13.0-pr265-test
      TESTED_SHA: ce41ba8b467fccd12dc129db6d51ee2512291cd7
      MERGED_STAGE_SHA: 75e12a69d8b835a47962b374c83945b8f4ae0254
      CI_RUN_ID: '30033320147'
      ARTIFACT_ID: '8574404089'
      ARTIFACT_NAME: rufusarm64-0.13.0+pr265.ce41ba8b-ubuntu-arm64
      PACKAGE_NAME: rufusarm64_0.13.0+pr265.ce41ba8b_arm64.deb
      PACKAGE_SHA256: 4517001008edb99dd520560179f9e2ab524d210af2f0a1a21f6eebc17d15d91b
    steps:
      - name: Verify exact tested source and artifact provenance
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          test "$(gh api "repos/${GITHUB_REPOSITORY}/commits/${TESTED_SHA}" --jq .sha)" = "${TESTED_SHA}"
          artifact_json="$(gh api "repos/${GITHUB_REPOSITORY}/actions/artifacts/${ARTIFACT_ID}")"
          test "$(jq -r .expired <<<"${artifact_json}")" = false
          test "$(jq -r .name <<<"${artifact_json}")" = "${ARTIFACT_NAME}"
          test "$(jq -r .workflow_run.head_sha <<<"${artifact_json}")" = "${TESTED_SHA}"
          test "$(jq -r .workflow_run.id <<<"${artifact_json}")" = "${CI_RUN_ID}"

      - name: Download and verify reproducible ARM64 package
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p dist
          gh run download "${CI_RUN_ID}" --repo "${GITHUB_REPOSITORY}" --name "${ARTIFACT_NAME}" --dir dist
          test -f "dist/${PACKAGE_NAME}"
          test -f "dist/${PACKAGE_NAME}.sha256"
          (
            cd dist
            sha256sum -c "${PACKAGE_NAME}.sha256"
          )
          test "$(sha256sum "dist/${PACKAGE_NAME}" | awk '{print $1}')" = "${PACKAGE_SHA256}"
          test "$(dpkg-deb -f "dist/${PACKAGE_NAME}" Package)" = rufusarm64
          test "$(dpkg-deb -f "dist/${PACKAGE_NAME}" Version)" = 0.13.0+pr265.ce41ba8b
          test "$(dpkg-deb -f "dist/${PACKAGE_NAME}" Architecture)" = arm64

      - name: Publish corrected hardware-test prerelease
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if gh release view "${TAG}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            echo "release ${TAG} already exists" >&2
            exit 1
          fi

          cat >release-notes.md <<EOF
          # RufusArm64 0.13.0 PR #265 hardware-test build

          **This is a prerelease for physical hardware testing. It is not the final 0.13.0 release.**

          - Exact tested source: `${TESTED_SHA}`
          - Merged Stage 2 checkpoint: `${MERGED_STAGE_SHA}`
          - CI run: `${CI_RUN_ID}`
          - Package: `${PACKAGE_NAME}`
          - SHA-256: `${PACKAGE_SHA256}`

          ## Hardware-reported fix

          The PR #262 test build correctly created extent-scoped FreeDOS media, but the GTK dialog still compared helper progress with the obsolete whole-device I/O total and therefore discarded the final report. This build binds progress to the exact reviewed required-extents totals and separately validates write and readback phases.

          ## Lexar retest procedure

          1. Install this package.
          2. Recreate FreeDOS on the Lexar JumpDrive from scratch.
          3. Do **not** run Check USB afterward; Check USB is a separate destructive qualification test and does not preserve files or partitions.
          4. Preserve a screenshot or copy of the successful final FreeDOS report.
          5. Only then attempt an x86 BIOS/Legacy or UEFI-CSM boot.

          Public `v0.13.0` remains blocked until the trustworthy final report and physical boot observation are recorded, along with the remaining persistence and UI checks.
          EOF

          gh release create "${TAG}" \
            --repo "${GITHUB_REPOSITORY}" \
            --target "${TESTED_SHA}" \
            --title "RufusArm64 0.13.0 PR #265 hardware-test build" \
            --notes-file release-notes.md \
            --prerelease \
            "dist/${PACKAGE_NAME}" \
            "dist/${PACKAGE_NAME}.sha256"

      - name: Verify published release and assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          release_json="$(gh release view "${TAG}" --repo "${GITHUB_REPOSITORY}" --json isPrerelease,targetCommitish,url,assets)"
          test "$(jq -r .isPrerelease <<<"${release_json}")" = true
          test "$(jq -r .targetCommitish <<<"${release_json}")" = "${TESTED_SHA}"
          jq -e --arg package "${PACKAGE_NAME}" '.assets | any(.name == $package)' <<<"${release_json}" >/dev/null
          jq -e --arg checksum "${PACKAGE_NAME}.sha256" '.assets | any(.name == $checksum)' <<<"${release_json}" >/dev/null
          echo "Published: $(jq -r .url <<<"${release_json}")"
