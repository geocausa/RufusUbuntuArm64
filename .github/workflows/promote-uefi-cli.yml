name: Promote UEFI CLI exposure

on:
  pull_request:
    branches:
      - develop/0.11.0
    paths:
      - '.github/uefi-cli.trigger'

permissions:
  contents: write

concurrency:
  group: promote-uefi-cli
  cancel-in-progress: false

jobs:
  promote:
    if: github.head_ref == 'feature/0.11-uefi-cli'
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: feature/0.11-uefi-cli
          fetch-depth: 0
          persist-credentials: true
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.22.x'
      - name: Apply read-only UEFI CLI change
        run: |
          set -euo pipefail
          python3 .github/scripts/apply-uefi-cli.py
          gofmt -w cmd/rufus-linux/main.go cmd/rufus-linux/main_test.go
          python3 -m json.tool docs/upstream-rufus-parity.json >/dev/null
          git diff --check
      - name: Run focused CLI and validator race tests
        run: go test -race -count=1 ./cmd/rufus-linux ./internal/secureboot
      - name: Vet changed Go packages
        run: go vet ./cmd/rufus-linux ./internal/secureboot
      - name: Run complete Go suite
        run: go test ./...
      - name: Validate shell script syntax
        run: bash -n scripts/test.sh
      - name: Commit validated production changes
        run: |
          set -euo pipefail
          git add \
            cmd/rufus-linux/main.go \
            cmd/rufus-linux/main_test.go \
            docs/rufusarm64-cli.1 \
            README.md \
            scripts/test.sh \
            docs/upstream-rufus-parity.json
          git diff --cached --check
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m '0.11: expose descriptor-safe UEFI validation through the CLI'
          git push origin 'HEAD:feature/0.11-uefi-cli'
