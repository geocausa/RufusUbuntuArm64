name: Verify published release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Existing canonical release tag to verify
        required: true
        type: string

permissions:
  contents: read

jobs:
  verify:
    if: github.repository == 'geocausa/RufusUbuntuArm64'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    env:
      RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ env.RELEASE_TAG }}
          persist-credentials: false
          fetch-depth: 1
      - name: Bind checkout to the exact lightweight release tag
        run: |
          set -euo pipefail
          ref_json="$(gh api "/repos/${GITHUB_REPOSITORY}/git/ref/tags/${RELEASE_TAG}")"
          ref_type="$(jq -r '.object.type' <<<"${ref_json}")"
          ref_sha="$(jq -r '.object.sha' <<<"${ref_json}")"
          test "${ref_type}" = "commit" || {
            echo "Release tag ${RELEASE_TAG} must be a lightweight commit ref, not ${ref_type}" >&2
            exit 1
          }
          test "$(git rev-parse HEAD)" = "${ref_sha}" || {
            echo "Checked-out commit does not match immutable release tag ${RELEASE_TAG}" >&2
            exit 1
          }
      - name: Download and validate the exact published asset graph
        run: |
          set -euo pipefail
          release_json="${RUNNER_TEMP}/release.json"
          asset_dir="${RUNNER_TEMP}/published-assets"
          mkdir -p "${asset_dir}"
          gh release view "${RELEASE_TAG}" \
            --repo "${GITHUB_REPOSITORY}" \
            --json tagName,targetCommitish,isDraft,isPrerelease,publishedAt,url,assets \
            > "${release_json}"
          gh release download "${RELEASE_TAG}" \
            --repo "${GITHUB_REPOSITORY}" \
            --dir "${asset_dir}"
          python3 scripts/check-published-release.py "${release_json}" "${asset_dir}"
