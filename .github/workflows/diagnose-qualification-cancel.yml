name: Diagnose qualification cancellation

on:
  push:
    branches:
      - feature/device-qualification-gtk

permissions:
  contents: read

concurrency:
  group: diagnose-qualification-cancel
  cancel-in-progress: false

jobs:
  diagnose:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: feature/device-qualification-gtk
      - name: Reproduce patch and tests
        shell: bash
        run: |
          mkdir -p dist/cancel-diagnostic
          set +e
          (
            set -euxo pipefail
            python3 <<'PY'
            from pathlib import Path

            main = Path("gui/rufusarm64.py")
            text = main.read_text(encoding="utf-8")
            old = 'self.cancel_button.set_sensitive(busy and self.active_job in {"writer", "download", "persistence-plan"})'
            new = 'self.cancel_button.set_sensitive(busy and self.active_job in {"writer", "download", "persistence-plan", "qualification"})'
            print("sensitivity count", text.count(old))
            assert text.count(old) == 1
            text = text.replace(old, new, 1)
            start = text.index("    def cancel(self, *_):\n")
            marker = "        self.cancel_requested = True\n"
            print("cancel marker", text.count(marker, start))
            point = text.index(marker, start)
            insertion = (
                "        if self.active_job == \"qualification\":\n"
                "            dialog = getattr(self, \"qualification_dialog\", None)\n"
                "            if dialog is not None:\n"
                "                dialog.request_cancel()\n"
                "            return\n"
            )
            text = text[:point] + insertion + text[point:]
            main.write_text(text, encoding="utf-8")

            dialog = Path("gui/rufusarm64_device_qualify_dialog.py")
            text = dialog.read_text(encoding="utf-8")
            start = text.index("    def _cancel_clicked(self, *_):\n")
            end = text.index("\n    @staticmethod\n    def _terminate_process", start)
            replacement = (
                "    def request_cancel(self):\n"
                "        if not self.running:\n"
                "            return\n"
                "        self.cancel_requested = True\n"
                "        self.cancel_button.set_sensitive(False)\n"
                "        self.status.set_text(\"Cancelling safely after the current I/O operation…\")\n"
                "        process = self.process\n"
                "        if process is not None:\n"
                "            self._terminate_process(process)\n"
                "\n"
                "    def _cancel_clicked(self, *_):\n"
                "        self.request_cancel()\n"
            )
            text = text[:start] + replacement + text[end:]
            old_delete = "        if self.running:\n            self._cancel_clicked()\n            return True\n"
            print("delete count", text.count(old_delete))
            assert text.count(old_delete) == 1
            dialog.write_text(text.replace(old_delete, "        if self.running:\n            self.request_cancel()\n            return True\n", 1), encoding="utf-8")
            PY
            python3 -m py_compile gui/rufusarm64.py gui/rufusarm64_device_qualify_dialog.py
            PYTHONPATH=gui python3 -m unittest gui/test_device_qualify_logic.py gui/test_device_qualify_source.py
          ) >dist/cancel-diagnostic/output.log 2>&1
          status=$?
          cat dist/cancel-diagnostic/output.log
          exit "$status"
      - name: Upload diagnostic
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: qualification-cancel-diagnostic-${{ github.run_id }}
          path: dist/cancel-diagnostic/output.log
          if-no-files-found: error
